}

/* ===================== COMMANDES ===================== */

function CommandesView({ site, updateSite, editable, employeId }){
  const [filter, setFilter] = useState('Toutes');
  const [search, setSearch] = useState('');
  const [showNew, setShowNew] = useState(false);
  const [openTicket, setOpenTicket] = useState(null);

  const filtered = useMemo(() => {
    let list = [...site.commandes].sort((a,b)=> new Date(b.dateCreation) - new Date(a.dateCreation));
    if(filter !== 'Toutes') list = list.filter(c => c.statut === filter);
    if(search.trim()){
      const q = search.toLowerCase();
      list = list.filter(c => {
        const client = site.clients.find(cl => cl.id === c.clientId);
        return c.numero.toLowerCase().includes(q) || (client && client.nom.toLowerCase().includes(q));
      });
    }
    return list;
  }, [site.commandes, site.clients, filter, search]);

  function updateCommande(updated){
    updateSite({ ...site, commandes: site.commandes.map(c => c.id === updated.id ? updated : c) });
  }

  function advanceStatut(cmd){
    const updated = { ...cmd, statut: nextStatut(cmd.statut) };
    const client = site.clients.find(c => c.id === cmd.clientId);
    const total = calcCommandeTotal(cmd, site.services);
    const acompte = Number(cmd.acompte) || 0;
    const solde = total - acompte;
    const nextSite = { ...site, commandes: site.commandes.map(c => c.id === updated.id ? updated : c) };

    // CALCUL AUTOMATIQUE REPASSEUR quand statut -> Prêt
    if(updated.statut === 'Prêt'){
      const config = site.configRemuneration || {};
      const tarifsRepassage = config.tarifsRepassage || [];
      if(tarifsRepassage.length > 0){
        const articlesRepasses = [];
        cmd.lignes.forEach(l => {
          const svc = site.services.find(s=>s.id===l.serviceId);
          if(!svc) return;
          const tarif = tarifsRepassage.find(t =>
            svc.nom.toLowerCase().includes(t.nom.toLowerCase()) ||
            t.nom.toLowerCase().includes(svc.nom.toLowerCase())
          );
          if(tarif) articlesRepasses.push({ nom: tarif.nom, prix: tarif.prix, qte: l.qte });
        });
        if(articlesRepasses.length > 0){
          const montantRepasseur = articlesRepasses.reduce((s,a)=>s+(a.prix*a.qte),0);
          const detailRepasseur = articlesRepasses.map(a=>`${a.qte}x ${a.nom} (${fmtGNF(a.prix)})`).join(', ');
          const rem = {
            id: uid('rem_'),
            date: todayISO(),
            type: 'repassage',
            montant: montantRepasseur,
            detail: detailRepasseur,
            commandeNumero: cmd.numero,
            employeId: employeId || null,
            auto: true,
          };
          nextSite.remunerations = [rem, ...(nextSite.remunerations||[])];
        }
      }
    }

    if(client){
      let msg = '';
      if(updated.statut === 'Prêt'){
        msg = `Bonjour ${client.nom}, votre commande ${cmd.numero} chez ${site.nom} est prête à récupérer.${solde > 0 ? ` Solde à régler : ${fmtGNF(solde)}.` : ' Entièrement payée.'}`;
      } else if(updated.statut === 'Récupéré'){
        const lignesDetail = cmd.lignes.map(l => {
          const svc = site.services.find(s=>s.id===l.serviceId);
          return svc ? `${l.qte}x ${svc.nom}` : '';
        }).filter(Boolean).join(', ');
        msg = `✅ Reçu — ${site.nom}\nCommande : ${cmd.numero}\nArticles : ${lignesDetail}${cmd.rabais>0?`\nRabais : -${fmtGNF(cmd.rabais)}`:''}${acompte>0?`\nAcompte versé : ${fmtGNF(acompte)}`:''}\nTotal payé : ${fmtGNF(total - (solde > 0 ? solde : 0))}\n${solde > 0 ? `⚠️ Reste dû : ${fmtGNF(solde)}` : '✔️ Compte soldé'}\nMerci pour votre confiance !`;
      }
      if(msg){
        const notif = { id: uid('notif_'), clientId: client.id, message: msg, canal: client.canalPref || 'SMS', date: new Date().toISOString() };
        nextSite.notifications = [notif, ...nextSite.notifications].slice(0,300);
        if(client.tel && (updated.statut === 'Prêt' || updated.statut === 'Récupéré')){
          const tel = client.tel.replace(/\D/g,'');
          setTimeout(() => window.open(`https://wa.me/${tel}?text=${encodeURIComponent(msg)}`, '_blank'), 300);
        }
      }
    }
    updateSite(nextSite);
  }
  function togglePaiement(cmd){
    updateCommande({ ...cmd, paiement: cmd.paiement === 'paye' ? 'impaye' : 'paye' });
  }

  return (
    <div>
      <PageHeader
        title="Commandes"
        subtitle={`${site.commandes.length} commande(s) au total`}
        right={editable ? <button className="btn btn-rust" onClick={()=>setShowNew(true)}><Icon name="plus" size={15}/> Nouvelle commande</button> : null}
      />

      <div style={{display:'flex', gap:10, marginBottom:18, flexWrap:'wrap', alignItems:'center'}}>
        <div style={{position:'relative', flex:'1 1 240px', maxWidth:320}}>
          <input type="text" placeholder="Rechercher (n° ticket, client)…" value={search} onChange={e=>setSearch(e.target.value)} style={{paddingLeft:34}}/>
          <Icon name="search" size={15} style={{position:'absolute', left:11, top:11, color:'var(--steam)'}}/>
        </div>
        {['Toutes', ...STATUTS].map(s => (
          <button key={s} onClick={()=>setFilter(s)} className="btn btn-sm" style={{
            background: filter===s ? 'var(--pine)' : 'transparent',
            color: filter===s ? 'var(--white)' : 'var(--ink)',
            borderColor: filter===s ? 'var(--pine)' : 'var(--line-strong)'
          }}>{s}</button>
        ))}
      </div>

      <div className="card" style={{overflow:'hidden'}}>
        <table style={{width:'100%', borderCollapse:'collapse', fontSize:13.5}}>
          <thead>
            <tr style={{background:'var(--paper-2)', textAlign:'left'}}>
              <th style={th}>Ticket</th>
              <th style={th}>Client</th>
              <th style={th}>Articles</th>
              <th style={th}>Total</th>
              <th style={th}>Statut</th>
              <th style={th}>Paiement</th>
              <th style={th}>Dépôt</th>
              <th style={th}></th>
            </tr>
          </thead>
          <tbody>
            {filtered.length === 0 && (
              <tr><td colSpan={8} style={{...td, textAlign:'center', color:'var(--steam)', padding:'2rem'}}>Aucune commande ne correspond.</td></tr>
            )}
            {filtered.map(cmd => {
              const client = site.clients.find(c => c.id === cmd.clientId);
              const total = calcCommandeTotal(cmd, site.services);
              return (
                <tr key={cmd.id} style={{borderTop:'1px solid var(--line)'}}>
                  <td style={{...td}}><span className="mono" style={{fontWeight:600}}>{cmd.numero}</span></td>
                  <td style={td}>{client ? client.nom : '—'}</td>
                  <td style={td}>{cmd.lignes.reduce((s,l)=>s+l.qte,0)} article(s)</td>
                  <td style={td}>
                    <div className="mono">{fmtGNF(total)}</div>
                    {Number(cmd.acompte) > 0 && total > Number(cmd.acompte) && (
                      <div style={{fontSize:11.5, color:'var(--danger)'}}>Solde: {fmtGNF(total - Number(cmd.acompte))}</div>
                    )}
                  </td>
                  <td style={td}><span className={`tag ${STATUT_TAG_CLASS[cmd.statut]}`}>{cmd.statut}</span></td>
                  <td style={td}><span className={`tag ${cmd.paiement==='paye'?'tag-paye':'tag-impaye'}`}>{cmd.paiement==='paye'?'Payé':Number(cmd.acompte)>0?'Partiel':'Impayé'}</span></td>
                  <td style={td}>{fmtDate(cmd.dateCreation.slice(0,10))}</td>
                  <td style={{...td, textAlign:'right'}}>
                    <div style={{display:'flex', gap:6, justifyContent:'flex-end', flexWrap:'wrap'}}>
                      <button className="btn btn-ghost btn-sm" onClick={()=>setOpenTicket(cmd)}>Voir</button>
                      {editable && client && client.tel && (
                        <button className="btn btn-sm" style={{background:'#25D366', color:'white', borderColor:'#25D366', padding:'6px 10px'}}
                          onClick={()=>{
                            const tel = client.tel.replace(/\D/g,'');
                            const solde = total - (Number(cmd.acompte)||0);
                            const msg = encodeURIComponent(`Bonjour ${client.nom}, votre commande ${cmd.numero} chez ${site.nom} est prete.${solde>0?` Solde a regler : ${fmtGNF(solde)}.`:' Entierement payee.'} Merci !`);
                            window.open(`https://wa.me/${tel}?text=${msg}`, '_blank');
                          }}>📱</button>
                      )}
                      {editable && cmd.statut !== 'Récupéré' && (
                        <button className="btn btn-sm" onClick={()=>advanceStatut(cmd)}>→ {nextStatut(cmd.statut)}</button>
                      )}
                      {editable && (
                        <button className="btn btn-sm" onClick={()=>togglePaiement(cmd)}>{cmd.paiement==='paye' ? 'Marquer impayé' : 'Marquer payé'}</button>
                      )}
                    </div>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {showNew && <NewCommandeModal site={site} updateSite={updateSite} employeId={employeId} onClose={()=>setShowNew(false)} />}
      {openTicket && <TicketModal cmd={openTicket} site={site} onClose={()=>setOpenTicket(null)} />}
    </div>
  );
}

const th = { padding:'10px 14px', fontSize:12, fontWeight:700, color:'var(--pine)', textTransform:'uppercase', letterSpacing:'0.03em' };
const td = { padding:'10px 14px' };

function NewCommandeModal({ site, updateSite, onClose, employeId }){
  const [clientId, setClientId] = useState('');
  const [clientSearch, setClientSearch] = useState('');
  const [newClientMode, setNewClientMode] = useState(false);
  const [newClientNom, setNewClientNom] = useState('');
  const [newClientTel, setNewClientTel] = useState('');
  const [lignes, setLignes] = useState([]);
  const [dateRetrait, setDateRetrait] = useState('');
  const [notes, setNotes] = useState('');
  const [acompte, setAcompte] = useState('');
  const [acompteMode, setAcompteMode] = useState('none'); // 'none' | 'pourcent' | 'libre'
  const [rabaisMode, setRabaisMode] = useState('none'); // 'none' | 'pourcent' | 'fixe'
  const [rabais, setRabais] = useState('');
  const [showAddService, setShowAddService] = useState(false);
  const [newServiceNom, setNewServiceNom] = useState('');
  const [newServicePrix, setNewServicePrix] = useState('');
  const [newServiceCat, setNewServiceCat] = useState('Nettoyage complet');
  const [editServiceId, setEditServiceId] = useState(null);

  const clientMatches = useMemo(() => {
    if(!clientSearch.trim()) return site.clients.slice(0,5);
    const q = clientSearch.toLowerCase();
    return site.clients.filter(c => c.nom.toLowerCase().includes(q) || (c.tel||'').includes(q)).slice(0,5);
  }, [clientSearch, site.clients]);

  function addLigne(serviceId){
    setLignes(prev => {
      const exist = prev.find(l => l.serviceId === serviceId);
      if(exist) return prev.map(l => l.serviceId===serviceId ? {...l, qte:l.qte+1} : l);
      return [...prev, { serviceId, qte:1 }];
    });
  }
  function setQte(serviceId, qte){
    setLignes(prev => prev.map(l => l.serviceId===serviceId ? {...l, qte: Math.max(0,qte)} : l).filter(l=>l.qte>0));
  }

  const totalBrut = lignes.reduce((s,l)=>{
    const svc = site.services.find(x=>x.id===l.serviceId);
    return s + (svc ? svc.prix*l.qte : 0);
  }, 0);

  const montantRabais = useMemo(() => {
    if(rabaisMode === 'pourcent' && rabais) return Math.round(totalBrut * Number(rabais) / 100);
    if(rabaisMode === 'fixe' && rabais) return Math.min(Number(rabais), totalBrut);
    return 0;
  }, [totalBrut, rabaisMode, rabais]);

  const total = totalBrut - montantRabais;

  function handleSubmit(){
    let finalClientId = clientId;
    let workingClients = site.clients;
    if(newClientMode){
      if(!newClientNom.trim()) return;
      const newClient = { id: uid('cli_'), nom: newClientNom.trim(), tel: newClientTel.trim(), canalPref:'SMS', dateInscription: todayISO() };
      workingClients = [...site.clients, newClient];
      finalClientId = newClient.id;
    }
    if(!finalClientId || lignes.length === 0) return;

    const seq = site.seq;
    const montantAcompte = Number(acompte) || 0;
    const cmd = {
      id: uid('cmd_'),
      numero: ticketNumber(site.code, seq),
      clientId: finalClientId,
      caissierEmpId: employeId || null,
      lignes,
      statut: 'Reçu',
      paiement: montantAcompte >= total ? 'paye' : 'impaye',
      acompte: montantAcompte,
      rabais: montantRabais,
      totalBrut: totalBrut,
      dateCreation: new Date().toISOString(),
      dateRetraitPrevue: dateRetrait || null,
      notes: notes.trim(),
    };
    const client = workingClients.find(c=>c.id===finalClientId);

    // Reçu de dépose à envoyer au client
    const lignesDetail = lignes.map(l => {
      const svc = site.services.find(x=>x.id===l.serviceId);
      return svc ? `${l.qte}x ${svc.nom} (${fmtGNF(svc.prix*l.qte)})` : '';
    }).filter(Boolean).join('\n');

    const msgDepose = `🧺 Reçu de dépôt — ${site.nom}\nCommande : ${cmd.numero}\n\n${lignesDetail}${montantRabais>0?`\nRabais : -${fmtGNF(montantRabais)}`:''}\nTotal : ${fmtGNF(total)}${montantAcompte>0?`\nAcompte versé : ${fmtGNF(montantAcompte)}\nSolde restant : ${fmtGNF(total-montantAcompte)}`:'\nPaiement : À la récupération'}${cmd.dateRetraitPrevue?`\nRetrait prévu : ${fmtDate(cmd.dateRetraitPrevue)}`:''}\n\nMerci pour votre confiance !`;

    const notif = { id: uid('notif_'), clientId: finalClientId, message: msgDepose, canal: client.canalPref || 'SMS', date: new Date().toISOString() };

    updateSite({
      ...site,
      seq: seq+1,
      clients: workingClients,
      commandes: [cmd, ...site.commandes],
      notifications: [notif, ...site.notifications].slice(0,300),
    });

    // Ouvrir WhatsApp automatiquement si le client a un numéro
    if(client.tel){
      const tel = client.tel.replace(/\D/g,'');
      setTimeout(() => window.open(`https://wa.me/${tel}?text=${encodeURIComponent(msgDepose)}`, '_blank'), 300);
    }

    onClose();
  }

  return (
    <ModalShell title="Nouvelle commande" onClose={onClose} width={620}>
      <div style={{display:'grid', gap:18}}>
        <div>
          <label>Client</label>
          {!newClientMode ? (
            <>
              <input type="text" placeholder="Rechercher un client…" value={clientSearch} onChange={e=>{setClientSearch(e.target.value); setClientId('');}} />
              <div style={{marginTop:6, display:'flex', flexWrap:'wrap', gap:6}}>
                {clientMatches.map(c => (
                  <button key={c.id} className="btn btn-sm" onClick={()=>{setClientId(c.id); setClientSearch(c.nom);}}
                    style={{background: clientId===c.id?'var(--pine-light)':'transparent', borderColor: clientId===c.id?'var(--pine)':'var(--line-strong)'}}>
                    {c.nom}
                  </button>
                ))}
              </div>
              <button className="btn btn-ghost btn-sm" style={{marginTop:8}} onClick={()=>setNewClientMode(true)}>+ Créer un nouveau client</button>
            </>
          ) : (
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10}}>
              <input type="text" placeholder="Nom complet" value={newClientNom} onChange={e=>setNewClientNom(e.target.value)} />
              <input type="tel" placeholder="Téléphone" value={newClientTel} onChange={e=>setNewClientTel(e.target.value)} />
              <button className="btn btn-ghost btn-sm" style={{gridColumn:'1/-1', justifySelf:'start'}} onClick={()=>setNewClientMode(false)}>← Choisir un client existant</button>
            </div>
          )}
        </div>

        <div>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8}}>
            <label style={{margin:0}}>Articles</label>
            <button className="btn btn-ghost btn-sm" style={{fontSize:12, color:'var(--pine)'}}
              onClick={()=>setShowAddService(!showAddService)}>
              {showAddService ? '← Masquer' : '+ Nouvel article / Modifier prix'}
            </button>
          </div>

          {/* Formulaire ajout/édition rapide d'un article */}
          {showAddService && (
            <div style={{background:'var(--paper-2)', borderRadius:8, padding:'12px', marginBottom:12}}>
              <div style={{display:'grid', gridTemplateColumns:'1.5fr 0.8fr 1fr auto', gap:8, alignItems:'end'}}>
                <div>
                  <label>Nom de l'article</label>
                  <input type="text" placeholder="Ex: Chemise, Pantalon…" value={newServiceNom} onChange={e=>setNewServiceNom(e.target.value)} />
                </div>
                <div>
                  <label>Prix (GNF)</label>
                  <input type="number" placeholder="0" value={newServicePrix} onChange={e=>setNewServicePrix(e.target.value)} />
                </div>
                <div>
                  <label>Type de service</label>
                  <select value={newServiceCat} onChange={e=>setNewServiceCat(e.target.value)}>
                    <option>Nettoyage complet</option>
                    <option>Repassage</option>
                    <option>Nettoyage + Repassage</option>
                    <option>Retouche</option>
                    <option>Maison</option>
                    <option>Autres</option>
                  </select>
                </div>
                <button className="btn btn-rust btn-sm" style={{alignSelf:'end'}}
                  disabled={!newServiceNom.trim()||!newServicePrix}
                  onClick={()=>{
                    if(editServiceId){
                      updateSite({ ...site, services: site.services.map(s => s.id===editServiceId ? {...s, nom:newServiceNom.trim(), prix:Number(newServicePrix), categorie:newServiceCat} : s) });
                      setEditServiceId(null);
                    } else {
                      updateSite({ ...site, services: [...site.services, { id: uid('svc_'), nom: newServiceNom.trim(), prix: Number(newServicePrix), categorie: newServiceCat }] });
                    }
                    setNewServiceNom(''); setNewServicePrix(''); setNewServiceCat('Nettoyage complet');
                  }}>
                  {editServiceId ? 'Modifier' : 'Ajouter'}
                </button>
              </div>
              {editServiceId && (
                <button className="btn btn-ghost btn-sm" style={{marginTop:8}} onClick={()=>{ setEditServiceId(null); setNewServiceNom(''); setNewServicePrix(''); }}>
                  Annuler la modification
                </button>
              )}

              {/* Liste des articles existants pour édition rapide */}
              <div style={{marginTop:12, maxHeight:160, overflowY:'auto'}}>
                <div style={{fontSize:12, color:'var(--steam)', marginBottom:6, fontWeight:600, textTransform:'uppercase', letterSpacing:'0.03em'}}>Cliquez sur un article pour modifier son prix</div>
                {site.services.map(s => (
                  <div key={s.id} style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'5px 0', borderBottom:'1px solid var(--line)', fontSize:13}}>
                    <span>{s.nom} <span style={{color:'var(--steam)', fontSize:11}}>· {s.categorie}</span></span>
                    <div style={{display:'flex', gap:8, alignItems:'center'}}>
                      <span className="mono">{fmtGNF(s.prix)}</span>
                      <button className="btn btn-ghost btn-sm" style={{padding:'3px 7px'}} onClick={()=>{
                        setEditServiceId(s.id);
                        setNewServiceNom(s.nom);
                        setNewServicePrix(String(s.prix));
                        setNewServiceCat(s.categorie);
                      }}><Icon name="edit" size={12}/></button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Articles groupés par catégorie */}
          {['Nettoyage complet','Repassage','Nettoyage + Repassage','Retouche','Maison','Autres','Nettoyage'].map(cat => {
            const items = site.services.filter(s => s.categorie === cat);
            if(items.length === 0) return null;
            return (
              <div key={cat} style={{marginBottom:10}}>
                <div style={{fontSize:11.5, fontWeight:700, color:'var(--pine)', textTransform:'uppercase', letterSpacing:'0.04em', marginBottom:6, paddingBottom:4, borderBottom:'1px solid var(--line)'}}>{cat}</div>
                <div style={{display:'grid', gridTemplateColumns:'repeat(2, 1fr)', gap:6}}>
                  {items.map(s => (
                    <button key={s.id} className="btn btn-sm" style={{justifyContent:'space-between', display:'flex', background: lignes.find(l=>l.serviceId===s.id) ? 'var(--pine-light)' : 'transparent', borderColor: lignes.find(l=>l.serviceId===s.id) ? 'var(--pine)' : 'var(--line-strong)'}} onClick={()=>addLigne(s.id)}>
                      <span>{s.nom}</span><span className="mono" style={{color:'var(--steam)'}}>{fmtGNF(s.prix)}</span>
                    </button>
                  ))}
                </div>
              </div>
            );
          })}
        </div>

        {lignes.length > 0 && (
          <div>
            <label>Panier</label>
            {lignes.map(l => {
              const svc = site.services.find(s=>s.id===l.serviceId);
              return (
                <div key={l.serviceId} style={{display:'flex', alignItems:'center', justifyContent:'space-between', padding:'6px 0', borderBottom:'1px solid var(--line)'}}>
                  <span style={{fontSize:13.5}}>{svc.nom}</span>
                  <div style={{display:'flex', alignItems:'center', gap:8}}>
                    <button className="btn btn-sm" style={{padding:'2px 9px'}} onClick={()=>setQte(l.serviceId, l.qte-1)}>−</button>
                    <span className="mono" style={{minWidth:18, textAlign:'center'}}>{l.qte}</span>
                    <button className="btn btn-sm" style={{padding:'2px 9px'}} onClick={()=>setQte(l.serviceId, l.qte+1)}>+</button>
                    <span className="mono" style={{minWidth:90, textAlign:'right'}}>{fmtGNF(svc.prix*l.qte)}</span>
                  </div>
                </div>
              );
            })}
            <div style={{display:'flex', justifyContent:'space-between', paddingTop:10, borderTop:'1px solid var(--line)'}}>
              <span style={{color:'var(--steam)'}}>Sous-total</span><span className="mono" style={{color:'var(--steam)'}}>{fmtGNF(totalBrut)}</span>
            </div>

            {/* BLOC RABAIS */}
            <div style={{paddingTop:8}}>
              <div style={{display:'flex', gap:8, marginBottom:8, flexWrap:'wrap'}}>
                {[{label:'Pas de rabais', val:'none'}, {label:'Rabais %', val:'pourcent'}, {label:'Montant fixe', val:'fixe'}].map(opt => (
                  <button key={opt.val} className="btn btn-sm" onClick={()=>{ setRabaisMode(opt.val); setRabais(''); }}
                    style={{background: rabaisMode===opt.val ? 'var(--rust)' : 'transparent', color: rabaisMode===opt.val ? 'var(--white)' : 'var(--ink)', borderColor: rabaisMode===opt.val ? 'var(--rust)' : 'var(--line-strong)', fontSize:12}}>
                    🏷️ {opt.label}
                  </button>
                ))}
              </div>
              {rabaisMode === 'pourcent' && (
                <div style={{display:'flex', gap:8, flexWrap:'wrap', marginBottom:6}}>
                  {[5, 10, 15, 20, 25].map(p => (
                    <button key={p} className="btn btn-sm" onClick={()=>setRabais(String(p))}
                      style={{background: rabais===String(p) ? 'var(--rust)' : 'transparent', color: rabais===String(p) ? 'var(--white)' : 'var(--ink)', borderColor: rabais===String(p) ? 'var(--rust)' : 'var(--line-strong)'}}>
                      {p}%
                    </button>
                  ))}
                  <input type="number" placeholder="Autre %" value={rabais} onChange={e=>setRabais(e.target.value)} style={{width:80, padding:'5px 8px'}} max={100} min={0}/>
                </div>
              )}
              {rabaisMode === 'fixe' && (
                <input type="number" placeholder="Montant du rabais (GNF)" value={rabais} onChange={e=>setRabais(e.target.value)} max={totalBrut} min={0}/>
              )}
              {montantRabais > 0 && (
                <div style={{display:'flex', justifyContent:'space-between', fontSize:13, color:'var(--rust)', marginTop:4}}>
                  <span>Rabais {rabaisMode==='pourcent' ? `(${rabais}%)` : 'fixe'}</span>
                  <span className="mono">− {fmtGNF(montantRabais)}</span>
                </div>
              )}
            </div>

            <div style={{display:'flex', justifyContent:'space-between', paddingTop:8, fontWeight:700, fontSize:16, borderTop:'2px solid var(--line-strong)'}}>
              <span>Total à payer</span><span className="mono" style={{color:'var(--pine)'}}>{fmtGNF(total)}</span>
            </div>
          </div>
        )}

        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10}}>
          <div>
            <label>Date de retrait prévue</label>
            <input type="date" value={dateRetrait} onChange={e=>setDateRetrait(e.target.value)} min={todayISO()} />
          </div>
          <div>
            <label>Notes (optionnel)</label>
            <input type="text" placeholder="Tache, bouton manquant…" value={notes} onChange={e=>setNotes(e.target.value)} />
          </div>
        </div>

        {/* PAIEMENT PARTIEL */}
        {total > 0 && (
          <div>
            <label>Paiement à la dépose</label>
            <div style={{display:'flex', gap:8, marginBottom:10, flexWrap:'wrap'}}>
              {[{label:'Pas de paiement', val:'none'}, {label:'Acompte %', val:'pourcent'}, {label:'Montant libre', val:'libre'}].map(opt => (
                <button key={opt.val} className="btn btn-sm" onClick={()=>{ setAcompteMode(opt.val); setAcompte(''); }}
                  style={{background: acompteMode===opt.val ? 'var(--pine)' : 'transparent', color: acompteMode===opt.val ? 'var(--white)' : 'var(--ink)', borderColor: acompteMode===opt.val ? 'var(--pine)' : 'var(--line-strong)'}}>
                  {opt.label}
                </button>
              ))}
            </div>
            {acompteMode === 'pourcent' && (
              <div style={{display:'flex', gap:8, flexWrap:'wrap'}}>
                {[25, 50, 75].map(p => {
                  const montant = Math.round(total * p / 100);
                  return (
                    <button key={p} className="btn btn-sm" onClick={()=>setAcompte(String(montant))}
                      style={{background: acompte===String(montant) ? 'var(--rust)' : 'transparent', color: acompte===String(montant) ? 'var(--white)' : 'var(--ink)', borderColor: acompte===String(montant) ? 'var(--rust)' : 'var(--line-strong)'}}>
                      {p}% — {fmtGNF(montant)}
                    </button>
                  );
                })}
              </div>
            )}
            {acompteMode === 'libre' && (
              <input type="number" placeholder="Montant payé maintenant (GNF)" value={acompte} onChange={e=>setAcompte(e.target.value)} max={total} />
            )}
            {acompte && Number(acompte) > 0 && (
              <div style={{marginTop:8, padding:'8px 12px', background:'var(--warn-light)', borderRadius:8, fontSize:13}}>
                <div style={{display:'flex', justifyContent:'space-between'}}>
                  <span>Acompte reçu :</span><span className="mono" style={{fontWeight:700}}>{fmtGNF(Number(acompte))}</span>
                </div>
                <div style={{display:'flex', justifyContent:'space-between', color:'var(--danger)'}}>
                  <span>Solde restant dû :</span><span className="mono" style={{fontWeight:700}}>{fmtGNF(total - Number(acompte))}</span>
                </div>
              </div>
            )}
          </div>
        )}

        <div style={{display:'flex', justifyContent:'flex-end', gap:10}}>
          <button className="btn" onClick={onClose}>Annuler</button>
          <button className="btn btn-rust" disabled={(!clientId && !newClientMode) || lignes.length===0} onClick={handleSubmit}>Créer le ticket</button>
        </div>
      </div>
    </ModalShell>
  );
}

/* ===================== CONFIRMATION SUPPRESSION AVEC MOT DE PASSE ===================== */

function ConfirmDelete({ message, onConfirm, onCancel, db }){
  const [pass, setPass] = useState('');
  const [error, setError] = useState('');

  function handleConfirm(){
    if(pass === getPassGerant(db)){
      onConfirm();
    } else {
      setError('Mot de passe incorrect.');
      setPass('');
    }
  }

  return (
    <div style={{
      position:'fixed', inset:0, background:'rgba(27,31,28,0.55)',
      display:'flex', alignItems:'center', justifyContent:'center', zIndex:100, padding:20
    }}>
      <div className="card" style={{width:380, maxWidth:'92vw', padding:'1.5rem'}}>
        <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:14, color:'var(--danger)'}}>
          <Icon name="alert" size={22} />
          <h2 style={{margin:0, fontSize:18, color:'var(--danger)'}}>Confirmer la suppression</h2>
        </div>
        <p style={{fontSize:14, color:'var(--ink)', marginBottom:16, lineHeight:1.5}}>{message}</p>
        <div style={{marginBottom:14}}>
          <label>Mot de passe gérant pour confirmer</label>
          <input
            type="password"
            placeholder="Entrez votre mot de passe…"
            value={pass}
            onChange={e=>{ setPass(e.target.value); setError(''); }}
            onKeyDown={e=>{ if(e.key==='Enter') handleConfirm(); }}
            autoFocus
          />
          {error && <p style={{color:'var(--danger)', fontSize:13, margin:'6px 0 0'}}>{error}</p>}
        </div>
        <div style={{display:'flex', gap:10, justifyContent:'flex-end'}}>
          <button className="btn" onClick={onCancel}>Annuler</button>
          <button className="btn" style={{background:'var(--danger)', borderColor:'var(--danger)', color:'var(--white)'}} onClick={handleConfirm}>
            Supprimer
          </button>
        </div>
      </div>
    </div>
  );
}

function ModalShell({ title, children, onClose, width=520 }){
  return (
    <div style={{
      position:'fixed', inset:0, background:'rgba(27,31,28,0.45)', display:'flex',
      alignItems:'center', justifyContent:'center', zIndex:50, padding:20
    }} onClick={(e)=>{ if(e.target === e.currentTarget) onClose(); }}>
      <div className="card" style={{width, maxWidth:'92vw', maxHeight:'88vh', overflowY:'auto', padding:'1.5rem'}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:18}}>
          <h2 style={{margin:0, fontSize:19, color:'var(--pine)'}}>{title}</h2>
          <button onClick={onClose} className="btn btn-ghost btn-sm" aria-label="Fermer"><Icon name="x" size={16}/></button>
        </div>
        {children}
      </div>
    </div>
  );
}

function TicketModal({ cmd, site, onClose }){
  const client = site.clients.find(c => c.id === cmd.clientId);
  const total = calcCommandeTotal(cmd, site.services);
  const acompte = Number(cmd.acompte) || 0;
  const solde = total - acompte;
  const caissier = cmd.caissierEmpId ? site.employes.find(e=>e.id===cmd.caissierEmpId) : null;

  function ouvrirWhatsApp(){
    if(!client || !client.tel) return;
    const tel = client.tel.replace(/\D/g,'');
    const msg = encodeURIComponent(
      `Bonjour ${client.nom}, votre commande ${cmd.numero} chez ${site.nom} est prête à récupérer.\nTotal : ${fmtGNF(total)}${solde > 0 ? `\nSolde restant : ${fmtGNF(solde)}` : ' (Payé)'}\nMerci !`
    );
    window.open(`https://wa.me/${tel}?text=${msg}`, '_blank');
  }

  return (
    <ModalShell title={`Ticket ${cmd.numero}`} onClose={onClose} width={420}>
      <div className="ticket-perfo" style={{background:'var(--paper-2)', borderRadius:10, padding:'1.25rem'}}>
        <div style={{textAlign:'center', marginBottom:14}}>
          <div style={{fontWeight:700, fontSize:16}}>{site.nom}</div>
          <div style={{fontSize:12, color:'var(--steam)'}}>{site.adresse}</div>
          <div style={{fontSize:12, color:'var(--steam)'}}>{site.tel}</div>
        </div>
        <div style={{borderTop:'1px dashed var(--line-strong)', borderBottom:'1px dashed var(--line-strong)', padding:'10px 0', margin:'10px 0'}}>
          <div className="mono" style={{textAlign:'center', fontSize:15, fontWeight:700}}>{cmd.numero}</div>
          <div style={{textAlign:'center', fontSize:12, color:'var(--steam)'}}>{fmtDateTime(cmd.dateCreation)}</div>
        </div>
        <div style={{fontSize:13.5, marginBottom:8}}><strong>{client ? client.nom : 'Client inconnu'}</strong>{client && client.tel ? ` — ${client.tel}` : ''}</div>
        {cmd.lignes.map(l => {
          const svc = site.services.find(s=>s.id===l.serviceId);
          if(!svc) return null;
          return (
            <div key={l.serviceId} style={{display:'flex', justifyContent:'space-between', fontSize:13, padding:'3px 0'}}>
              <span>{l.qte}x {svc.nom}</span>
              <span className="mono">{fmtGNF(svc.prix*l.qte)}</span>
            </div>
          );
        })}
        {Number(cmd.rabais) > 0 && (
          <>
            <div style={{display:'flex', justifyContent:'space-between', fontSize:13, color:'var(--steam)', paddingTop:6}}>
              <span>Sous-total</span><span className="mono">{fmtGNF(cmd.totalBrut || total + Number(cmd.rabais))}</span>
            </div>
            <div style={{display:'flex', justifyContent:'space-between', fontSize:13, color:'var(--rust)', paddingTop:2}}>
              <span>🏷️ Rabais</span><span className="mono">− {fmtGNF(Number(cmd.rabais))}</span>
            </div>
          </>
        )}
        <div style={{borderTop:'1px dashed var(--line-strong)', marginTop:6, paddingTop:8, display:'flex', justifyContent:'space-between', fontWeight:700}}>
          <span>Total à payer</span><span className="mono">{fmtGNF(total)}</span>
        </div>
        {acompte > 0 && (
          <>
            <div style={{display:'flex', justifyContent:'space-between', fontSize:13, color:'var(--ok)', paddingTop:4}}>
              <span>Acompte versé</span><span className="mono">{fmtGNF(acompte)}</span>
            </div>
            <div style={{display:'flex', justifyContent:'space-between', fontSize:13.5, fontWeight:700, color: solde > 0 ? 'var(--danger)' : 'var(--ok)', paddingTop:4, borderTop:'1px dashed var(--line)'}}>
              <span>{solde > 0 ? 'Solde restant dû' : 'Entièrement payé ✓'}</span>
              <span className="mono">{solde > 0 ? fmtGNF(solde) : ''}</span>
            </div>
          </>
        )}
        <div style={{marginTop:10, display:'flex', justifyContent:'space-between', fontSize:12.5}}>
          <span className={`tag ${STATUT_TAG_CLASS[cmd.statut]}`}>{cmd.statut}</span>
          <span className={`tag ${cmd.paiement==='paye'?'tag-paye':'tag-impaye'}`}>{cmd.paiement==='paye'?'Payé':'Impayé'}</span>
        </div>
        {cmd.dateRetraitPrevue && <div style={{fontSize:12, color:'var(--steam)', marginTop:8}}>Retrait prévu : {fmtDate(cmd.dateRetraitPrevue)}</div>}
        {cmd.notes && <div style={{fontSize:12, color:'var(--steam)', marginTop:4}}>Note : {cmd.notes}</div>}
        <div style={{borderTop:'1px dashed var(--line-strong)', marginTop:10, paddingTop:8, fontSize:11.5, color:'var(--steam)', display:'flex', justifyContent:'space-between'}}>
          <span>Enregistré par : <strong style={{color:'var(--ink)'}}>{caissier ? caissier.nom : 'Caissier'}</strong></span>
          <span className="mono">{new Date(cmd.dateCreation).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</span>
        </div>
      </div>
      <div className="no-print" style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:16}}>
        <button className="btn btn-sm" style={{background:'#25D366', color:'white', borderColor:'#25D366'}}
          onClick={ouvrirWhatsApp} disabled={!client || !client.tel}>
          📱 WhatsApp
        </button>
        <div style={{display:'flex', gap:8}}>
          <button className="btn btn-sm" onClick={()=>window.print()}><Icon name="print" size={14}/> Imprimer</button>
          <button className="btn btn-rust btn-sm" onClick={onClose}>Fermer</button>
        </div>
      </div>
    </ModalShell>
  );
}

/* ===================== CLIENTS ===================== */

function ClientsView({ site, updateSite }){
  const [search, setSearch] = useState('');
  const [selected, setSelected] = useState(null);
  const [showNew, setShowNew] = useState(false);
  const [editClient, setEditClient] = useState(null);

  const filtered = useMemo(() => {
    if(!search.trim()) return site.clients;
    const q = search.toLowerCase();
    return site.clients.filter(c => c.nom.toLowerCase().includes(q) || (c.tel||'').includes(q));
  }, [site.clients, search]);

  function clientStats(clientId){
    const cmds = site.commandes.filter(c => c.clientId === clientId);
    const total = cmds.reduce((s,c)=>s+calcCommandeTotal(c, site.services), 0);
    const impaye = cmds.filter(c=>c.paiement==='impaye').reduce((s,c)=>s+calcCommandeTotal(c, site.services), 0);
    return { count: cmds.length, total, impaye };
  }

  function saveEditClient(updated){
    updateSite({ ...site, clients: site.clients.map(c => c.id===updated.id ? updated : c) });
    setEditClient(null);
  }

  return (
    <div>
      <PageHeader title="Clients" subtitle={`${site.clients.length} fiche(s) client`}
        right={<button className="btn btn-rust" onClick={()=>setShowNew(true)}><Icon name="plus" size={15}/> Nouveau client</button>} />

      <div style={{position:'relative', maxWidth:320, marginBottom:18}}>
        <input type="text" placeholder="Rechercher…" value={search} onChange={e=>setSearch(e.target.value)} style={{paddingLeft:34}}/>
        <Icon name="search" size={15} style={{position:'absolute', left:11, top:11, color:'var(--steam)'}}/>
      </div>

      <div style={{display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:14}}>
        {filtered.map(c => {
          const st = clientStats(c.id);
          return (
            <div key={c.id} className="card" style={{padding:'1.1rem 1.25rem'}}>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}>
                <div style={{cursor:'pointer', flex:1}} onClick={()=>setSelected(c)}>
                  <div style={{fontWeight:600, fontSize:15}}>{c.nom}</div>
                  <div style={{fontSize:12.5, color:'var(--steam)'}}>{c.tel || 'Pas de téléphone'}</div>
                </div>
                <div style={{display:'flex', gap:4}}>
                  {st.impaye > 0 && <span className="tag tag-impaye">{fmtGNF(st.impaye)}</span>}
                  <button className="btn btn-ghost btn-sm" style={{padding:'4px 7px'}} onClick={()=>setEditClient(c)} title="Modifier">
                    <Icon name="edit" size={13}/>
                  </button>
                </div>
              </div>
              <div style={{display:'flex', gap:14, marginTop:12, fontSize:12.5, color:'var(--steam)', cursor:'pointer'}} onClick={()=>setSelected(c)}>
                <span>{st.count} commande(s)</span>
                <span className="mono">{fmtGNF(st.total)} cumulé</span>
              </div>
            </div>
          );
        })}
        {filtered.length === 0 && <p style={{color:'var(--steam)'}}>Aucun client trouvé.</p>}
      </div>

      {showNew && <NewClientModal site={site} updateSite={updateSite} onClose={()=>setShowNew(false)} />}
      {selected && <ClientDetailModal client={selected} site={site} onClose={()=>setSelected(null)} onEdit={(c)=>{ setSelected(null); setEditClient(c); }} />}
      {editClient && <EditClientModal client={editClient} onSave={saveEditClient} onClose={()=>setEditClient(null)} />}
    </div>
  );
}

function NewClientModal({ site, updateSite, onClose }){
  const [nom, setNom] = useState('');
  const [tel, setTel] = useState('');
  const [email, setEmail] = useState('');
  const [canalPref, setCanalPref] = useState('SMS');

  function submit(){
    if(!nom.trim()) return;
    const client = { id: uid('cli_'), nom: nom.trim(), tel: tel.trim(), email: email.trim(), canalPref, dateInscription: todayISO() };
    updateSite({ ...site, clients: [...site.clients, client] });
    onClose();
  }

  return (
    <ModalShell title="Nouveau client" onClose={onClose} width={420}>
      <div style={{display:'grid', gap:14}}>
        <div><label>Nom complet</label><input type="text" value={nom} onChange={e=>setNom(e.target.value)} autoFocus/></div>
        <div><label>Téléphone</label><input type="tel" value={tel} onChange={e=>setTel(e.target.value)} /></div>
        <div><label>Email (optionnel)</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} /></div>
        <div>
          <label>Canal de notification préféré</label>
          <select value={canalPref} onChange={e=>setCanalPref(e.target.value)}>

        </div>
      </div>

  );
}

    <ModalShell title={client.nom} onClose={onClose} width={560}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:18}}>
        <div style={{display:'flex', gap:20, fontSize:13.5, color:'var(--steam)', flexWrap:'wrap'}}>
          {client.tel && <span><Icon name="phone" size={13} style={{verticalAlign:-2, marginRight:4}}/>{client.tel}</span>}
          {client.email && <span><Icon name="mail" size={13} style={{verticalAlign:-2, marginRight:4}}/>{client.email}</span>}
          <span>Client depuis {fmtDate(client.dateInscription)}</span>

      <div style={{display:'flex', gap:14, marginBottom:18}}>

      </div>

      <div style={{maxHeight:280, overflowY:'auto'}}>
        {cmds.length === 0 && <p style={{fontSize:13, color:'var(--steam)'}}>Aucune commande pour ce client.</p>}
        {cmds.map(c => (
          <div key={c.id} style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'8px 0', borderBottom:'1px solid var(--line)', fontSize:13}}>
            <div>
              <span className="mono" style={{fontWeight:600}}>{c.numero}</span>
              <span style={{color:'var(--steam)', marginLeft:8}}>{fmtDate(c.dateCreation.slice(0,10))}</span>
            </div>
            <div style={{display:'flex', gap:8, alignItems:'center'}}>
              <span className={`tag ${STATUT_TAG_CLASS[c.statut]}`}>{c.statut}</span>
              <span className="mono">{fmtGNF(calcCommandeTotal(c, site.services))}</span>
            </div>
          </div>
        ))}
      </div>
    </ModalShell>
  );
}

function EditClientModal({ client, onSave, onClose }){

  const [tel, setTel] = useState(client.tel || '');
  const [email, setEmail] = useState(client.email || '');

        <div><label>Téléphone</label><input type="tel" value={tel} onChange={e=>setTel(e.target.value)} /></div>
        <div><label>Email (optionnel)</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} /></div>

          <label>Canal de notification préféré</label>

        </div>

/* ===================== STOCK ===================== */

function StockView({ site, updateSite }){
  const [showNew, setShowNew] = useState(false);
  const [confirmItem, setConfirmItem] = useState(null);
  const [editItem, setEditItem] = useState(null);

  function adjust(id, delta){
    updateSite({ ...site, stock: site.stock.map(s => s.id===id ? {...s, quantite: Math.max(0, s.quantite+delta)} : s) });
  }
  function removeItem(id){
    updateSite({ ...site, stock: site.stock.filter(s => s.id !== id) });
  }
  function saveEdit(){
    if(!editItem) return;
    updateSite({ ...site, stock: site.stock.map(s => s.id===editItem.id ? editItem : s) });
    setEditItem(null);
  }

  return (
    <div>
      <PageHeader title="Stock" subtitle="Consommables et fournitures"
        right={<button className="btn btn-rust" onClick={()=>setShowNew(true)}><Icon name="plus" size={15}/> Ajouter un article</button>} />

      <div className="card" style={{overflow:'hidden'}}>
        <table style={{width:'100%', borderCollapse:'collapse', fontSize:13.5}}>
          <thead>
            <tr style={{background:'var(--paper-2)', textAlign:'left'}}>
              <th style={th}>Article</th>
              <th style={th}>Quantité</th>
              <th style={th}>Seuil d'alerte</th>
              <th style={th}>Statut</th>
              <th style={th}></th>
            </tr>
          </thead>
          <tbody>
            {site.stock.map(s => {
              const low = s.quantite <= s.seuil;
              return (
                <tr key={s.id} style={{borderTop:'1px solid var(--line)'}}>
                  <td style={td}>{s.nom} <span style={{fontSize:11.5, color:'var(--steam)'}}>({s.unite})</span></td>
                  <td style={td}>
                    <div style={{display:'flex', alignItems:'center', gap:8}}>
                      <button className="btn btn-sm" style={{padding:'2px 9px'}} onClick={()=>adjust(s.id,-1)}>−</button>
                      <span className="mono">{s.quantite} {s.unite}</span>
                      <button className="btn btn-sm" style={{padding:'2px 9px'}} onClick={()=>adjust(s.id,1)}>+</button>
                    </div>
                  </td>
                  <td style={td} className="mono">{s.seuil} {s.unite}</td>
                  <td style={td}>{low ? <span className="tag tag-impaye">Stock bas</span> : <span className="tag tag-paye">OK</span>}</td>
                  <td style={{...td, textAlign:'right'}}>
                    <div style={{display:'flex', gap:6, justifyContent:'flex-end'}}>
                      <button className="btn btn-ghost btn-sm" onClick={()=>setEditItem({...s})} title="Modifier"><Icon name="edit" size={14}/></button>
                      <button className="btn btn-ghost btn-sm" style={{color:'var(--danger)'}} onClick={()=>setConfirmItem(site.stock.find(x=>x.id===s.id))} title="Supprimer"><Icon name="trash" size={14}/></button>
                    </div>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {showNew && <NewStockModal site={site} updateSite={updateSite} onClose={()=>setShowNew(false)} />}

      {confirmItem && <ConfirmDelete db={db}
        message={`Supprimer « ${confirmItem.nom} » du stock ?`}
        onConfirm={()=>{ removeItem(confirmItem.id); setConfirmItem(null); }}
        onCancel={()=>setConfirmItem(null)}
      />}

      {editItem && (
        <ModalShell title="Modifier l'article" onClose={()=>setEditItem(null)} width={400}>
          <div style={{display:'grid', gap:14}}>
            <div><label>Nom de l'article</label>
              <input type="text" value={editItem.nom} onChange={e=>setEditItem({...editItem, nom:e.target.value})} autoFocus/>
            </div>
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10}}>
              <div><label>Quantité actuelle</label>
                <input type="number" value={editItem.quantite} onChange={e=>setEditItem({...editItem, quantite:Number(e.target.value)})} />
              </div>
              <div><label>Unité</label>
                <input type="text" value={editItem.unite} onChange={e=>setEditItem({...editItem, unite:e.target.value})} />
              </div>
            </div>
            <div><label>Seuil d'alerte</label>
              <input type="number" value={editItem.seuil} onChange={e=>setEditItem({...editItem, seuil:Number(e.target.value)})} />
            </div>
            <div style={{display:'flex', justifyContent:'flex-end', gap:10}}>
              <button className="btn" onClick={()=>setEditItem(null)}>Annuler</button>
              <button className="btn btn-rust" disabled={!editItem.nom.trim()} onClick={saveEdit}>Enregistrer</button>
            </div>
          </div>
        </ModalShell>
      )}
    </div>
  );
}

/* ===================== EQUIPE ===================== */

function EquipeView({ site, updateSite }){
  const [showNew, setShowNew] = useState(false);
  const [showPass, setShowPass] = useState({});
  const [confirmEmp, setConfirmEmp] = useState(null);
  const [editPassEmp, setEditPassEmp] = useState(null);
  const [newPass, setNewPass] = useState('');
  const [showNewPass, setShowNewPass] = useState(false);
  const [passFlash, setPassFlash] = useState(false);

  function removeEmp(id){
    updateSite({ ...site, employes: site.employes.filter(e=>e.id!==id) });
  }
  function togglePass(id){ setShowPass(prev => ({...prev, [id]: !prev[id]})); }
  function saveNewPass(){
    if(!newPass.trim()) return;
    updateSite({ ...site, employes: site.employes.map(e => e.id===editPassEmp.id ? {...e, motdepasse: newPass.trim()} : e) });
    setPassFlash(true);
    setTimeout(()=>{ setPassFlash(false); setEditPassEmp(null); setNewPass(''); }, 1500);
  }

  return (
    <div>
      <PageHeader title="Équipe" subtitle={`${site.employes.length} employé(s) — ${site.nom}`}
        right={<button className="btn btn-rust" onClick={()=>setShowNew(true)}><Icon name="plus" size={15}/> Ajouter un employé</button>} />
      <div style={{display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:14}}>
        {site.employes.map(e => (
          <div key={e.id} className="card" style={{padding:'1.1rem 1.25rem'}}>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}>
              <div>
                <div style={{fontWeight:600, fontSize:14.5}}>{e.nom}</div>
                <div style={{fontSize:12.5, color:'var(--steam)'}}>{e.role}</div>
              </div>
              <button className="btn btn-ghost btn-sm" style={{color:'var(--danger)'}} onClick={()=>setConfirmEmp(e)}><Icon name="trash" size={14}/></button>
            </div>
            <div style={{marginTop:10, display:'flex', alignItems:'center', gap:8, flexWrap:'wrap'}}>
              <span className="mono" style={{fontSize:12, color:'var(--pine)', background:'var(--pine-light)', padding:'3px 8px', borderRadius:6}}>
                {showPass[e.id] ? (e.motdepasse || '—') : '••••••••'}
              </span>
              <button className="btn btn-ghost btn-sm" style={{padding:'3px 8px', fontSize:11}} onClick={()=>togglePass(e.id)}>
                {showPass[e.id] ? 'Masquer' : 'Voir mdp'}
              </button>
              <button className="btn btn-ghost btn-sm" style={{padding:'3px 8px', fontSize:11, color:'var(--rust)'}} onClick={()=>{ setEditPassEmp(e); setNewPass(''); setShowNewPass(false); }}>
                <Icon name="edit" size={12}/> Changer mdp
              </button>
            </div>
          </div>
        ))}
        {site.employes.length === 0 && <p style={{color:'var(--steam)'}}>Aucun employé enregistré pour ce site.</p>}
      </div>

      {showNew && <NewEmployeModal site={site} updateSite={updateSite} onClose={()=>setShowNew(false)} />}

      {editPassEmp && (
        <ModalShell title={`Changer le mot de passe — ${editPassEmp.nom}`} onClose={()=>{ setEditPassEmp(null); setNewPass(''); }} width={400}>
          <div style={{display:'grid', gap:14}}>
            <div>
              <label>Nouveau mot de passe</label>
              <div style={{display:'flex', gap:8}}>
                <input type={showNewPass ? 'text' : 'password'} placeholder="Nouveau mot de passe…" value={newPass} onChange={e=>setNewPass(e.target.value)} autoFocus />
                <button className="btn btn-ghost btn-sm" onClick={()=>setShowNewPass(!showNewPass)}>{showNewPass ? 'Masquer' : 'Voir'}</button>
              </div>
            </div>
            <p style={{fontSize:12.5, color:'var(--steam)', margin:0, lineHeight:1.5}}>
              L'employé devra utiliser ce nouveau mot de passe à sa prochaine connexion.
            </p>
            <div style={{display:'flex', justifyContent:'flex-end', gap:10}}>
              <button className="btn" onClick={()=>{ setEditPassEmp(null); setNewPass(''); }}>Annuler</button>
              <button className="btn btn-rust" disabled={!newPass.trim()} onClick={saveNewPass}>
                {passFlash ? <><Icon name="check" size={14}/> Modifié !</> : 'Enregistrer'}
              </button>
            </div>
          </div>
        </ModalShell>
      )}

      {confirmEmp && <ConfirmDelete db={db}
        message={`Supprimer définitivement l'employé « ${confirmEmp.nom} » ? Il ne pourra plus se connecter.`}
        onConfirm={()=>{ removeEmp(confirmEmp.id); setConfirmEmp(null); }}
        onCancel={()=>setConfirmEmp(null)}
      />}
    </div>
  );
}

/* ===================== DEPENSES ===================== */

const CATEGORIES_DEPENSES = ['Salaires', 'Électricité', 'Loyer', 'Fournitures', 'Autres'];

function DepensesView({ site, updateSite }){
  const [showNew, setShowNew] = useState(false);
  const [filterMois, setFilterMois] = useState(todayISO().slice(0,7));
  const [confirmDep, setConfirmDep] = useState(null);

  const depenses = (site.depenses || []);

  const filtered = useMemo(() => {
    return [...depenses]
      .filter(d => d.date.slice(0,7) === filterMois)
      .sort((a,b) => new Date(b.date) - new Date(a.date));
  }, [depenses, filterMois]);

  const totalMois = filtered.reduce((s,d) => s + Number(d.montant), 0);

  const parCategorie = useMemo(() => {
    const acc = {};
    filtered.forEach(d => {
      acc[d.categorie] = (acc[d.categorie]||0) + Number(d.montant);
    });
    return acc;
  }, [filtered]);

  function removeDepense(id){
    updateSite({ ...site, depenses: depenses.filter(d=>d.id!==id) });
  }

  // Liste des mois disponibles
  const moisDisponibles = useMemo(() => {
    const mois = new Set(depenses.map(d=>d.date.slice(0,7)));
    mois.add(todayISO().slice(0,7));
    return [...mois].sort().reverse();
  }, [depenses]);

  return (
    <div>
      <PageHeader title="Dépenses" subtitle={`Total ${filterMois} : ${fmtGNF(totalMois)}`}
        right={<button className="btn btn-rust" onClick={()=>setShowNew(true)}><Icon name="plus" size={15}/> Nouvelle dépense</button>} />

      {/* Filtre par mois */}
      <div style={{display:'flex', gap:10, marginBottom:18, alignItems:'center', flexWrap:'wrap'}}>
        <select value={filterMois} onChange={e=>setFilterMois(e.target.value)} style={{width:'auto', minWidth:160}}>
          {moisDisponibles.map(m => (
            <option key={m} value={m}>{new Date(m+'-01').toLocaleDateString('fr-FR',{month:'long',year:'numeric'})}</option>
          ))}
        </select>
      </div>

      {/* Résumé par catégorie */}
      {filtered.length > 0 && (
        <div style={{display:'grid', gridTemplateColumns:'repeat(5,1fr)', gap:10, marginBottom:20}}>
          {CATEGORIES_DEPENSES.map(cat => (
            <div key={cat} className="card" style={{padding:'0.9rem 1rem'}}>
              <div style={{fontSize:11.5, color:'var(--steam)', fontWeight:600, textTransform:'uppercase'}}>{cat}</div>
              <div className="mono" style={{fontSize:15, fontWeight:700, color:'var(--pine)', marginTop:4}}>{fmtGNF(parCategorie[cat]||0)}</div>
            </div>
          ))}
        </div>
      )}

      {/* Liste des dépenses */}
      <div className="card" style={{overflow:'hidden'}}>
        <table style={{width:'100%', borderCollapse:'collapse', fontSize:13.5}}>
          <thead>
            <tr style={{background:'var(--paper-2)', textAlign:'left'}}>
              <th style={th}>Date</th>
              <th style={th}>Description</th>
              <th style={th}>Catégorie</th>
              <th style={th}>Montant</th>
              <th style={th}></th>
            </tr>
          </thead>
          <tbody>
            {filtered.length === 0 && (
              <tr><td colSpan={5} style={{...td, textAlign:'center', color:'var(--steam)', padding:'2rem'}}>Aucune dépense enregistrée pour ce mois.</td></tr>
            )}
            {filtered.map(d => (
              <tr key={d.id} style={{borderTop:'1px solid var(--line)'}}>
                <td style={td}>{fmtDate(d.date)}</td>
                <td style={td}>{d.description}</td>
                <td style={td}><span className="tag tag-recu">{d.categorie}</span></td>
                <td style={{...td, color:'var(--danger)', fontWeight:600}} className="mono">{fmtGNF(d.montant)}</td>
                <td style={{...td, textAlign:'right'}}>
                  <button className="btn btn-ghost btn-sm" style={{color:'var(--danger)'}} onClick={()=>setConfirmDep(d)}>
                    <Icon name="trash" size={14}/>
                  </button>
                </td>
              </tr>
            ))}
            {filtered.length > 0 && (
              <tr style={{borderTop:'2px solid var(--line-strong)', background:'var(--paper-2)'}}>
                <td colSpan={3} style={{...td, fontWeight:700}}>Total {new Date(filterMois+'-01').toLocaleDateString('fr-FR',{month:'long',year:'numeric'})}</td>
                <td style={{...td, fontWeight:700}} className="mono">{fmtGNF(totalMois)}</td>
                <td></td>
              </tr>
            )}
          </tbody>
        </table>
      </div>

      {showNew && <NewDepenseModal site={site} updateSite={updateSite} onClose={()=>setShowNew(false)} />}
      {confirmDep && <ConfirmDelete db={db}
        message={`Supprimer la dépense « ${confirmDep.description} » (${fmtGNF(confirmDep.montant)}) ?`}
        onConfirm={()=>{ removeDepense(confirmDep.id); setConfirmDep(null); }}
        onCancel={()=>setConfirmDep(null)}
      />}
    </div>
  );
}
