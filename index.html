const fmtGNF = (n) => new Intl.NumberFormat('fr-FR',{style:'currency',currency:'GNF',maximumFractionDigits:0}).format(Math.round(n||0));

const fmtDate = (iso) => {
  if(!iso) return '—';
  const d = new Date(iso+'T00:00:00');
  return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'});
};
const fmtDateTime = (iso) => {
  if(!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short'}) + ' à ' + d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
};

function ticketNumber(siteCode, seq){
  const d = new Date();
  const yy = String(d.getFullYear()).slice(2);
  const mm = String(d.getMonth()+1).padStart(2,'0');
  return `${siteCode}-${yy}${mm}-${String(seq).padStart(4,'0')}`;
}

function siteCodeFromName(nom){
  const letters = nom.replace(/[^a-zA-Z]/g,'').toUpperCase();
  return (letters.slice(0,3) || 'PSG');
}

/* ===================== STORAGE LAYER (Firebase) ===================== */

const DB_KEY = 'pressing-db-v2';

async function storageGet(key){
  try{
    const snapshot = await firebaseDB.ref(key).get();
    if(snapshot.exists()) return snapshot.val();
    return null;
  }catch(e){ console.error('Firebase get failed', e); return null; }
}

async function storageSet(key, value){
  try{
    await firebaseDB.ref(key).set(value);
    return true;
  }catch(e){ console.error('Firebase set failed', e); return false; }
}

function subscribeToDB(key, callback){
  firebaseDB.ref(key).on('value', (snapshot) => {
    if(snapshot.exists()) callback(snapshot.val());
  });
  return () => firebaseDB.ref(key).off();
}

/* migration depuis l'ancien format mono-site (pressing-db-v1) si présent */
function migrateFromV1(oldRaw){
  try{
    const old = JSON.parse(oldRaw);
    if(!old || !old.entreprise) return null;
    const site = {
      id: uid('site_'),
      nom: old.entreprise.nom || 'Mon pressing',
      adresse: old.entreprise.adresse || '',
      tel: old.entreprise.tel || '',
      code: siteCodeFromName(old.entreprise.nom || 'PSG'),
      seq: old.seq || 1,
      services: old.services || defaultServices(),
      stock: old.stock || defaultStock(),
      clients: old.clients || [],
      commandes: old.commandes || [],
      notifications: old.notifications || [],
      employes: old.employes || [],
      depenses: old.depenses || [],
    };
    return { sites: [site] };
  }catch(e){ return null; }
}

const STATUTS = ['Reçu', 'En cours', 'Prêt', 'Récupéré'];
const STATUT_TAG_CLASS = { 'Reçu':'tag-recu', 'En cours':'tag-encours', 'Prêt':'tag-pret', 'Récupéré':'tag-recupere' };

/* ===================== MOTS DE PASSE ===================== */
/* ===================== MOTS DE PASSE ===================== */
const PASS_GERANT = "Dero1981@";

// Les mots de passe employés sont stockés dans la base de données Firebase
// et gérés par le gérant directement dans l'application.
// Format : { [mot_de_passe]: { nom, siteId } }

function checkEmployePass(db, password){
  for(const site of db.sites){
    for(const emp of (site.employes||[])){
      if(emp.motdepasse && emp.motdepasse === password){
        return { employe: emp, siteId: site.id };
      }
    }
  }
  return null;
}

/* ===================== APP ROOT ===================== */

function App(){
  const [db, setDb] = useState(null);
  const [loading, setLoading] = useState(true);
  const [role, setRole] = useState(null); // 'gerant' | 'employe' | 'client'
  const [currentSiteId, setCurrentSiteId] = useState(null);
  const [currentClientId, setCurrentClientId] = useState(null);
  const saveTimer = useRef(null);

  useEffect(() => {
    setLoading(true);
    // Écoute en temps réel Firebase — toutes les tablettes se synchronisent automatiquement
    const unsubscribe = subscribeToDB(DB_KEY, (data) => {
      try{
        const parsed = typeof data === 'string' ? JSON.parse(data) : data;
        setDb(parsed);
      }catch(e){ console.error('parse error', e); }
      setLoading(false);
    });

    // Premier chargement : si pas de données, crée la base vide
    (async () => {
      const raw = await storageGet(DB_KEY);
      if(!raw){
        const fresh = emptyDB();
        await storageSet(DB_KEY, JSON.stringify(fresh));
      }
    })();

    return unsubscribe;
  }, []);

  const persist = useCallback((next) => {
    setDb(next);
    if(saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      storageSet(DB_KEY, JSON.stringify(next));
    }, 400);
  }, []);

  if(loading || !db){
    return (
      <div style={{minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', color:'var(--pine)'}}>
        <div className="mono" style={{fontSize:13}}>Chargement…</div>
      </div>
    );
  }

  if(!role){
    return <RoleSelect db={db} setDb={persist} onSelect={(r, siteId, clientId) => { setRole(r); setCurrentSiteId(siteId||null); setCurrentClientId(clientId||null); }} />;
  }

  if(role === 'gerant') return <GerantApp db={db} setDb={persist} onLogout={()=>{setRole(null); setCurrentSiteId(null);}} />;
  if(role === 'employe') return <EmployeApp db={db} setDb={persist} siteId={currentSiteId} onLogout={()=>{setRole(null); setCurrentSiteId(null);}} />;
  if(role === 'client') return <ClientApp db={db} setDb={persist} siteId={currentSiteId} clientId={currentClientId} onLogout={()=>{setRole(null); setCurrentSiteId(null); setCurrentClientId(null);}} />;

  return null;
}

/* ===================== ECRAN CHOIX DE ROLE ===================== */

function RoleSelect({ db, setDb, onSelect }){
  const [mode, setMode] = useState(null);
  const [loginRole, setLoginRole] = useState(null); // 'gerant' | 'employe'
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');

  function handleLogin(){
    if(loginRole === 'gerant'){
      if(password === PASS_GERANT){
        onSelect('gerant');
      } else {
        setError('Mot de passe incorrect. Réessayez.');
        setPassword('');
      }
    } else if(loginRole === 'employe'){
      const result = checkEmployePass(db, password);
      if(result){
        onSelect('employe', result.siteId);
        setLoginRole(null);
        setPassword('');
        setError('');
      } else {
        setError('Mot de passe incorrect. Réessayez.');
        setPassword('');
      }
    }
  }

  if(loginRole){
    return (
      <div style={{minHeight:'100vh', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'2rem'}}>
        <div style={{textAlign:'center', marginBottom:'2rem'}}>
          <Icon name="shirt" size={30} style={{color:'var(--pine)'}} />
          <h1 style={{fontSize:28, margin:'10px 0 4px', color:'var(--pine)'}}>Maci Pressing</h1>
          <p style={{color:'var(--steam)', fontSize:14, margin:0}}>
            {loginRole === 'gerant' ? 'Espace Gérant' : 'Espace Employé'}
          </p>
        </div>
        <div className="card" style={{padding:'1.75rem', width:340, maxWidth:'90vw'}}>
          <label>Mot de passe</label>
          <input
            type="password"
            placeholder="Entrez votre mot de passe…"
            value={password}
            onChange={e=>{ setPassword(e.target.value); setError(''); }}
            onKeyDown={e=>{ if(e.key==='Enter') handleLogin(); }}
            autoFocus
          />
          {error && <p style={{color:'var(--danger)', fontSize:13, margin:'8px 0 0'}}>{error}</p>}
          <div style={{display:'flex', gap:10, marginTop:14}}>
            <button className="btn" onClick={()=>{ setLoginRole(null); setPassword(''); setError(''); }} style={{flex:1}}>Retour</button>
            <button className="btn btn-rust" onClick={handleLogin} style={{flex:1}}>Entrer</button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div style={{minHeight:'100vh', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'2rem'}}>
      <div style={{textAlign:'center', marginBottom:'2.5rem'}}>
        <div style={{display:'inline-flex', alignItems:'center', gap:10, color:'var(--pine)', marginBottom:14}}>
          <Icon name="shirt" size={30} />
        </div>
        <h1 style={{fontSize:34, margin:0, color:'var(--pine)'}}>Maci Pressing</h1>
        <p className="mono" style={{color:'var(--steam)', fontSize:13, marginTop:6}}>
          {db.sites.length > 1 ? `${db.sites.length} sites — choisissez votre espace` : 'Gestion de pressing — choisissez votre espace'}
        </p>
      </div>

      {!mode && (
        <div style={{display:'flex', gap:18, flexWrap:'wrap', justifyContent:'center', maxWidth:760}}>
          <RoleCard icon="home" title="Gérant" desc="Supervision de tous les sites, finances, stock" onClick={() => setLoginRole('gerant')} />
          <RoleCard icon="ticket" title="Employé" desc="Caisse, création et suivi des commandes" onClick={() => setLoginRole('employe')} />
          <RoleCard icon="users" title="Client" desc="Suivre mes commandes et factures" onClick={() => setMode('client')} />
        </div>
      )}

      {mode === 'employe' && (
        <SitePicker db={db} title="Quel pressing ?" onPick={(siteId) => onSelect('employe', siteId)} onBack={()=>setMode(null)} />
      )}

      {mode === 'client' && (
        <ClientLoginFlow db={db} onPick={(siteId, clientId) => onSelect('client', siteId, clientId)} onBack={()=>setMode(null)} />
      )}
    </div>
  );
}

function SitePicker({ db, title, onPick, onBack }){
  return (
    <div className="card" style={{marginTop:24, padding:'1.25rem', width:380, maxWidth:'90vw'}}>
      <label>{title}</label>
      <div style={{display:'grid', gap:8, marginTop:6}}>
        {db.sites.map(s => (
          <button key={s.id} className="btn" style={{width:'100%', textAlign:'left', display:'flex', justifyContent:'space-between', alignItems:'center'}} onClick={()=>onPick(s.id)}>
            <span>{s.nom}</span>
            <span className="mono" style={{fontSize:11.5, color:'var(--steam)'}}>{s.code}</span>
          </button>
        ))}
      </div>
      <button className="btn btn-ghost btn-sm" style={{marginTop:10}} onClick={onBack}>← Retour</button>
    </div>
  );
}

function ClientLoginFlow({ db, onPick, onBack }){
  const [siteId, setSiteId] = useState(db.sites.length === 1 ? db.sites[0].id : null);
  const [search, setSearch] = useState('');

  const site = db.sites.find(s => s.id === siteId);
  const matches = useMemo(() => {
    if(!site || !search.trim()) return [];
    const q = search.toLowerCase();
    return site.clients.filter(c => c.nom.toLowerCase().includes(q) || (c.tel||'').includes(q)).slice(0,6);
  }, [search, site]);

  if(!siteId){
    return <SitePicker db={db} title="Vous êtes client de quel pressing ?" onPick={setSiteId} onBack={onBack} />;
  }

  return (
    <div className="card" style={{marginTop:24, padding:'1.25rem', width:380, maxWidth:'90vw'}}>
      <label>Trouvez votre fiche client — {site.nom}</label>
      <input type="text" placeholder="Nom ou téléphone…" value={search} onChange={e=>setSearch(e.target.value)} autoFocus />
      <div style={{marginTop:10, maxHeight:220, overflowY:'auto'}}>
        {search && matches.length === 0 && (
          <p style={{fontSize:13, color:'var(--steam)', margin:'8px 0'}}>Aucun client trouvé. Demandez à l'accueil de créer votre fiche.</p>
        )}
        {matches.map(c => (
          <button key={c.id} className="btn" style={{width:'100%', textAlign:'left', marginBottom:6, display:'flex', justifyContent:'space-between'}} onClick={() => onPick(siteId, c.id)}>
            <span>{c.nom}</span>
            <span className="mono" style={{color:'var(--steam)', fontSize:12}}>{c.tel}</span>
          </button>
        ))}
      </div>
      <div style={{display:'flex', gap:8, marginTop:8}}>
        {db.sites.length > 1 && <button className="btn btn-ghost btn-sm" onClick={()=>setSiteId(null)}>← Changer de site</button>}
        <button className="btn btn-ghost btn-sm" onClick={onBack}>Annuler</button>
      </div>
    </div>
  );
}

function RoleCard({ icon, title, desc, onClick }){

      <div style={{marginTop:14, display:'flex', alignItems:'center', gap:6, color:'var(--pine)', fontSize:13, fontWeight:600}}>

/* ===================== SHELL COMMUN ===================== */

/* ===================== LOGIQUE METIER ===================== */

function calcCommandeTotal(commande, services){
  return commande.lignes.reduce((sum, l) => {
    const svc = services.find(s => s.id === l.serviceId);
    const prix = svc ? svc.prix : 0;
    return sum + prix * l.qte;
  }, 0);
}

function pushNotification(site, updateSite, { clientId, message, canal }){
  const notif = { id: uid('notif_'), clientId, message, canal, date: new Date().toISOString() };
  updateSite({ ...site, notifications: [notif, ...site.notifications].slice(0, 300) });
}

/* ===================== ESPACE GERANT (multi-sites) ===================== */

function GerantApp({ db, setDb, onLogout }){
  const [page, setPage] = useState('global');
  const [activeSiteId, setActiveSiteId] = useState(null);

  function updateSite(updatedSite){
    setDb({ ...db, sites: db.sites.map(s => s.id === updatedSite.id ? updatedSite : s) });
  }
  function addSite(nom, adresse, tel){
    const newSite = makeSite(nom, adresse, tel);
    setDb({ ...db, sites: [...db.sites, newSite] });
    return newSite.id;
  }
  function removeSite(id){
    if(db.sites.length <= 1) return;
    setDb({ ...db, sites: db.sites.filter(s=>s.id!==id) });
    if(activeSiteId === id) setActiveSiteId(null);
  }

  const navItems = [
    { key:'global', label:'Vue globale', icon:'layers' },
    { key:'sites', label:'Mes pressings', icon:'building' },
  ];

  const activeSite = db.sites.find(s => s.id === activeSiteId);

  return (
    <Shell title="Maci Pressing" role={`Gérant — ${db.sites.length} site(s)`} navItems={navItems}
      active={activeSiteId ? null : page} onNav={(p)=>{setActiveSiteId(null); setPage(p);}} onLogout={onLogout}>
      {activeSite ? (
        <SiteDetailForGerant site={activeSite} db={db} updateSite={updateSite} onBack={()=>setActiveSiteId(null)} />
      ) : (
        <>
          {page === 'global' && <GlobalDashboard db={db} onOpenSite={setActiveSiteId} />}
          {page === 'sites' && <SitesManager db={db} setDb={setDb} addSite={addSite} removeSite={removeSite} onOpenSite={setActiveSiteId} />}
        </>
      )}
    </Shell>
  );
}

function GlobalDashboard({ db, onOpenSite }){
  const today = todayISO();

  const perSite = db.sites.map(site => {
    const cmds = site.commandes;
    const cmdsToday = cmds.filter(c => c.dateCreation.slice(0,10) === today);
    const cmdsMonth = cmds.filter(c => c.dateCreation.slice(0,7) === today.slice(0,7));
    const caJour = cmdsToday.reduce((s,c)=>s+calcCommandeTotal(c, site.services),0);
    const caMois = cmdsMonth.reduce((s,c)=>s+calcCommandeTotal(c, site.services),0);
    const impayes = cmds.filter(c => c.paiement === 'impaye');
    const montantImpaye = impayes.reduce((s,c)=>s+calcCommandeTotal(c, site.services),0);
    const enCours = cmds.filter(c => c.statut === 'En cours' || c.statut === 'Reçu').length;
    const lowStock = site.stock.filter(s => s.quantite <= s.seuil).length;
    const depensesMois = (site.depenses||[]).filter(d=>d.date.slice(0,7)===today.slice(0,7)).reduce((s,d)=>s+Number(d.montant),0);
    const beneficeMois = caMois - depensesMois;
    return { site, caJour, caMois, montantImpaye, impayesCount: impayes.length, enCours, lowStock, clientsCount: site.clients.length, depensesMois, beneficeMois };
  });

  const totals = perSite.reduce((acc, p) => ({
    caJour: acc.caJour + p.caJour,
    caMois: acc.caMois + p.caMois,
    montantImpaye: acc.montantImpaye + p.montantImpaye,
    clientsCount: acc.clientsCount + p.clientsCount,
  }), { caJour:0, caMois:0, montantImpaye:0, clientsCount:0 });

  return (
    <div>
      <PageHeader title="Vue globale" subtitle={`${db.sites.length} pressing(s) — ${fmtDate(today)}`} />

      <div style={{display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:14, marginBottom:28}}>
        <StatCard label="CA total aujourd'hui" value={fmtGNF(totals.caJour)} icon="euro" />
        <StatCard label="CA total ce mois" value={fmtGNF(totals.caMois)} icon="chart" />
        <StatCard label="Impayés cumulés" value={fmtGNF(totals.montantImpaye)} icon="alert" tone={totals.montantImpaye>0?'danger':'default'} />
        <StatCard label="Clients (tous sites)" value={totals.clientsCount} icon="users" />
      </div>

      <h2 style={{fontSize:16, color:'var(--pine)', marginBottom:14}}>Détail par site</h2>
      <div style={{display:'grid', gap:14}}>
        {perSite.map(p => (
          <div key={p.site.id} className="card" style={{padding:'1.25rem 1.5rem', cursor:'pointer'}} onClick={()=>onOpenSite(p.site.id)}>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', flexWrap:'wrap', gap:10}}>
              <div>
                <div style={{display:'flex', alignItems:'center', gap:8}}>
                  <span style={{fontWeight:700, fontSize:16}}>{p.site.nom}</span>
                  <span className="mono" style={{fontSize:11, color:'var(--steam)'}}>{p.site.code}</span>
                </div>
                <div style={{fontSize:12.5, color:'var(--steam)', marginTop:2}}>{p.site.adresse}</div>
              </div>
              <div style={{display:'flex', alignItems:'center', gap:6, color:'var(--pine)', fontSize:13, fontWeight:600}}>
                Voir le détail <Icon name="arrowRight" size={14}/>
              </div>
            </div>
            <div style={{display:'flex', gap:24, marginTop:16, flexWrap:'wrap'}}>
              <MiniMetric label="CA aujourd'hui" value={fmtGNF(p.caJour)} />
              <MiniMetric label="CA ce mois" value={fmtGNF(p.caMois)} />
              <MiniMetric label="Impayés" value={fmtGNF(p.montantImpaye)} danger={p.impayesCount>0} />
              <MiniMetric label="À traiter" value={p.enCours} />
              <MiniMetric label="Stock bas" value={p.lowStock} danger={p.lowStock>0} />
              <MiniMetric label="Dépenses mois" value={fmtGNF(p.depensesMois)} danger={p.depensesMois>0} />
              <MiniMetric label="Bénéfice net" value={fmtGNF(p.beneficeMois)} danger={p.beneficeMois<0} />
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function MiniMetric({ label, value, danger }){
  return (
    <div>
      <div style={{fontSize:11, color:'var(--steam)', textTransform:'uppercase', fontWeight:600, letterSpacing:'0.03em'}}>{label}</div>
      <div className="mono" style={{fontSize:15, fontWeight:700, color: danger ? 'var(--danger)' : 'var(--pine)'}}>{value}</div>
    </div>
  );
}

function SitesManager({ db, addSite, removeSite, onOpenSite, setDb }){
  const [showNew, setShowNew] = useState(false);
  const [confirmSite, setConfirmSite] = useState(null);
  const [showUniformiser, setShowUniformiser] = useState(false);
  const [sourceSiteId, setSourceSiteId] = useState(db.sites[0]?.id || '');
  const [uniformFlash, setUniformFlash] = useState(false);

  function uniformiserPrix(){
    const source = db.sites.find(s => s.id === sourceSiteId);
    if(!source) return;
    const updatedSites = db.sites.map(site => {
      if(site.id === sourceSiteId) return site;
      const newServices = source.services.map(srcSvc => {
        const existing = site.services.find(s => s.nom === srcSvc.nom);
        if(existing) return { ...existing, prix: srcSvc.prix, categorie: srcSvc.categorie };
        return { ...srcSvc, id: uid('svc_') };
      });
      return { ...site, services: newServices };
    });
    setDb({ ...db, sites: updatedSites });
    setUniformFlash(true);
    setTimeout(()=>setUniformFlash(false), 2000);
  }

  return (
    <div>
      <PageHeader title="Mes pressings" subtitle="Créez, supprimez ou ouvrez un établissement"
        right={<div style={{display:'flex', gap:10}}>
          <button className="btn" onClick={()=>setShowUniformiser(!showUniformiser)}>
            <Icon name="layers" size={15}/> Uniformiser les prix
          </button>
          <button className="btn btn-rust" onClick={()=>setShowNew(true)}><Icon name="plus" size={15}/> Nouveau pressing</button>
        </div>} />

      {showUniformiser && (
        <div className="card" style={{padding:'1.25rem', marginBottom:18, background:'var(--pine-light)', border:'1.5px solid var(--pine)'}}>
          <h3 style={{margin:'0 0 10px', fontSize:15, color:'var(--pine)'}}>Uniformiser les tarifs</h3>
          <p style={{fontSize:13, color:'var(--pine)', margin:'0 0 14px', lineHeight:1.5}}>
            Copie les services et prix d'un pressing vers <strong>tous les autres</strong>. Les prix existants seront mis à jour, les nouveaux services ajoutés.
          </p>
          <div style={{display:'flex', gap:12, alignItems:'flex-end', flexWrap:'wrap'}}>
            <div style={{flex:1, minWidth:200}}>
              <label>Pressing source (modèle)</label>
              <select value={sourceSiteId} onChange={e=>setSourceSiteId(e.target.value)}>
                {db.sites.map(s => <option key={s.id} value={s.id}>{s.nom}</option>)}
              </select>
            </div>
            <button className="btn btn-rust" onClick={uniformiserPrix} style={{minWidth:200}}>
              {uniformFlash ? <><Icon name="check" size={14}/> Prix uniformisés !</> : `Copier vers ${db.sites.length - 1} autre(s) pressing(s)`}
            </button>
          </div>
          {sourceSiteId && (
            <div style={{marginTop:12}}>
              <div style={{fontSize:12, color:'var(--pine)', fontWeight:600, marginBottom:6}}>Services qui seront copiés :</div>
              <div style={{display:'flex', flexWrap:'wrap', gap:6}}>
                {db.sites.find(s=>s.id===sourceSiteId)?.services.map(svc => (
                  <span key={svc.id} style={{fontSize:12, background:'var(--white)', padding:'3px 10px', borderRadius:100, border:'1px solid var(--pine)'}}>
                    {svc.nom} — {fmtGNF(svc.prix)}
                  </span>
                ))}
              </div>
            </div>
          )}
        </div>
      )}

      <div style={{display:'grid', gridTemplateColumns:'repeat(2,1fr)', gap:14}}>
        {db.sites.map(s => (
          <div key={s.id} className="card" style={{padding:'1.25rem 1.4rem'}}>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}>
              <div>
                <div style={{fontWeight:700, fontSize:15}}>{s.nom}</div>
                <div style={{fontSize:12.5, color:'var(--steam)', marginTop:2}}>{s.adresse}</div>
                <div style={{fontSize:12.5, color:'var(--steam)'}}>{s.tel}</div>
              </div>
              <span className="mono" style={{fontSize:11, color:'var(--steam)'}}>{s.code}</span>
            </div>
            <div style={{fontSize:12, color:'var(--steam)', marginTop:8}}>{s.services.length} service(s) · {s.clients.length} client(s)</div>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:12}}>
              <button className="btn btn-sm btn-primary" onClick={()=>onOpenSite(s.id)} style={{background:'var(--pine)', color:'var(--white)', borderColor:'var(--pine)'}}>
                Ouvrir ce pressing →
              </button>
              <button className="btn btn-ghost btn-sm" disabled={db.sites.length<=1}
                style={{color:'var(--danger)', borderColor:'var(--danger)', marginLeft:24}}
                onClick={()=>setConfirmSite(s)}>
                <Icon name="trash" size={13}/> Supprimer
              </button>
            </div>
          </div>
        ))}
      </div>

      {showNew && <NewSiteModal onClose={()=>setShowNew(false)} onCreate={(nom,adresse,tel)=>{ addSite(nom,adresse,tel); setShowNew(false); }} />}
      {confirmSite && <ConfirmDelete
        message={`Supprimer définitivement « ${confirmSite.nom} » et TOUTES ses données (commandes, clients, stock) ? Cette action est irréversible.`}
        onConfirm={()=>{ removeSite(confirmSite.id); setConfirmSite(null); }}
        onCancel={()=>setConfirmSite(null)}
      />}
    </div>
  );
}

function Dashboard({ site, updateSite }){
  const today = todayISO();
  const stats = useMemo(() => {
    const cmds = site.commandes;
    const cmdsToday = cmds.filter(c => c.dateCreation.slice(0,10) === today);
    const cmdsMonth = cmds.filter(c => c.dateCreation.slice(0,7) === today.slice(0,7));
    const caJour = cmdsToday.reduce((s,c)=>s+calcCommandeTotal(c, site.services),0);
    const caMois = cmdsMonth.reduce((s,c)=>s+calcCommandeTotal(c, site.services),0);
    const impayes = cmds.filter(c => c.paiement === 'impaye');
    const montantImpaye = impayes.reduce((s,c)=>s+calcCommandeTotal(c, site.services),0);
    const enCours = cmds.filter(c => c.statut === 'En cours' || c.statut === 'Reçu').length;
    const pretsNonRecuperes = cmds.filter(c => c.statut === 'Prêt').length;

    const serviceCount = {};
    cmds.forEach(c => c.lignes.forEach(l => { serviceCount[l.serviceId] = (serviceCount[l.serviceId]||0) + l.qte; }));
    const topServices = Object.entries(serviceCount)
      .map(([id, qte]) => ({ svc: site.services.find(s=>s.id===id), qte }))
      .filter(x=>x.svc).sort((a,b)=>b.qte-a.qte).slice(0,5);

    const last7 = Array.from({length:7}, (_,i)=>{
      const d = new Date(); d.setDate(d.getDate()-(6-i));
      const iso = d.toISOString().slice(0,10);
      const ca = cmds.filter(c=>c.dateCreation.slice(0,10)===iso).reduce((s,c)=>s+calcCommandeTotal(c,site.services),0);
      return { iso, ca, label: d.toLocaleDateString('fr-FR',{weekday:'short'}) };
    });
    const maxCa = Math.max(...last7.map(d=>d.ca), 1);

    const depenses = (site.depenses||[]);
    const depensesJour = depenses.filter(d=>d.date===today).reduce((s,d)=>s+Number(d.montant),0);
    const depensesMois = depenses.filter(d=>d.date.slice(0,7)===today.slice(0,7)).reduce((s,d)=>s+Number(d.montant),0);
    const beneficeMois = caMois - depensesMois;

    return { caJour, caMois, montantImpaye, impayesCount: impayes.length, enCours, pretsNonRecuperes, topServices, last7, maxCa, totalClients: site.clients.length, depensesJour, depensesMois, beneficeMois };
  }, [site, today]);

  const lowStock = site.stock.filter(s => s.quantite <= s.seuil);

  return (
    <div>
      <PageHeader title={site.nom} subtitle={`Aujourd'hui, ${fmtDate(today)}`} />

      <div style={{display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:14, marginBottom:14}}>
        <StatCard label="CA aujourd'hui" value={fmtGNF(stats.caJour)} icon="euro" />
        <StatCard label="CA ce mois" value={fmtGNF(stats.caMois)} icon="chart" />
        <StatCard label="Impayés" value={fmtGNF(stats.montantImpaye)} sub={`${stats.impayesCount} commande(s)`} icon="alert" tone={stats.impayesCount>0 ? 'danger':'default'} />
        <StatCard label="Clients" value={stats.totalClients} icon="users" />
      </div>
      <div style={{display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:14, marginBottom:24}}>
        <StatCard label="Dépenses aujourd'hui" value={fmtGNF(stats.depensesJour)} icon="trash" tone="danger" />
        <StatCard label="Dépenses ce mois" value={fmtGNF(stats.depensesMois)} icon="trash" tone="danger" />
        <StatCard label="Bénéfice net ce mois" value={fmtGNF(stats.beneficeMois)} icon="chart" tone={stats.beneficeMois>=0?'default':'danger'} sub="CA − Dépenses" />
      </div>

      <div style={{display:'grid', gridTemplateColumns:'1.4fr 1fr', gap:16, marginBottom:24}}>
        <div className="card" style={{padding:'1.5rem'}}>
          <h3 style={{margin:'0 0 16px', fontSize:15}}>Chiffre d'affaires — 7 derniers jours</h3>
          <div style={{display:'flex', alignItems:'flex-end', gap:10, height:140}}>
            {stats.last7.map(d => (
              <div key={d.iso} style={{flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:6}}>
                <div style={{fontSize:10.5, color:'var(--steam)'}} className="mono">{d.ca>0 ? Math.round(d.ca/1000)+'k' : ''}</div>
                <div style={{
                  width:'100%', background:'var(--rust)', borderRadius:'4px 4px 0 0',
                  height: Math.max(4, (d.ca/stats.maxCa)*90), opacity: d.iso===today?1:0.55
                }}/>
                <div style={{fontSize:11.5, color:'var(--pine)', textTransform:'capitalize'}}>{d.label}</div>
              </div>
            ))}
          </div>
        </div>

        <div className="card" style={{padding:'1.5rem'}}>
          <h3 style={{margin:'0 0 16px', fontSize:15}}>Services les plus demandés</h3>
          {stats.topServices.length === 0 && <p style={{fontSize:13, color:'var(--steam)'}}>Pas encore de données.</p>}
          {stats.topServices.map((t,i) => (
            <div key={t.svc.id} style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'7px 0', borderBottom: i<stats.topServices.length-1 ? '1px solid var(--line)' : 'none'}}>
              <span style={{fontSize:13.5}}>{t.svc.nom}</span>
              <span className="mono" style={{fontSize:13, color:'var(--steam)'}}>{t.qte}x</span>
            </div>
          ))}
        </div>
      </div>

      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:16}}>
        <div className="card" style={{padding:'1.5rem'}}>
          <h3 style={{margin:'0 0 12px', fontSize:15}}>À traiter</h3>
          <div style={{display:'flex', gap:16}}>
            <div>
              <div style={{fontSize:22, fontWeight:700, color:'var(--rust)'}}>{stats.enCours}</div>
              <div style={{fontSize:12.5, color:'var(--steam)'}}>en cours / reçues</div>
            </div>
            <div>
              <div style={{fontSize:22, fontWeight:700, color:'var(--ok)'}}>{stats.pretsNonRecuperes}</div>
              <div style={{fontSize:12.5, color:'var(--steam)'}}>prêtes, à récupérer</div>
            </div>
          </div>
        </div>

        <div className="card" style={{padding:'1.5rem'}}>
          <h3 style={{margin:'0 0 12px', fontSize:15, display:'flex', alignItems:'center', gap:8}}>
            <Icon name="alert" size={15} style={{color: lowStock.length ? 'var(--danger)':'var(--steam)'}}/> Stock à surveiller
          </h3>
          {lowStock.length === 0 && <p style={{fontSize:13, color:'var(--steam)'}}>Tous les stocks sont au-dessus du seuil.</p>}
          {lowStock.map(s => (
            <div key={s.id} style={{display:'flex', justifyContent:'space-between', fontSize:13.5, padding:'5px 0'}}>
              <span>{s.nom}</span>
              <span className="mono" style={{color:'var(--danger)'}}>{s.quantite} {s.unite}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function StatCard({ label, value, sub, icon, tone='default' }){
  const toneColor = tone === 'danger' ? 'var(--danger)' : 'var(--pine)';
  return (
    <div className="card" style={{padding:'1.1rem 1.25rem'}}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}>
        <div>
          <div style={{fontSize:12, color:'var(--steam)', textTransform:'uppercase', letterSpacing:'0.04em', fontWeight:600}}>{label}</div>
          <div style={{fontSize:22, fontWeight:700, color:toneColor, marginTop:4}}>{value}</div>
          {sub && <div style={{fontSize:12, color:'var(--steam)', marginTop:2}}>{sub}</div>}
        </div>
        <Icon name={icon} size={18} style={{color:'var(--steam)', marginTop:2}} />
      </div>
    </div>
  );
}

/* ===================== COMMANDES ===================== */

function CommandesView({ site, updateSite, editable }){
  const [filter, setFilter] = useState('Toutes');
  const [search, setSearch] = useState('');
  const [showNew, setShowNew] = useState(false);
  const [openTicket, setOpenTicket] = useState(null);

  const filtered = useMemo(() => {
    let list = [...site.commandes].sort((a,b)=> new Date(b.dateCreation) - new Date(a.dateCreation));
    if(filter !== 'Toutes') list = list.filter(c => c.statut === filter);
    if(search.trim()){
      const q = search.toLowerCase();
      list = list.filter(c => {
        const client = site.clients.find(cl => cl.id === c.clientId);
        return c.numero.toLowerCase().includes(q) || (client && client.nom.toLowerCase().includes(q));
      });
    }
    return list;
  }, [site.commandes, site.clients, filter, search]);

  function updateCommande(updated){
    updateSite({ ...site, commandes: site.commandes.map(c => c.id === updated.id ? updated : c) });
  }

  function advanceStatut(cmd){
    const updated = { ...cmd, statut: nextStatut(cmd.statut) };
    const client = site.clients.find(c => c.id === cmd.clientId);
    const nextSite = { ...site, commandes: site.commandes.map(c => c.id === updated.id ? updated : c) };
    if(client && (updated.statut === 'Prêt' || updated.statut === 'Récupéré')){
      const msg = updated.statut === 'Prêt'
        ? `Bonjour ${client.nom}, votre commande ${cmd.numero} est prête à récupérer.`
        : `Merci ${client.nom}, votre commande ${cmd.numero} a été récupérée.`;
      const notif = { id: uid('notif_'), clientId: client.id, message: msg, canal: client.canalPref || 'SMS', date: new Date().toISOString() };
      nextSite.notifications = [notif, ...nextSite.notifications].slice(0,300);
    }
    updateSite(nextSite);
  }

  function togglePaiement(cmd){
    updateCommande({ ...cmd, paiement: cmd.paiement === 'paye' ? 'impaye' : 'paye' });
  }

  return (
    <div>
      <PageHeader
        title="Commandes"
        subtitle={`${site.commandes.length} commande(s) au total`}
        right={editable ? <button className="btn btn-rust" onClick={()=>setShowNew(true)}><Icon name="plus" size={15}/> Nouvelle commande</button> : null}
      />

      <div style={{display:'flex', gap:10, marginBottom:18, flexWrap:'wrap', alignItems:'center'}}>
        <div style={{position:'relative', flex:'1 1 240px', maxWidth:320}}>
          <input type="text" placeholder="Rechercher (n° ticket, client)…" value={search} onChange={e=>setSearch(e.target.value)} style={{paddingLeft:34}}/>
          <Icon name="search" size={15} style={{position:'absolute', left:11, top:11, color:'var(--steam)'}}/>
        </div>
        {['Toutes', ...STATUTS].map(s => (
          <button key={s} onClick={()=>setFilter(s)} className="btn btn-sm" style={{
            background: filter===s ? 'var(--pine)' : 'transparent',
            color: filter===s ? 'var(--white)' : 'var(--ink)',
            borderColor: filter===s ? 'var(--pine)' : 'var(--line-strong)'
          }}>{s}</button>
        ))}
      </div>

      <div className="card" style={{overflow:'hidden'}}>
        <table style={{width:'100%', borderCollapse:'collapse', fontSize:13.5}}>
          <thead>
            <tr style={{background:'var(--paper-2)', textAlign:'left'}}>
              <th style={th}>Ticket</th>
              <th style={th}>Client</th>
              <th style={th}>Articles</th>
              <th style={th}>Total</th>
              <th style={th}>Statut</th>
              <th style={th}>Paiement</th>
              <th style={th}>Dépôt</th>
              <th style={th}></th>
            </tr>
          </thead>
          <tbody>
            {filtered.length === 0 && (
              <tr><td colSpan={8} style={{...td, textAlign:'center', color:'var(--steam)', padding:'2rem'}}>Aucune commande ne correspond.</td></tr>
            )}
            {filtered.map(cmd => {
              const client = site.clients.find(c => c.id === cmd.clientId);
              const total = calcCommandeTotal(cmd, site.services);
              return (
                <tr key={cmd.id} style={{borderTop:'1px solid var(--line)'}}>
                  <td style={{...td}}><span className="mono" style={{fontWeight:600}}>{cmd.numero}</span></td>
                  <td style={td}>{client ? client.nom : '—'}</td>
                  <td style={td}>{cmd.lignes.reduce((s,l)=>s+l.qte,0)} article(s)</td>
                  <td style={td}>
                    <div className="mono">{fmtGNF(total)}</div>
                    {Number(cmd.acompte) > 0 && total > Number(cmd.acompte) && (
                      <div style={{fontSize:11.5, color:'var(--danger)'}}>Solde: {fmtGNF(total - Number(cmd.acompte))}</div>
                    )}
                  </td>
                  <td style={td}><span className={`tag ${STATUT_TAG_CLASS[cmd.statut]}`}>{cmd.statut}</span></td>
                  <td style={td}><span className={`tag ${cmd.paiement==='paye'?'tag-paye':'tag-impaye'}`}>{cmd.paiement==='paye'?'Payé':Number(cmd.acompte)>0?'Partiel':'Impayé'}</span></td>
                  <td style={td}>{fmtDate(cmd.dateCreation.slice(0,10))}</td>
                  <td style={{...td, textAlign:'right'}}>
                    <div style={{display:'flex', gap:6, justifyContent:'flex-end', flexWrap:'wrap'}}>
                      <button className="btn btn-ghost btn-sm" onClick={()=>setOpenTicket(cmd)}>Voir</button>
                      {editable && client && client.tel && (
                        <button className="btn btn-sm" style={{background:'#25D366', color:'white', borderColor:'#25D366', padding:'6px 10px'}}
                          onClick={()=>{
                            const tel = client.tel.replace(/\D/g,'');
                            const solde = total - (Number(cmd.acompte)||0);
                            const msg = encodeURIComponent(`Bonjour ${client.nom}, votre commande ${cmd.numero} chez ${site.nom} est prete.${solde>0?` Solde a regler : ${fmtGNF(solde)}.`:' Entierement payee.'} Merci !`);
                            window.open(`https://wa.me/${tel}?text=${msg}`, '_blank');
                          }}>📱</button>
                      )}
                      {editable && cmd.statut !== 'Récupéré' && (
                        <button className="btn btn-sm" onClick={()=>advanceStatut(cmd)}>→ {nextStatut(cmd.statut)}</button>
                      )}
                      {editable && (
                        <button className="btn btn-sm" onClick={()=>togglePaiement(cmd)}>{cmd.paiement==='paye' ? 'Marquer impayé' : 'Marquer payé'}</button>
                      )}
                    </div>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {showNew && <NewCommandeModal site={site} updateSite={updateSite} onClose={()=>setShowNew(false)} />}
      {openTicket && <TicketModal cmd={openTicket} site={site} onClose={()=>setOpenTicket(null)} />}
    </div>
  );
}

const th = { padding:'10px 14px', fontSize:12, fontWeight:700, color:'var(--pine)', textTransform:'uppercase', letterSpacing:'0.03em' };
const td = { padding:'10px 14px' };

function NewCommandeModal({ site, updateSite, onClose }){
  const [clientId, setClientId] = useState('');
  const [clientSearch, setClientSearch] = useState('');
  const [newClientMode, setNewClientMode] = useState(false);
  const [newClientNom, setNewClientNom] = useState('');
  const [newClientTel, setNewClientTel] = useState('');
  const [lignes, setLignes] = useState([]);
  const [dateRetrait, setDateRetrait] = useState('');
  const [notes, setNotes] = useState('');
  const [acompte, setAcompte] = useState('');
  const [acompteMode, setAcompteMode] = useState('none'); // 'none' | 'pourcent' | 'libre'
  const [rabaisMode, setRabaisMode] = useState('none'); // 'none' | 'pourcent' | 'fixe'
  const [rabais, setRabais] = useState('');
  const [showAddService, setShowAddService] = useState(false);
  const [newServiceNom, setNewServiceNom] = useState('');
  const [newServicePrix, setNewServicePrix] = useState('');
  const [newServiceCat, setNewServiceCat] = useState('Nettoyage complet');
  const [editServiceId, setEditServiceId] = useState(null);

  const clientMatches = useMemo(() => {
    if(!clientSearch.trim()) return site.clients.slice(0,5);
    const q = clientSearch.toLowerCase();
    return site.clients.filter(c => c.nom.toLowerCase().includes(q) || (c.tel||'').includes(q)).slice(0,5);
  }, [clientSearch, site.clients]);

  function addLigne(serviceId){
    setLignes(prev => {
      const exist = prev.find(l => l.serviceId === serviceId);
      if(exist) return prev.map(l => l.serviceId===serviceId ? {...l, qte:l.qte+1} : l);
      return [...prev, { serviceId, qte:1 }];
    });
  }
  function setQte(serviceId, qte){
    setLignes(prev => prev.map(l => l.serviceId===serviceId ? {...l, qte: Math.max(0,qte)} : l).filter(l=>l.qte>0));
  }

  const totalBrut = lignes.reduce((s,l)=>{
    const svc = site.services.find(x=>x.id===l.serviceId);
    return s + (svc ? svc.prix*l.qte : 0);
  }, 0);

  const montantRabais = useMemo(() => {
    if(rabaisMode === 'pourcent' && rabais) return Math.round(totalBrut * Number(rabais) / 100);
    if(rabaisMode === 'fixe' && rabais) return Math.min(Number(rabais), totalBrut);
    return 0;
  }, [totalBrut, rabaisMode, rabais]);

  const total = totalBrut - montantRabais;

  function handleSubmit(){
    let finalClientId = clientId;
    let workingClients = site.clients;
    if(newClientMode){
      if(!newClientNom.trim()) return;
      const newClient = { id: uid('cli_'), nom: newClientNom.trim(), tel: newClientTel.trim(), canalPref:'SMS', dateInscription: todayISO() };
      workingClients = [...site.clients, newClient];
      finalClientId = newClient.id;
    }
    if(!finalClientId || lignes.length === 0) return;

    const seq = site.seq;
    const montantAcompte = Number(acompte) || 0;
    const cmd = {
      id: uid('cmd_'),
      numero: ticketNumber(site.code, seq),
      clientId: finalClientId,
      lignes,
      statut: 'Reçu',
      paiement: montantAcompte >= total ? 'paye' : 'impaye',
      acompte: montantAcompte,
      rabais: montantRabais,
      totalBrut: totalBrut,
      dateCreation: new Date().toISOString(),
      dateRetraitPrevue: dateRetrait || null,
      notes: notes.trim(),
    };
    const client = workingClients.find(c=>c.id===finalClientId);
    const notif = { id: uid('notif_'), clientId: finalClientId, message: `Bonjour ${client.nom}, votre commande ${cmd.numero} a été enregistrée (${fmtGNF(total)}).`, canal: client.canalPref || 'SMS', date: new Date().toISOString() };

    updateSite({
      ...site,
      seq: seq+1,
      clients: workingClients,
      commandes: [cmd, ...site.commandes],
      notifications: [notif, ...site.notifications].slice(0,300),
    });
    onClose();
  }

  return (
    <ModalShell title="Nouvelle commande" onClose={onClose} width={620}>
      <div style={{display:'grid', gap:18}}>
        <div>
          <label>Client</label>
          {!newClientMode ? (
            <>
              <input type="text" placeholder="Rechercher un client…" value={clientSearch} onChange={e=>{setClientSearch(e.target.value); setClientId('');}} />
              <div style={{marginTop:6, display:'flex', flexWrap:'wrap', gap:6}}>
                {clientMatches.map(c => (
                  <button key={c.id} className="btn btn-sm" onClick={()=>{setClientId(c.id); setClientSearch(c.nom);}}
                    style={{background: clientId===c.id?'var(--pine-light)':'transparent', borderColor: clientId===c.id?'var(--pine)':'var(--line-strong)'}}>
                    {c.nom}
                  </button>
                ))}
              </div>
              <button className="btn btn-ghost btn-sm" style={{marginTop:8}} onClick={()=>setNewClientMode(true)}>+ Créer un nouveau client</button>
            </>
          ) : (
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10}}>
              <input type="text" placeholder="Nom complet" value={newClientNom} onChange={e=>setNewClientNom(e.target.value)} />
              <input type="tel" placeholder="Téléphone" value={newClientTel} onChange={e=>setNewClientTel(e.target.value)} />
              <button className="btn btn-ghost btn-sm" style={{gridColumn:'1/-1', justifySelf:'start'}} onClick={()=>setNewClientMode(false)}>← Choisir un client existant</button>
            </div>
          )}
        </div>

        <div>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8}}>
            <label style={{margin:0}}>Articles</label>
            <button className="btn btn-ghost btn-sm" style={{fontSize:12, color:'var(--pine)'}}
              onClick={()=>setShowAddService(!showAddService)}>
              {showAddService ? '← Masquer' : '+ Nouvel article / Modifier prix'}
            </button>
          </div>

          {/* Formulaire ajout/édition rapide d'un article */}
          {showAddService && (
            <div style={{background:'var(--paper-2)', borderRadius:8, padding:'12px', marginBottom:12}}>
              <div style={{display:'grid', gridTemplateColumns:'1.5fr 0.8fr 1fr auto', gap:8, alignItems:'end'}}>
                <div>
                  <label>Nom de l'article</label>
                  <input type="text" placeholder="Ex: Chemise, Pantalon…" value={newServiceNom} onChange={e=>setNewServiceNom(e.target.value)} />
                </div>
                <div>
                  <label>Prix (GNF)</label>
                  <input type="number" placeholder="0" value={newServicePrix} onChange={e=>setNewServicePrix(e.target.value)} />
                </div>
                <div>
                  <label>Type de service</label>
                  <select value={newServiceCat} onChange={e=>setNewServiceCat(e.target.value)}>
                    <option>Nettoyage complet</option>
                    <option>Repassage</option>
                    <option>Nettoyage + Repassage</option>
                    <option>Retouche</option>
                    <option>Maison</option>
                    <option>Autres</option>
                  </select>
                </div>
                <button className="btn btn-rust btn-sm" style={{alignSelf:'end'}}
                  disabled={!newServiceNom.trim()||!newServicePrix}
                  onClick={()=>{
                    if(editServiceId){
                      updateSite({ ...site, services: site.services.map(s => s.id===editServiceId ? {...s, nom:newServiceNom.trim(), prix:Number(newServicePrix), categorie:newServiceCat} : s) });
                      setEditServiceId(null);
                    } else {
                      updateSite({ ...site, services: [...site.services, { id: uid('svc_'), nom: newServiceNom.trim(), prix: Number(newServicePrix), categorie: newServiceCat }] });
                    }
                    setNewServiceNom(''); setNewServicePrix(''); setNewServiceCat('Nettoyage complet');
                  }}>
                  {editServiceId ? 'Modifier' : 'Ajouter'}
                </button>
              </div>
              {editServiceId && (
                <button className="btn btn-ghost btn-sm" style={{marginTop:8}} onClick={()=>{ setEditServiceId(null); setNewServiceNom(''); setNewServicePrix(''); }}>
                  Annuler la modification
                </button>
              )}

              {/* Liste des articles existants pour édition rapide */}
              <div style={{marginTop:12, maxHeight:160, overflowY:'auto'}}>
                <div style={{fontSize:12, color:'var(--steam)', marginBottom:6, fontWeight:600, textTransform:'uppercase', letterSpacing:'0.03em'}}>Cliquez sur un article pour modifier son prix</div>
                {site.services.map(s => (
                  <div key={s.id} style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'5px 0', borderBottom:'1px solid var(--line)', fontSize:13}}>
                    <span>{s.nom} <span style={{color:'var(--steam)', fontSize:11}}>· {s.categorie}</span></span>
                    <div style={{display:'flex', gap:8, alignItems:'center'}}>
                      <span className="mono">{fmtGNF(s.prix)}</span>
                      <button className="btn btn-ghost btn-sm" style={{padding:'3px 7px'}} onClick={()=>{
                        setEditServiceId(s.id);
                        setNewServiceNom(s.nom);
                        setNewServicePrix(String(s.prix));
                        setNewServiceCat(s.categorie);
                      }}><Icon name="edit" size={12}/></button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Articles groupés par catégorie */}
          {['Nettoyage complet','Repassage','Nettoyage + Repassage','Retouche','Maison','Autres','Nettoyage'].map(cat => {
            const items = site.services.filter(s => s.categorie === cat);
            if(items.length === 0) return null;
            return (
              <div key={cat} style={{marginBottom:10}}>
                <div style={{fontSize:11.5, fontWeight:700, color:'var(--pine)', textTransform:'uppercase', letterSpacing:'0.04em', marginBottom:6, paddingBottom:4, borderBottom:'1px solid var(--line)'}}>{cat}</div>
                <div style={{display:'grid', gridTemplateColumns:'repeat(2, 1fr)', gap:6}}>
                  {items.map(s => (
                    <button key={s.id} className="btn btn-sm" style={{justifyContent:'space-between', display:'flex', background: lignes.find(l=>l.serviceId===s.id) ? 'var(--pine-light)' : 'transparent', borderColor: lignes.find(l=>l.serviceId===s.id) ? 'var(--pine)' : 'var(--line-strong)'}} onClick={()=>addLigne(s.id)}>
                      <span>{s.nom}</span><span className="mono" style={{color:'var(--steam)'}}>{fmtGNF(s.prix)}</span>
                    </button>
                  ))}
                </div>
              </div>
            );
          })}
        </div>

        {lignes.length > 0 && (
          <div>
            <label>Panier</label>
            {lignes.map(l => {
              const svc = site.services.find(s=>s.id===l.serviceId);
              return (
                <div key={l.serviceId} style={{display:'flex', alignItems:'center', justifyContent:'space-between', padding:'6px 0', borderBottom:'1px solid var(--line)'}}>
                  <span style={{fontSize:13.5}}>{svc.nom}</span>
                  <div style={{display:'flex', alignItems:'center', gap:8}}>
                    <button className="btn btn-sm" style={{padding:'2px 9px'}} onClick={()=>setQte(l.serviceId, l.qte-1)}>−</button>
                    <span className="mono" style={{minWidth:18, textAlign:'center'}}>{l.qte}</span>
                    <button className="btn btn-sm" style={{padding:'2px 9px'}} onClick={()=>setQte(l.serviceId, l.qte+1)}>+</button>
                    <span className="mono" style={{minWidth:90, textAlign:'right'}}>{fmtGNF(svc.prix*l.qte)}</span>
                  </div>
                </div>
              );
            })}
            <div style={{display:'flex', justifyContent:'space-between', paddingTop:10, borderTop:'1px solid var(--line)'}}>
              <span style={{color:'var(--steam)'}}>Sous-total</span><span className="mono" style={{color:'var(--steam)'}}>{fmtGNF(totalBrut)}</span>
            </div>

            {/* BLOC RABAIS */}
            <div style={{paddingTop:8}}>
              <div style={{display:'flex', gap:8, marginBottom:8, flexWrap:'wrap'}}>
                {[{label:'Pas de rabais', val:'none'}, {label:'Rabais %', val:'pourcent'}, {label:'Montant fixe', val:'fixe'}].map(opt => (
                  <button key={opt.val} className="btn btn-sm" onClick={()=>{ setRabaisMode(opt.val); setRabais(''); }}
                    style={{background: rabaisMode===opt.val ? 'var(--rust)' : 'transparent', color: rabaisMode===opt.val ? 'var(--white)' : 'var(--ink)', borderColor: rabaisMode===opt.val ? 'var(--rust)' : 'var(--line-strong)', fontSize:12}}>
                    🏷️ {opt.label}
                  </button>
                ))}
              </div>
              {rabaisMode === 'pourcent' && (
                <div style={{display:'flex', gap:8, flexWrap:'wrap', marginBottom:6}}>
                  {[5, 10, 15, 20, 25].map(p => (
                    <button key={p} className="btn btn-sm" onClick={()=>setRabais(String(p))}
                      style={{background: rabais===String(p) ? 'var(--rust)' : 'transparent', color: rabais===String(p) ? 'var(--white)' : 'var(--ink)', borderColor: rabais===String(p) ? 'var(--rust)' : 'var(--line-strong)'}}>
                      {p}%
                    </button>
                  ))}
                  <input type="number" placeholder="Autre %" value={rabais} onChange={e=>setRabais(e.target.value)} style={{width:80, padding:'5px 8px'}} max={100} min={0}/>
                </div>
              )}
              {rabaisMode === 'fixe' && (
                <input type="number" placeholder="Montant du rabais (GNF)" value={rabais} onChange={e=>setRabais(e.target.value)} max={totalBrut} min={0}/>
              )}
              {montantRabais > 0 && (
                <div style={{display:'flex', justifyContent:'space-between', fontSize:13, color:'var(--rust)', marginTop:4}}>
                  <span>Rabais {rabaisMode==='pourcent' ? `(${rabais}%)` : 'fixe'}</span>
                  <span className="mono">− {fmtGNF(montantRabais)}</span>
                </div>
              )}
            </div>

            <div style={{display:'flex', justifyContent:'space-between', paddingTop:8, fontWeight:700, fontSize:16, borderTop:'2px solid var(--line-strong)'}}>
              <span>Total à payer</span><span className="mono" style={{color:'var(--pine)'}}>{fmtGNF(total)}</span>
            </div>
          </div>
        )}

        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10}}>
          <div>
            <label>Date de retrait prévue</label>
            <input type="date" value={dateRetrait} onChange={e=>setDateRetrait(e.target.value)} min={todayISO()} />
          </div>
          <div>
            <label>Notes (optionnel)</label>
            <input type="text" placeholder="Tache, bouton manquant…" value={notes} onChange={e=>setNotes(e.target.value)} />
          </div>
        </div>

        {/* PAIEMENT PARTIEL */}
        {total > 0 && (
          <div>
            <label>Paiement à la dépose</label>
            <div style={{display:'flex', gap:8, marginBottom:10, flexWrap:'wrap'}}>
              {[{label:'Pas de paiement', val:'none'}, {label:'Acompte %', val:'pourcent'}, {label:'Montant libre', val:'libre'}].map(opt => (
                <button key={opt.val} className="btn btn-sm" onClick={()=>{ setAcompteMode(opt.val); setAcompte(''); }}
                  style={{background: acompteMode===opt.val ? 'var(--pine)' : 'transparent', color: acompteMode===opt.val ? 'var(--white)' : 'var(--ink)', borderColor: acompteMode===opt.val ? 'var(--pine)' : 'var(--line-strong)'}}>
                  {opt.label}
                </button>
              ))}
            </div>
            {acompteMode === 'pourcent' && (
              <div style={{display:'flex', gap:8, flexWrap:'wrap'}}>
                {[25, 50, 75].map(p => {
                  const montant = Math.round(total * p / 100);
                  return (
                    <button key={p} className="btn btn-sm" onClick={()=>setAcompte(String(montant))}
                      style={{background: acompte===String(montant) ? 'var(--rust)' : 'transparent', color: acompte===String(montant) ? 'var(--white)' : 'var(--ink)', borderColor: acompte===String(montant) ? 'var(--rust)' : 'var(--line-strong)'}}>
                      {p}% — {fmtGNF(montant)}
                    </button>
                  );
                })}
              </div>
            )}
            {acompteMode === 'libre' && (
              <input type="number" placeholder="Montant payé maintenant (GNF)" value={acompte} onChange={e=>setAcompte(e.target.value)} max={total} />
            )}
            {acompte && Number(acompte) > 0 && (
              <div style={{marginTop:8, padding:'8px 12px', background:'var(--warn-light)', borderRadius:8, fontSize:13}}>
                <div style={{display:'flex', justifyContent:'space-between'}}>
                  <span>Acompte reçu :</span><span className="mono" style={{fontWeight:700}}>{fmtGNF(Number(acompte))}</span>
                </div>
                <div style={{display:'flex', justifyContent:'space-between', color:'var(--danger)'}}>
                  <span>Solde restant dû :</span><span className="mono" style={{fontWeight:700}}>{fmtGNF(total - Number(acompte))}</span>
                </div>
              </div>
            )}
          </div>
        )}

        <div style={{display:'flex', justifyContent:'flex-end', gap:10}}>
          <button className="btn" onClick={onClose}>Annuler</button>
          <button className="btn btn-rust" disabled={(!clientId && !newClientMode) || lignes.length===0} onClick={handleSubmit}>Créer le ticket</button>
        </div>
      </div>
    </ModalShell>
  );
}

/* ===================== CONFIRMATION SUPPRESSION AVEC MOT DE PASSE ===================== */

function ConfirmDelete({ message, onConfirm, onCancel }){
  const [pass, setPass] = useState('');
  const [error, setError] = useState('');

  function handleConfirm(){
    if(pass === PASS_GERANT){
      onConfirm();
    } else {
      setError('Mot de passe incorrect.');
      setPass('');
    }
  }

  return (
    <div style={{
      position:'fixed', inset:0, background:'rgba(27,31,28,0.55)',
      display:'flex', alignItems:'center', justifyContent:'center', zIndex:100, padding:20
    }}>
      <div className="card" style={{width:380, maxWidth:'92vw', padding:'1.5rem'}}>
        <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:14, color:'var(--danger)'}}>
          <Icon name="alert" size={22} />
          <h2 style={{margin:0, fontSize:18, color:'var(--danger)'}}>Confirmer la suppression</h2>
        </div>
        <p style={{fontSize:14, color:'var(--ink)', marginBottom:16, lineHeight:1.5}}>{message}</p>
        <div style={{marginBottom:14}}>
          <label>Mot de passe gérant pour confirmer</label>
          <input
            type="password"
            placeholder="Entrez votre mot de passe…"
            value={pass}
            onChange={e=>{ setPass(e.target.value); setError(''); }}
            onKeyDown={e=>{ if(e.key==='Enter') handleConfirm(); }}
            autoFocus
          />
          {error && <p style={{color:'var(--danger)', fontSize:13, margin:'6px 0 0'}}>{error}</p>}
        </div>
        <div style={{display:'flex', gap:10, justifyContent:'flex-end'}}>
          <button className="btn" onClick={onCancel}>Annuler</button>
          <button className="btn" style={{background:'var(--danger)', borderColor:'var(--danger)', color:'var(--white)'}} onClick={handleConfirm}>
            Supprimer
          </button>
        </div>
      </div>
    </div>
  );
}

function ModalShell({ title, children, onClose, width=520 }){
  return (
    <div style={{
      position:'fixed', inset:0, background:'rgba(27,31,28,0.45)', display:'flex',
      alignItems:'center', justifyContent:'center', zIndex:50, padding:20
    }} onClick={(e)=>{ if(e.target === e.currentTarget) onClose(); }}>
      <div className="card" style={{width, maxWidth:'92vw', maxHeight:'88vh', overflowY:'auto', padding:'1.5rem'}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:18}}>
          <h2 style={{margin:0, fontSize:19, color:'var(--pine)'}}>{title}</h2>
          <button onClick={onClose} className="btn btn-ghost btn-sm" aria-label="Fermer"><Icon name="x" size={16}/></button>
        </div>
        {children}
      </div>
    </div>
  );
}

function TicketModal({ cmd, site, onClose }){
  const client = site.clients.find(c => c.id === cmd.clientId);
  const total = calcCommandeTotal(cmd, site.services);
  const acompte = Number(cmd.acompte) || 0;
  const solde = total - acompte;

  function ouvrirWhatsApp(){
    if(!client || !client.tel) return;
    const tel = client.tel.replace(/\D/g,'');
    const msg = encodeURIComponent(
      `Bonjour ${client.nom}, votre commande ${cmd.numero} chez ${site.nom} est prête à récupérer.\nTotal : ${fmtGNF(total)}${solde > 0 ? `\nSolde restant : ${fmtGNF(solde)}` : ' (Payé)'}\nMerci !`
    );
    window.open(`https://wa.me/${tel}?text=${msg}`, '_blank');
  }

  return (
    <ModalShell title={`Ticket ${cmd.numero}`} onClose={onClose} width={420}>
      <div className="ticket-perfo" style={{background:'var(--paper-2)', borderRadius:10, padding:'1.25rem'}}>
        <div style={{textAlign:'center', marginBottom:14}}>
          <div style={{fontWeight:700, fontSize:16}}>{site.nom}</div>
          <div style={{fontSize:12, color:'var(--steam)'}}>{site.adresse}</div>
          <div style={{fontSize:12, color:'var(--steam)'}}>{site.tel}</div>
        </div>
        <div style={{borderTop:'1px dashed var(--line-strong)', borderBottom:'1px dashed var(--line-strong)', padding:'10px 0', margin:'10px 0'}}>
          <div className="mono" style={{textAlign:'center', fontSize:15, fontWeight:700}}>{cmd.numero}</div>
          <div style={{textAlign:'center', fontSize:12, color:'var(--steam)'}}>{fmtDateTime(cmd.dateCreation)}</div>
        </div>
        <div style={{fontSize:13.5, marginBottom:8}}><strong>{client ? client.nom : 'Client inconnu'}</strong>{client && client.tel ? ` — ${client.tel}` : ''}</div>
        {cmd.lignes.map(l => {
          const svc = site.services.find(s=>s.id===l.serviceId);
          if(!svc) return null;
          return (
            <div key={l.serviceId} style={{display:'flex', justifyContent:'space-between', fontSize:13, padding:'3px 0'}}>
              <span>{l.qte}x {svc.nom}</span>
              <span className="mono">{fmtGNF(svc.prix*l.qte)}</span>
            </div>
          );
        })}
        {Number(cmd.rabais) > 0 && (
          <>
            <div style={{display:'flex', justifyContent:'space-between', fontSize:13, color:'var(--steam)', paddingTop:6}}>
              <span>Sous-total</span><span className="mono">{fmtGNF(cmd.totalBrut || total + Number(cmd.rabais))}</span>
            </div>
            <div style={{display:'flex', justifyContent:'space-between', fontSize:13, color:'var(--rust)', paddingTop:2}}>
              <span>🏷️ Rabais</span><span className="mono">− {fmtGNF(Number(cmd.rabais))}</span>
            </div>
          </>
        )}
        <div style={{borderTop:'1px dashed var(--line-strong)', marginTop:6, paddingTop:8, display:'flex', justifyContent:'space-between', fontWeight:700}}>
          <span>Total à payer</span><span className="mono">{fmtGNF(total)}</span>
        </div>
        {acompte > 0 && (
          <>
            <div style={{display:'flex', justifyContent:'space-between', fontSize:13, color:'var(--ok)', paddingTop:4}}>
              <span>Acompte versé</span><span className="mono">{fmtGNF(acompte)}</span>
            </div>
            <div style={{display:'flex', justifyContent:'space-between', fontSize:13.5, fontWeight:700, color: solde > 0 ? 'var(--danger)' : 'var(--ok)', paddingTop:4, borderTop:'1px dashed var(--line)'}}>
              <span>{solde > 0 ? 'Solde restant dû' : 'Entièrement payé ✓'}</span>
              <span className="mono">{solde > 0 ? fmtGNF(solde) : ''}</span>
            </div>
          </>
        )}
        <div style={{marginTop:10, display:'flex', justifyContent:'space-between', fontSize:12.5}}>
          <span className={`tag ${STATUT_TAG_CLASS[cmd.statut]}`}>{cmd.statut}</span>
          <span className={`tag ${cmd.paiement==='paye'?'tag-paye':'tag-impaye'}`}>{cmd.paiement==='paye'?'Payé':'Impayé'}</span>
        </div>
        {cmd.dateRetraitPrevue && <div style={{fontSize:12, color:'var(--steam)', marginTop:8}}>Retrait prévu : {fmtDate(cmd.dateRetraitPrevue)}</div>}
        {cmd.notes && <div style={{fontSize:12, color:'var(--steam)', marginTop:4}}>Note : {cmd.notes}</div>}
      </div>
      <div className="no-print" style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:16}}>
        <button className="btn btn-sm" style={{background:'#25D366', color:'white', borderColor:'#25D366'}}
          onClick={ouvrirWhatsApp} disabled={!client || !client.tel}>
          📱 WhatsApp
        </button>
        <div style={{display:'flex', gap:8}}>
          <button className="btn btn-sm" onClick={()=>window.print()}><Icon name="print" size={14}/> Imprimer</button>
          <button className="btn btn-rust btn-sm" onClick={onClose}>Fermer</button>
        </div>
      </div>
    </ModalShell>
  );
}

/* ===================== CLIENTS ===================== */

function ClientsView({ site, updateSite }){
  const [search, setSearch] = useState('');
  const [selected, setSelected] = useState(null);
  const [showNew, setShowNew] = useState(false);
  const [editClient, setEditClient] = useState(null);

  const filtered = useMemo(() => {
    if(!search.trim()) return site.clients;
    const q = search.toLowerCase();
    return site.clients.filter(c => c.nom.toLowerCase().includes(q) || (c.tel||'').includes(q));
  }, [site.clients, search]);

  function clientStats(clientId){
    const cmds = site.commandes.filter(c => c.clientId === clientId);
    const total = cmds.reduce((s,c)=>s+calcCommandeTotal(c, site.services), 0);
    const impaye = cmds.filter(c=>c.paiement==='impaye').reduce((s,c)=>s+calcCommandeTotal(c, site.services), 0);
    return { count: cmds.length, total, impaye };
  }

  function saveEditClient(updated){
    updateSite({ ...site, clients: site.clients.map(c => c.id===updated.id ? updated : c) });
    setEditClient(null);
  }

  return (
    <div>
      <PageHeader title="Clients" subtitle={`${site.clients.length} fiche(s) client`}
        right={<button className="btn btn-rust" onClick={()=>setShowNew(true)}><Icon name="plus" size={15}/> Nouveau client</button>} />

      <div style={{position:'relative', maxWidth:320, marginBottom:18}}>
        <input type="text" placeholder="Rechercher…" value={search} onChange={e=>setSearch(e.target.value)} style={{paddingLeft:34}}/>
        <Icon name="search" size={15} style={{position:'absolute', left:11, top:11, color:'var(--steam)'}}/>
      </div>

      <div style={{display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:14}}>
        {filtered.map(c => {
          const st = clientStats(c.id);
          return (
            <div key={c.id} className="card" style={{padding:'1.1rem 1.25rem'}}>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}>
                <div style={{cursor:'pointer', flex:1}} onClick={()=>setSelected(c)}>
                  <div style={{fontWeight:600, fontSize:15}}>{c.nom}</div>
                  <div style={{fontSize:12.5, color:'var(--steam)'}}>{c.tel || 'Pas de téléphone'}</div>
                </div>
                <div style={{display:'flex', gap:4}}>
                  {st.impaye > 0 && <span className="tag tag-impaye">{fmtGNF(st.impaye)}</span>}
                  <button className="btn btn-ghost btn-sm" style={{padding:'4px 7px'}} onClick={()=>setEditClient(c)} title="Modifier">
                    <Icon name="edit" size={13}/>
                  </button>
                </div>
              </div>
              <div style={{display:'flex', gap:14, marginTop:12, fontSize:12.5, color:'var(--steam)', cursor:'pointer'}} onClick={()=>setSelected(c)}>
                <span>{st.count} commande(s)</span>
                <span className="mono">{fmtGNF(st.total)} cumulé</span>
              </div>
            </div>
          );
        })}
        {filtered.length === 0 && <p style={{color:'var(--steam)'}}>Aucun client trouvé.</p>}
      </div>

      {showNew && <NewClientModal site={site} updateSite={updateSite} onClose={()=>setShowNew(false)} />}
      {selected && <ClientDetailModal client={selected} site={site} onClose={()=>setSelected(null)} onEdit={(c)=>{ setSelected(null); setEditClient(c); }} />}
      {editClient && <EditClientModal client={editClient} onSave={saveEditClient} onClose={()=>setEditClient(null)} />}
    </div>
  );
}

function NewClientModal({ site, updateSite, onClose }){
  const [nom, setNom] = useState('');
  const [tel, setTel] = useState('');
  const [email, setEmail] = useState('');
  const [canalPref, setCanalPref] = useState('SMS');

  function submit(){
    if(!nom.trim()) return;
    const client = { id: uid('cli_'), nom: nom.trim(), tel: tel.trim(), email: email.trim(), canalPref, dateInscription: todayISO() };
    updateSite({ ...site, clients: [...site.clients, client] });
    onClose();
  }

  return (
    <ModalShell title="Nouveau client" onClose={onClose} width={420}>
      <div style={{display:'grid', gap:14}}>
        <div><label>Nom complet</label><input type="text" value={nom} onChange={e=>setNom(e.target.value)} autoFocus/></div>
        <div><label>Téléphone</label><input type="tel" value={tel} onChange={e=>setTel(e.target.value)} /></div>
        <div><label>Email (optionnel)</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} /></div>
        <div>
          <label>Canal de notification préféré</label>
          <select value={canalPref} onChange={e=>setCanalPref(e.target.value)}>
            <option value="SMS">SMS</option>
            <option value="Email">Email</option>
          </select>
        </div>
        <div style={{display:'flex', justifyContent:'flex-end', gap:10}}>
          <button className="btn" onClick={onClose}>Annuler</button>
          <button className="btn btn-rust" disabled={!nom.trim()} onClick={submit}>Créer</button>
        </div>
      </div>
    </ModalShell>
  );
}

function ClientDetailModal({ client, site, onClose, onEdit }){
  const cmds = site.commandes.filter(c => c.clientId === client.id).sort((a,b)=>new Date(b.dateCreation)-new Date(a.dateCreation));
  const total = cmds.reduce((s,c)=>s+calcCommandeTotal(c, site.services), 0);
  return (
    <ModalShell title={client.nom} onClose={onClose} width={560}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:18}}>
        <div style={{display:'flex', gap:20, fontSize:13.5, color:'var(--steam)', flexWrap:'wrap'}}>
          {client.tel && <span><Icon name="phone" size={13} style={{verticalAlign:-2, marginRight:4}}/>{client.tel}</span>}
          {client.email && <span><Icon name="mail" size={13} style={{verticalAlign:-2, marginRight:4}}/>{client.email}</span>}
          <span>Client depuis {fmtDate(client.dateInscription)}</span>
        </div>
        <button className="btn btn-sm" onClick={()=>onEdit(client)} style={{flexShrink:0, marginLeft:12}}>
          <Icon name="edit" size={13}/> Modifier
        </button>
      </div>
      <div style={{display:'flex', gap:14, marginBottom:18}}>
        <StatMini label="Commandes" value={cmds.length} />
        <StatMini label="Total dépensé" value={fmtGNF(total)} />
      </div>
      <h3 style={{fontSize:14, margin:'0 0 10px'}}>Historique</h3>
      <div style={{maxHeight:280, overflowY:'auto'}}>
        {cmds.length === 0 && <p style={{fontSize:13, color:'var(--steam)'}}>Aucune commande pour ce client.</p>}
        {cmds.map(c => (
          <div key={c.id} style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'8px 0', borderBottom:'1px solid var(--line)', fontSize:13}}>
            <div>
              <span className="mono" style={{fontWeight:600}}>{c.numero}</span>
              <span style={{color:'var(--steam)', marginLeft:8}}>{fmtDate(c.dateCreation.slice(0,10))}</span>
            </div>
            <div style={{display:'flex', gap:8, alignItems:'center'}}>
              <span className={`tag ${STATUT_TAG_CLASS[c.statut]}`}>{c.statut}</span>
              <span className="mono">{fmtGNF(calcCommandeTotal(c, site.services))}</span>
            </div>
          </div>
        ))}
      </div>
    </ModalShell>
  );
}

function EditClientModal({ client, onSave, onClose }){
  const [nom, setNom] = useState(client.nom || '');
  const [tel, setTel] = useState(client.tel || '');
  const [email, setEmail] = useState(client.email || '');
  const [canalPref, setCanalPref] = useState(client.canalPref || 'SMS');

  function submit(){
    if(!nom.trim()) return;
    onSave({ ...client, nom: nom.trim(), tel: tel.trim(), email: email.trim(), canalPref });
  }

  return (
    <ModalShell title={`Modifier — ${client.nom}`} onClose={onClose} width={420}>
      <div style={{display:'grid', gap:14}}>
        <div><label>Nom complet</label><input type="text" value={nom} onChange={e=>setNom(e.target.value)} autoFocus/></div>
        <div><label>Téléphone</label><input type="tel" value={tel} onChange={e=>setTel(e.target.value)} /></div>
        <div><label>Email (optionnel)</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} /></div>
        <div>
          <label>Canal de notification préféré</label>
          <select value={canalPref} onChange={e=>setCanalPref(e.target.value)}>
            <option value="SMS">SMS</option>
            <option value="WhatsApp">WhatsApp</option>
            <option value="Email">Email</option>
          </select>

function StockView({ site, updateSite }){
  const [showNew, setShowNew] = useState(false);
  const [confirmItem, setConfirmItem] = useState(null);
  const [editItem, setEditItem] = useState(null);

  function adjust(id, delta){
    updateSite({ ...site, stock: site.stock.map(s => s.id===id ? {...s, quantite: Math.max(0, s.quantite+delta)} : s) });
  }
  function removeItem(id){
    updateSite({ ...site, stock: site.stock.filter(s => s.id !== id) });
  }
  function saveEdit(){
    if(!editItem) return;
    updateSite({ ...site, stock: site.stock.map(s => s.id===editItem.id ? editItem : s) });
    setEditItem(null);
  }

  return (
    <div>
      <PageHeader title="Stock" subtitle="Consommables et fournitures"
        right={<button className="btn btn-rust" onClick={()=>setShowNew(true)}><Icon name="plus" size={15}/> Ajouter un article</button>} />

      <div className="card" style={{overflow:'hidden'}}>
        <table style={{width:'100%', borderCollapse:'collapse', fontSize:13.5}}>
          <thead>
            <tr style={{background:'var(--paper-2)', textAlign:'left'}}>
              <th style={th}>Article</th>
              <th style={th}>Quantité</th>
              <th style={th}>Seuil d'alerte</th>
              <th style={th}>Statut</th>
              <th style={th}></th>
            </tr>
          </thead>
          <tbody>
            {site.stock.map(s => {
              const low = s.quantite <= s.seuil;
              return (
                <tr key={s.id} style={{borderTop:'1px solid var(--line)'}}>
                  <td style={td}>{s.nom} <span style={{fontSize:11.5, color:'var(--steam)'}}>({s.unite})</span></td>
                  <td style={td}>
                    <div style={{display:'flex', alignItems:'center', gap:8}}>
                      <button className="btn btn-sm" style={{padding:'2px 9px'}} onClick={()=>adjust(s.id,-1)}>−</button>
                      <span className="mono">{s.quantite} {s.unite}</span>
                      <button className="btn btn-sm" style={{padding:'2px 9px'}} onClick={()=>adjust(s.id,1)}>+</button>
                    </div>
                  </td>
                  <td style={td} className="mono">{s.seuil} {s.unite}</td>
                  <td style={td}>{low ? <span className="tag tag-impaye">Stock bas</span> : <span className="tag tag-paye">OK</span>}</td>
                  <td style={{...td, textAlign:'right'}}>
                    <div style={{display:'flex', gap:6, justifyContent:'flex-end'}}>
                      <button className="btn btn-ghost btn-sm" onClick={()=>setEditItem({...s})} title="Modifier"><Icon name="edit" size={14}/></button>
                      <button className="btn btn-ghost btn-sm" style={{color:'var(--danger)'}} onClick={()=>setConfirmItem(site.stock.find(x=>x.id===s.id))} title="Supprimer"><Icon name="trash" size={14}/></button>
                    </div>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {showNew && <NewStockModal site={site} updateSite={updateSite} onClose={()=>setShowNew(false)} />}

      {confirmItem && <ConfirmDelete
        message={`Supprimer « ${confirmItem.nom} » du stock ?`}
        onConfirm={()=>{ removeItem(confirmItem.id); setConfirmItem(null); }}
        onCancel={()=>setConfirmItem(null)}
      />}

      {editItem && (
        <ModalShell title="Modifier l'article" onClose={()=>setEditItem(null)} width={400}>
          <div style={{display:'grid', gap:14}}>
            <div><label>Nom de l'article</label>
              <input type="text" value={editItem.nom} onChange={e=>setEditItem({...editItem, nom:e.target.value})} autoFocus/>
            </div>
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10}}>
              <div><label>Quantité actuelle</label>
                <input type="number" value={editItem.quantite} onChange={e=>setEditItem({...editItem, quantite:Number(e.target.value)})} />
              </div>
              <div><label>Unité</label>
                <input type="text" value={editItem.unite} onChange={e=>setEditItem({...editItem, unite:e.target.value})} />
              </div>
            </div>
            <div><label>Seuil d'alerte</label>
              <input type="number" value={editItem.seuil} onChange={e=>setEditItem({...editItem, seuil:Number(e.target.value)})} />
            </div>
            <div style={{display:'flex', justifyContent:'flex-end', gap:10}}>
              <button className="btn" onClick={()=>setEditItem(null)}>Annuler</button>
              <button className="btn btn-rust" disabled={!editItem.nom.trim()} onClick={saveEdit}>Enregistrer</button>
            </div>
          </div>
        </ModalShell>
      )}
    </div>
  );
}
