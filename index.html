async function storageGet(key) {
  try {
    const snapshot = await firebaseDB.ref(key).get();
    if (snapshot.exists()) return snapshot.val();
    return null;
  } catch (e) {
    console.error('Firebase get failed', e);
    return null;
  }
}
async function storageSet(key, value) {
  try {
    await firebaseDB.ref(key).set(value);
    return true;
  } catch (e) {
    console.error('Firebase set failed', e);
    return false;
  }
}
function subscribeToDB(key, callback) {
  firebaseDB.ref(key).on('value', snapshot => {
    if (snapshot.exists()) callback(snapshot.val());
  });
  return () => firebaseDB.ref(key).off();
}

// Les mots de passe employés sont stockés dans la base de données Firebase

function checkEmployePass(db, password) {
  for (const site of db.sites) {
    for (const emp of site.employes || []) {
      if (emp.motdepasse && emp.motdepasse === password) {
        return {
          employe: emp,
          siteId: site.id
        };
      }
    }
  }
  return null;
}

function App() {
  const [db, setDb] = useState(null);
  const [loading, setLoading] = useState(true);
  const [role, setRole] = useState(null); // 'gerant' | 'employe' | 'client'
  const [currentSiteId, setCurrentSiteId] = useState(null);
  const [currentClientId, setCurrentClientId] = useState(null);
  const [currentEmployeId, setCurrentEmployeId] = useState(null);
  const [isOnline, setIsOnline] = useState(navigator.onLine);
  const [pendingSync, setPendingSync] = useState(false);
  const saveTimer = useRef(null);

  // Surveillance de la connexion
  useEffect(() => {
    const goOnline = () => {
      setIsOnline(true);
      // Quand internet revient, synchroniser les données locales
      const localData = localStorage.getItem('maci-offline-db');
      if (localData && pendingSync) {
        try {
          const parsed = JSON.parse(localData);
          saveToDB(DB_KEY, parsed);
          setPendingSync(false);
          localStorage.removeItem('maci-offline-db');
        } catch (e) {
          console.error('Sync error', e);
        }
      }
    };
    const goOffline = () => setIsOnline(false);
    window.addEventListener('online', goOnline);
    window.addEventListener('offline', goOffline);
    return () => {
      window.removeEventListener('online', goOnline);
      window.removeEventListener('offline', goOffline);
    };
  }, [pendingSync]);
  useEffect(() => {
    setLoading(true);

    // Si hors ligne au démarrage : charger les données locales
    if (!navigator.onLine) {
      const localData = localStorage.getItem('maci-offline-db') || localStorage.getItem('maci-pressing-local');
      if (localData) {
        try {
          setDb(JSON.parse(localData));
          setLoading(false);
          setPendingSync(true);
          return;
        } catch (e) {
          console.error('local parse error', e);
        }
      }
    }

    // En ligne : écoute en temps réel Firebase
    const unsubscribe = subscribeToDB(DB_KEY, data => {
      try {
        const parsed = typeof data === 'string' ? JSON.parse(data) : data;
        setDb(parsed);
        // Sauvegarder localement pour le mode hors ligne
        localStorage.setItem('maci-pressing-local', JSON.stringify(parsed));
      } catch (e) {
        console.error('parse error', e);
      }
      setLoading(false);
    });

    // Premier chargement : si pas de données, crée la base vide
    (async () => {
      const raw = await storageGet(DB_KEY);

/* ===================== UTILITAIRES ===================== */

const uid = (p='') => p + Math.random().toString(36).slice(2,9);
const todayISO = () => new Date().toISOString().slice(0,10);

const fmtGNF = (n) => new Intl.NumberFormat('fr-FR',{style:'currency',currency:'GNF',maximumFractionDigits:0}).format(Math.round(n||0));

const fmtDate = (iso) => {
  if(!iso) return '—';
  const d = new Date(iso+'T00:00:00');
  return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'});
};
const fmtDateTime = (iso) => {
  if(!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short'}) + ' à ' + d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
};

function ticketNumber(siteCode, seq){
  const d = new Date();
  const yy = String(d.getFullYear()).slice(2);
  const mm = String(d.getMonth()+1).padStart(2,'0');
  return `${siteCode}-${yy}${mm}-${String(seq).padStart(4,'0')}`;
}

function siteCodeFromName(nom){
  const letters = nom.replace(/[^a-zA-Z]/g,'').toUpperCase();
  return (letters.slice(0,3) || 'PSG');
}

/* ===================== STORAGE LAYER (Firebase) ===================== */

const DB_KEY = 'pressing-db-v2';

async function storageGet(key){
  try{
    const snapshot = await firebaseDB.ref(key).get();
    if(snapshot.exists()) return snapshot.val();
    return null;
  }catch(e){ console.error('Firebase get failed', e); return null; }
}

async function storageSet(key, value){
  try{
    await firebaseDB.ref(key).set(value);
    return true;
  }catch(e){ console.error('Firebase set failed', e); return false; }
}

function subscribeToDB(key, callback){
  firebaseDB.ref(key).on('value', (snapshot) => {
    if(snapshot.exists()) callback(snapshot.val());
  });
  return () => firebaseDB.ref(key).off();
}

/* migration depuis l'ancien format mono-site (pressing-db-v1) si présent */
function migrateFromV1(oldRaw){
  try{
    const old = JSON.parse(oldRaw);
    if(!old || !old.entreprise) return null;
    const site = {
      id: uid('site_'),
      nom: old.entreprise.nom || 'Mon pressing',
      adresse: old.entreprise.adresse || '',
      tel: old.entreprise.tel || '',
      code: siteCodeFromName(old.entreprise.nom || 'PSG'),
      seq: old.seq || 1,
      services: old.services || defaultServices(),
      stock: old.stock || defaultStock(),
      clients: old.clients || [],
      commandes: old.commandes || [],
      notifications: old.notifications || [],
      employes: old.employes || [],
      depenses: old.depenses || [],
    };
    return { sites: [site] };
  }catch(e){ return null; }
}

const DEFAULT_PASS_GERANT = "Dero1981@";
function getPassGerant(db){ return db.passGerant || DEFAULT_PASS_GERANT; }

// Les mots de passe employés sont stockés dans la base de données Firebase
// et gérés par le gérant directement dans l'application.
// Format : { [mot_de_passe]: { nom, siteId } }

function checkEmployePass(db, password){
  for(const site of db.sites){
    for(const emp of (site.employes||[])){
      if(emp.motdepasse && emp.motdepasse === password){
        return { employe: emp, siteId: site.id };
      }
    }
  }
  return null;
}

/* ===================== APP ROOT ===================== */

function App(){
  const [db, setDb] = useState(null);
  const [loading, setLoading] = useState(true);
  const [role, setRole] = useState(null); // 'gerant' | 'employe' | 'client'
  const [currentSiteId, setCurrentSiteId] = useState(null);
  const [currentClientId, setCurrentClientId] = useState(null);
  const [currentEmployeId, setCurrentEmployeId] = useState(null);
  const [isOnline, setIsOnline] = useState(navigator.onLine);
  const [pendingSync, setPendingSync] = useState(false);
  const saveTimer = useRef(null);

  // Surveillance de la connexion
  useEffect(() => {
    const goOnline = () => {
      setIsOnline(true);
      // Quand internet revient, synchroniser les données locales
      const localData = localStorage.getItem('maci-offline-db');
      if(localData && pendingSync){
        try {
          const parsed = JSON.parse(localData);
          saveToDB(DB_KEY, parsed);
          setPendingSync(false);
          localStorage.removeItem('maci-offline-db');
        } catch(e){ console.error('Sync error', e); }
      }
    };
    const goOffline = () => setIsOnline(false);
    window.addEventListener('online', goOnline);
    window.addEventListener('offline', goOffline);
    return () => { window.removeEventListener('online', goOnline); window.removeEventListener('offline', goOffline); };
  }, [pendingSync]);

  useEffect(() => {
    setLoading(true);

    // Si hors ligne au démarrage : charger les données locales
    if(!navigator.onLine){
      const localData = localStorage.getItem('maci-offline-db') || localStorage.getItem('maci-pressing-local');
      if(localData){
        try {
          setDb(JSON.parse(localData));
          setLoading(false);
          setPendingSync(true);
          return;
        } catch(e){ console.error('local parse error', e); }
      }
    }

    // En ligne : écoute en temps réel Firebase
    const unsubscribe = subscribeToDB(DB_KEY, (data) => {
      try{
        const parsed = typeof data === 'string' ? JSON.parse(data) : data;
        setDb(parsed);
        // Sauvegarder localement pour le mode hors ligne
        localStorage.setItem('maci-pressing-local', JSON.stringify(parsed));
      }catch(e){ console.error('parse error', e); }
      setLoading(false);
    });

    // Premier chargement : si pas de données, crée la base vide
    (async () => {
      const raw = await storageGet(DB_KEY);
      if(!raw){
        const fresh = emptyDB();
        await storageSet(DB_KEY, JSON.stringify(fresh));
      }
    })();

    return unsubscribe;
  }, []);

  const persist = useCallback((next) => {
    setDb(next);
    if(saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      if(navigator.onLine){
        // En ligne : sauvegarder sur Firebase normalement
        storageSet(DB_KEY, JSON.stringify(next));
        localStorage.removeItem('maci-offline-db');
      } else {
        // Hors ligne : sauvegarder localement
        localStorage.setItem('maci-offline-db', JSON.stringify(next));
        setPendingSync(true);
      }
    }, 400);
  }, []);

  if(loading || !db){
    return (
      <div style={{minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', color:'var(--pine)'}}>
        <div className="mono" style={{fontSize:13}}>Chargement…</div>
      </div>
    );
  }

  if(!role){
    return (
      <>
        {!isOnline && <OfflineBanner pending={pendingSync} />}
        <RoleSelect db={db} setDb={persist} onSelect={(r, siteId, clientId, employeId) => { setRole(r); setCurrentSiteId(siteId||null); setCurrentClientId(clientId||null); setCurrentEmployeId(employeId||null); }} />
      </>
    );
  }

  const offlineBanner = !isOnline ? <OfflineBanner pending={pendingSync} /> : null;

  if(role === 'gerant') return <>{offlineBanner}<GerantApp db={db} setDb={persist} onLogout={()=>{setRole(null); setCurrentSiteId(null);}} /></>;
  if(role === 'employe') return <>{offlineBanner}<EmployeApp db={db} setDb={persist} siteId={currentSiteId} employeId={currentEmployeId} onLogout={()=>{setRole(null); setCurrentSiteId(null); setCurrentEmployeId(null);}} /></>;
  if(role === 'client') return <>{offlineBanner}<ClientApp db={db} setDb={persist} siteId={currentSiteId} clientId={currentClientId} onLogout={()=>{setRole(null); setCurrentSiteId(null); setCurrentClientId(null);}} /></>;

  return null;
}

/* ===================== BANNIERE HORS LIGNE ===================== */

function OfflineBanner({ pending }){
  return (
    <div style={{
      position:'fixed', top:0, left:0, right:0, zIndex:9999,
      background: pending ? '#b45309' : '#92400e',
      color:'white', padding:'8px 16px',
      display:'flex', justifyContent:'space-between', alignItems:'center',
      fontSize:13, fontWeight:600
    }}>
      <span>📵 Mode hors ligne — {pending ? 'données en attente de synchronisation' : 'données sauvegardées localement'}</span>
      <span style={{fontSize:11, opacity:0.85}}>Les données seront synchronisées quand internet reviendra</span>
    </div>
  );
}

/* ===================== ECRAN CHOIX DE ROLE ===================== */

function RoleSelect({ db, setDb, onSelect }){
  const [mode, setMode] = useState(null);
  const [loginRole, setLoginRole] = useState(null);
  const [selectedEmp, setSelectedEmp] = useState(null); // {emp, siteId}
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');

  // Tous les employés de tous les sites
  const allEmployes = useMemo(() => {
    const list = [];
    db.sites.forEach(site => {
      (site.employes||[]).forEach(emp => {
        list.push({ emp, site });
      });
    });
    return list;
  }, [db]);

  function handleLogin(){
    if(loginRole === 'gerant'){
      if(password === getPassGerant(db)){
        onSelect('gerant');
      } else {
        setError('Mot de passe incorrect. Réessayez.');
        setPassword('');
      }
    } else if(loginRole === 'employe' && selectedEmp){
      if(password === selectedEmp.emp.motdepasse){
        onSelect('employe', selectedEmp.site.id, null, selectedEmp.emp.id);
        setLoginRole(null); setSelectedEmp(null); setPassword(''); setError('');
      } else {
        setError('Mot de passe incorrect. Réessayez.');
        setPassword('');
      }
    }
  }

  if(loginRole === 'employe' && !selectedEmp){
    return (
      <div style={{minHeight:'100vh', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'2rem'}}>
        <div style={{textAlign:'center', marginBottom:'2rem'}}>
          <Icon name="shirt" size={30} style={{color:'var(--pine)'}} />
          <h1 style={{fontSize:28, margin:'10px 0 4px', color:'var(--pine)'}}>Maci Pressing</h1>
          <p style={{color:'var(--steam)', fontSize:14, margin:0}}>Espace Employé — Qui êtes-vous ?</p>
        </div>
        <div className="card" style={{padding:'1.75rem', width:400, maxWidth:'90vw'}}>
          <label>Sélectionnez votre nom</label>
          <div style={{display:'grid', gap:8, marginTop:6}}>
            {allEmployes.map(({emp, site}) => (
              <button key={emp.id} className="btn" style={{textAlign:'left', display:'flex', justifyContent:'space-between', alignItems:'center'}}
                onClick={()=>setSelectedEmp({emp, site})}>
                <span style={{fontWeight:600}}>{emp.nom}</span>
                <span style={{fontSize:12, color:'var(--steam)'}}>{emp.role} · {site.nom}</span>
              </button>
            ))}
            {allEmployes.length === 0 && <p style={{color:'var(--steam)', fontSize:13}}>Aucun employé enregistré. Le gérant doit d'abord créer des fiches employés.</p>}
          </div>
          <button className="btn btn-ghost btn-sm" style={{marginTop:12}} onClick={()=>{ setLoginRole(null); setError(''); }}>← Retour</button>
        </div>
      </div>
    );
  }

  if(loginRole){
    return (
      <div style={{minHeight:'100vh', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'2rem'}}>
        <div style={{textAlign:'center', marginBottom:'2rem'}}>
          <Icon name="shirt" size={30} style={{color:'var(--pine)'}} />
          <h1 style={{fontSize:28, margin:'10px 0 4px', color:'var(--pine)'}}>Maci Pressing</h1>
          {selectedEmp ? (
            <p style={{color:'var(--steam)', fontSize:14, margin:0}}>Bonjour <strong>{selectedEmp.emp.nom}</strong> — {selectedEmp.site.nom}</p>
          ) : (
            <p style={{color:'var(--steam)', fontSize:14, margin:0}}>Espace Gérant</p>
          )}
        </div>
        <div className="card" style={{padding:'1.75rem', width:340, maxWidth:'90vw'}}>
          <label>Mot de passe</label>
          <input
            type="password"
            placeholder="Entrez votre mot de passe…"
            value={password}
            onChange={e=>{ setPassword(e.target.value); setError(''); }}
            onKeyDown={e=>{ if(e.key==='Enter') handleLogin(); }}
            autoFocus
          />
          {error && <p style={{color:'var(--danger)', fontSize:13, margin:'8px 0 0'}}>{error}</p>}
          <div style={{display:'flex', gap:10, marginTop:14}}>
            <button className="btn" onClick={()=>{ setSelectedEmp(null); setPassword(''); setError(''); if(loginRole==='gerant') setLoginRole(null); }} style={{flex:1}}>Retour</button>
            <button className="btn btn-rust" onClick={handleLogin} style={{flex:1}}>Entrer</button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div style={{minHeight:'100vh', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'2rem'}}>
      <div style={{textAlign:'center', marginBottom:'2.5rem'}}>
        <div style={{display:'inline-flex', alignItems:'center', gap:10, color:'var(--pine)', marginBottom:14}}>
          <Icon name="shirt" size={30} />
        </div>
        <h1 style={{fontSize:34, margin:0, color:'var(--pine)'}}>Maci Pressing</h1>
        <p className="mono" style={{color:'var(--steam)', fontSize:13, marginTop:6}}>
          {db.sites.length > 1 ? `${db.sites.length} sites — choisissez votre espace` : 'Gestion de pressing — choisissez votre espace'}
        </p>
      </div>

      {!mode && (
        <div style={{display:'flex', gap:18, flexWrap:'wrap', justifyContent:'center', maxWidth:760}}>
          <RoleCard icon="home" title="Gérant" desc="Supervision de tous les sites, finances, stock" onClick={() => setLoginRole('gerant')} />
          <RoleCard icon="ticket" title="Employé" desc="Caisse, création et suivi des commandes" onClick={() => setLoginRole('employe')} />
          <RoleCard icon="users" title="Client" desc="Suivre mes commandes et factures" onClick={() => setMode('client')} />
        </div>
      )}

      {mode === 'employe' && (
        <SitePicker db={db} title="Quel pressing ?" onPick={(siteId) => onSelect('employe', siteId)} onBack={()=>setMode(null)} />
      )}

      {mode === 'client' && (
        <ClientLoginFlow db={db} onPick={(siteId, clientId) => onSelect('client', siteId, clientId)} onBack={()=>setMode(null)} />
      )}
    </div>
  );
}

function SitePicker({ db, title, onPick, onBack }){
  return (
    <div className="card" style={{marginTop:24, padding:'1.25rem', width:380, maxWidth:'90vw'}}>
      <label>{title}</label>
      <div style={{display:'grid', gap:8, marginTop:6}}>
        {db.sites.map(s => (
          <button key={s.id} className="btn" style={{width:'100%', textAlign:'left', display:'flex', justifyContent:'space-between', alignItems:'center'}} onClick={()=>onPick(s.id)}>
            <span>{s.nom}</span>
            <span className="mono" style={{fontSize:11.5, color:'var(--steam)'}}>{s.code}</span>
          </button>
        ))}
      </div>
      <button className="btn btn-ghost btn-sm" style={{marginTop:10}} onClick={onBack}>← Retour</button>
    </div>
  );
}

function ClientLoginFlow({ db, onPick, onBack }){
  const [siteId, setSiteId] = useState(db.sites.length === 1 ? db.sites[0].id : null);
  const [search, setSearch] = useState('');

  const site = db.sites.find(s => s.id === siteId);
  const matches = useMemo(() => {
    if(!site || !search.trim()) return [];
    const q = search.toLowerCase();
    return site.clients.filter(c => c.nom.toLowerCase().includes(q) || (c.tel||'').includes(q)).slice(0,6);
  }, [search, site]);

  if(!siteId){
    return <SitePicker db={db} title="Vous êtes client de quel pressing ?" onPick={setSiteId} onBack={onBack} />;
  }

  return (
    <div className="card" style={{marginTop:24, padding:'1.25rem', width:380, maxWidth:'90vw'}}>
      <label>Trouvez votre fiche client — {site.nom}</label>
      <input type="text" placeholder="Nom ou téléphone…" value={search} onChange={e=>setSearch(e.target.value)} autoFocus />
      <div style={{marginTop:10, maxHeight:220, overflowY:'auto'}}>
        {search && matches.length === 0 && (
          <p style={{fontSize:13, color:'var(--steam)', margin:'8px 0'}}>Aucun client trouvé. Demandez à l'accueil de créer votre fiche.</p>
        )}
        {matches.map(c => (
          <button key={c.id} className="btn" style={{width:'100%', textAlign:'left', marginBottom:6, display:'flex', justifyContent:'space-between'}} onClick={() => onPick(siteId, c.id)}>
            <span>{c.nom}</span>
            <span className="mono" style={{color:'var(--steam)', fontSize:12}}>{c.tel}</span>
          </button>
        ))}
      </div>
      <div style={{display:'flex', gap:8, marginTop:8}}>
        {db.sites.length > 1 && <button className="btn btn-ghost btn-sm" onClick={()=>setSiteId(null)}>← Changer de site</button>}
        <button className="btn btn-ghost btn-sm" onClick={onBack}>Annuler</button>
      </div>
    </div>
  );
}

              {item.label}

function PageHeader({ title, subtitle, right }){
  return (
    <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:'1.75rem', gap:16, flexWrap:'wrap'}}>
      <div>

      </div>
      {right}

/* ===================== LOGIQUE METIER ===================== */

function calcCommandeTotal(commande, services){
  return commande.lignes.reduce((sum, l) => {
    const svc = services.find(s => s.id === l.serviceId);
    const prix = svc ? svc.prix : 0;
    return sum + prix * l.qte;
  }, 0);
}

function pushNotification(site, updateSite, { clientId, message, canal }){
  const notif = { id: uid('notif_'), clientId, message, canal, date: new Date().toISOString() };
  updateSite({ ...site, notifications: [notif, ...site.notifications].slice(0, 300) });
}

/* ===================== ESPACE GERANT (multi-sites) ===================== */

function GerantApp({ db, setDb, onLogout }){
  const [page, setPage] = useState('global');
  const [activeSiteId, setActiveSiteId] = useState(null);

  function updateSite(updatedSite){
    setDb({ ...db, sites: db.sites.map(s => s.id === updatedSite.id ? updatedSite : s) });
  }
  function addSite(nom, adresse, tel){
    const newSite = makeSite(nom, adresse, tel);
    setDb({ ...db, sites: [...db.sites, newSite] });
    return newSite.id;
  }
  function removeSite(id){
    if(db.sites.length <= 1) return;
    setDb({ ...db, sites: db.sites.filter(s=>s.id!==id) });
    if(activeSiteId === id) setActiveSiteId(null);
  }

  const navItems = [
    { key:'global', label:'Vue globale', icon:'layers' },
    { key:'sites', label:'Mes pressings', icon:'building' },
  ];

  const activeSite = db.sites.find(s => s.id === activeSiteId);

  return (
    <Shell title="Maci Pressing" role={`Gérant — ${db.sites.length} site(s)`} navItems={navItems}
      active={activeSiteId ? null : page} onNav={(p)=>{setActiveSiteId(null); setPage(p);}} onLogout={onLogout}>
      {activeSite ? (
        <SiteDetailForGerant site={activeSite} db={db} setDb={setDb} updateSite={updateSite} onBack={()=>setActiveSiteId(null)} />
      ) : (
        <>
          {page === 'global' && <GlobalDashboard db={db} onOpenSite={setActiveSiteId} />}
          {page === 'sites' && <SitesManager db={db} setDb={setDb} addSite={addSite} removeSite={removeSite} onOpenSite={setActiveSiteId} />}
        </>
      )}
    </Shell>
  );
}

function GlobalDashboard({ db, onOpenSite }){
  const today = todayISO();

  const perSite = db.sites.map(site => {
    const cmds = site.commandes;
    const cmdsToday = cmds.filter(c => c.dateCreation.slice(0,10) === today);
    const cmdsMonth = cmds.filter(c => c.dateCreation.slice(0,7) === today.slice(0,7));
    const caJour = cmdsToday.reduce((s,c)=>s+calcCommandeTotal(c, site.services),0);
    const caMois = cmdsMonth.reduce((s,c)=>s+calcCommandeTotal(c, site.services),0);
    const impayes = cmds.filter(c => c.paiement === 'impaye');
    const montantImpaye = impayes.reduce((s,c)=>s+calcCommandeTotal(c, site.services),0);
    const enCours = cmds.filter(c => c.statut === 'En cours' || c.statut === 'Reçu').length;
    const lowStock = site.stock.filter(s => s.quantite <= s.seuil).length;
    const depensesMois = (site.depenses||[]).filter(d=>d.date.slice(0,7)===today.slice(0,7)).reduce((s,d)=>s+Number(d.montant),0);
    const beneficeMois = caMois - depensesMois;
    return { site, caJour, caMois, montantImpaye, impayesCount: impayes.length, enCours, lowStock, clientsCount: site.clients.length, depensesMois, beneficeMois };
  });

  const totals = perSite.reduce((acc, p) => ({
    caJour: acc.caJour + p.caJour,
    caMois: acc.caMois + p.caMois,
    montantImpaye: acc.montantImpaye + p.montantImpaye,
    clientsCount: acc.clientsCount + p.clientsCount,
  }), { caJour:0, caMois:0, montantImpaye:0, clientsCount:0 });

  return (
    <div>
      <PageHeader title="Vue globale" subtitle={`${db.sites.length} pressing(s) — ${fmtDate(today)}`} />

      <div style={{display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:14, marginBottom:28}}>
        <StatCard label="CA total aujourd'hui" value={fmtGNF(totals.caJour)} icon="euro" />
        <StatCard label="CA total ce mois" value={fmtGNF(totals.caMois)} icon="chart" />
        <StatCard label="Impayés cumulés" value={fmtGNF(totals.montantImpaye)} icon="alert" tone={totals.montantImpaye>0?'danger':'default'} />
        <StatCard label="Clients (tous sites)" value={totals.clientsCount} icon="users" />
      </div>

      <h2 style={{fontSize:16, color:'var(--pine)', marginBottom:14}}>Détail par site</h2>
      <div style={{display:'grid', gap:14}}>
        {perSite.map(p => (
          <div key={p.site.id} className="card" style={{padding:'1.25rem 1.5rem', cursor:'pointer'}} onClick={()=>onOpenSite(p.site.id)}>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', flexWrap:'wrap', gap:10}}>
              <div>
                <div style={{display:'flex', alignItems:'center', gap:8}}>
                  <span style={{fontWeight:700, fontSize:16}}>{p.site.nom}</span>
                  <span className="mono" style={{fontSize:11, color:'var(--steam)'}}>{p.site.code}</span>
                </div>
                <div style={{fontSize:12.5, color:'var(--steam)', marginTop:2}}>{p.site.adresse}</div>
              </div>
              <div style={{display:'flex', alignItems:'center', gap:6, color:'var(--pine)', fontSize:13, fontWeight:600}}>
                Voir le détail <Icon name="arrowRight" size={14}/>
              </div>
            </div>
            <div style={{display:'flex', gap:24, marginTop:16, flexWrap:'wrap'}}>
              <MiniMetric label="CA aujourd'hui" value={fmtGNF(p.caJour)} />
              <MiniMetric label="CA ce mois" value={fmtGNF(p.caMois)} />
              <MiniMetric label="Impayés" value={fmtGNF(p.montantImpaye)} danger={p.impayesCount>0} />
              <MiniMetric label="À traiter" value={p.enCours} />
              <MiniMetric label="Stock bas" value={p.lowStock} danger={p.lowStock>0} />
              <MiniMetric label="Dépenses mois" value={fmtGNF(p.depensesMois)} danger={p.depensesMois>0} />
              <MiniMetric label="Bénéfice net" value={fmtGNF(p.beneficeMois)} danger={p.beneficeMois<0} />
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function MiniMetric({ label, value, danger }){
  return (
    <div>
      <div style={{fontSize:11, color:'var(--steam)', textTransform:'uppercase', fontWeight:600, letterSpacing:'0.03em'}}>{label}</div>
      <div className="mono" style={{fontSize:15, fontWeight:700, color: danger ? 'var(--danger)' : 'var(--pine)'}}>{value}</div>
    </div>
  );
}

function SitesManager({ db, addSite, removeSite, onOpenSite, setDb }){
  const [showNew, setShowNew] = useState(false);
  const [confirmSite, setConfirmSite] = useState(null);
  const [showUniformiser, setShowUniformiser] = useState(false);
  const [sourceSiteId, setSourceSiteId] = useState(db.sites[0]?.id || '');
  const [uniformFlash, setUniformFlash] = useState(false);

  function uniformiserPrix(){
    const source = db.sites.find(s => s.id === sourceSiteId);
    if(!source) return;
    const updatedSites = db.sites.map(site => {
      if(site.id === sourceSiteId) return site;
      const newServices = source.services.map(srcSvc => {
        const existing = site.services.find(s => s.nom === srcSvc.nom);
        if(existing) return { ...existing, prix: srcSvc.prix, categorie: srcSvc.categorie };
        return { ...srcSvc, id: uid('svc_') };
      });
      return { ...site, services: newServices };
    });
    setDb({ ...db, sites: updatedSites });
    setUniformFlash(true);
    setTimeout(()=>setUniformFlash(false), 2000);
  }

  return (
    <div>
      <PageHeader title="Mes pressings" subtitle="Créez, supprimez ou ouvrez un établissement"
        right={<div style={{display:'flex', gap:10}}>
          <button className="btn" onClick={()=>setShowUniformiser(!showUniformiser)}>
            <Icon name="layers" size={15}/> Uniformiser les prix
          </button>
          <button className="btn btn-rust" onClick={()=>setShowNew(true)}><Icon name="plus" size={15}/> Nouveau pressing</button>
        </div>} />

      {showUniformiser && (
        <div className="card" style={{padding:'1.25rem', marginBottom:18, background:'var(--pine-light)', border:'1.5px solid var(--pine)'}}>
          <h3 style={{margin:'0 0 10px', fontSize:15, color:'var(--pine)'}}>Uniformiser les tarifs</h3>
          <p style={{fontSize:13, color:'var(--pine)', margin:'0 0 14px', lineHeight:1.5}}>
            Copie les services et prix d'un pressing vers <strong>tous les autres</strong>. Les prix existants seront mis à jour, les nouveaux services ajoutés.
          </p>
          <div style={{display:'flex', gap:12, alignItems:'flex-end', flexWrap:'wrap'}}>
            <div style={{flex:1, minWidth:200}}>
              <label>Pressing source (modèle)</label>
              <select value={sourceSiteId} onChange={e=>setSourceSiteId(e.target.value)}>
                {db.sites.map(s => <option key={s.id} value={s.id}>{s.nom}</option>)}
              </select>
            </div>
            <button className="btn btn-rust" onClick={uniformiserPrix} style={{minWidth:200}}>
              {uniformFlash ? <><Icon name="check" size={14}/> Prix uniformisés !</> : `Copier vers ${db.sites.length - 1} autre(s) pressing(s)`}
            </button>
          </div>
          {sourceSiteId && (
            <div style={{marginTop:12}}>
              <div style={{fontSize:12, color:'var(--pine)', fontWeight:600, marginBottom:6}}>Services qui seront copiés :</div>
              <div style={{display:'flex', flexWrap:'wrap', gap:6}}>
                {db.sites.find(s=>s.id===sourceSiteId)?.services.map(svc => (
                  <span key={svc.id} style={{fontSize:12, background:'var(--white)', padding:'3px 10px', borderRadius:100, border:'1px solid var(--pine)'}}>
                    {svc.nom} — {fmtGNF(svc.prix)}
                  </span>
                ))}
              </div>
            </div>
          )}
        </div>
      )}

      <div style={{display:'grid', gridTemplateColumns:'repeat(2,1fr)', gap:14}}>
        {db.sites.map(s => (
          <div key={s.id} className="card" style={{padding:'1.25rem 1.4rem'}}>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}>
              <div>
                <div style={{fontWeight:700, fontSize:15}}>{s.nom}</div>
                <div style={{fontSize:12.5, color:'var(--steam)', marginTop:2}}>{s.adresse}</div>
                <div style={{fontSize:12.5, color:'var(--steam)'}}>{s.tel}</div>
              </div>
              <span className="mono" style={{fontSize:11, color:'var(--steam)'}}>{s.code}</span>
            </div>
            <div style={{fontSize:12, color:'var(--steam)', marginTop:8}}>{s.services.length} service(s) · {s.clients.length} client(s)</div>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:12}}>
              <button className="btn btn-sm btn-primary" onClick={()=>onOpenSite(s.id)} style={{background:'var(--pine)', color:'var(--white)', borderColor:'var(--pine)'}}>
                Ouvrir ce pressing →
              </button>
              <button className="btn btn-ghost btn-sm" disabled={db.sites.length<=1}
                style={{color:'var(--danger)', borderColor:'var(--danger)', marginLeft:24}}
                onClick={()=>setConfirmSite(s)}>
                <Icon name="trash" size={13}/> Supprimer
              </button>
            </div>
          </div>
        ))}
      </div>

      {showNew && <NewSiteModal onClose={()=>setShowNew(false)} onCreate={(nom,adresse,tel)=>{ addSite(nom,adresse,tel); setShowNew(false); }} />}
      {confirmSite && <ConfirmDelete db={db}
        message={`Supprimer définitivement « ${confirmSite.nom} » et TOUTES ses données (commandes, clients, stock) ? Cette action est irréversible.`}
        onConfirm={()=>{ removeSite(confirmSite.id); setConfirmSite(null); }}
        onCancel={()=>setConfirmSite(null)}
      />}
    </div>
  );
}

function NewSiteModal({ onClose, onCreate }){
  const [nom, setNom] = useState('');
  const [adresse, setAdresse] = useState('');
  const [tel, setTel] = useState('');
  return (
    <ModalShell title="Nouveau pressing" onClose={onClose} width={420}>
      <div style={{display:'grid', gap:14}}>
        <div><label>Nom du pressing</label><input type="text" value={nom} onChange={e=>setNom(e.target.value)} autoFocus placeholder="ex. Maci Pressing — Hamdallaye"/></div>

        <div style={{display:'flex', justifyContent:'flex-end', gap:10}}>

function Dashboard({ site, updateSite }){
  const today = todayISO();
  const stats = useMemo(() => {
    const cmds = site.commandes;
    const cmdsToday = cmds.filter(c => c.dateCreation.slice(0,10) === today);
    const cmdsMonth = cmds.filter(c => c.dateCreation.slice(0,7) === today.slice(0,7));
    const caJour = cmdsToday.reduce((s,c)=>s+calcCommandeTotal(c, site.services),0);
    const caMois = cmdsMonth.reduce((s,c)=>s+calcCommandeTotal(c, site.services),0);
    const impayes = cmds.filter(c => c.paiement === 'impaye');
    const montantImpaye = impayes.reduce((s,c)=>s+calcCommandeTotal(c, site.services),0);
    const enCours = cmds.filter(c => c.statut === 'En cours' || c.statut === 'Reçu').length;
    const pretsNonRecuperes = cmds.filter(c => c.statut === 'Prêt').length;

    const serviceCount = {};
    cmds.forEach(c => c.lignes.forEach(l => { serviceCount[l.serviceId] = (serviceCount[l.serviceId]||0) + l.qte; }));
    const topServices = Object.entries(serviceCount)
      .map(([id, qte]) => ({ svc: site.services.find(s=>s.id===id), qte }))
      .filter(x=>x.svc).sort((a,b)=>b.qte-a.qte).slice(0,5);

    const last7 = Array.from({length:7}, (_,i)=>{
      const d = new Date(); d.setDate(d.getDate()-(6-i));
      const iso = d.toISOString().slice(0,10);
      const ca = cmds.filter(c=>c.dateCreation.slice(0,10)===iso).reduce((s,c)=>s+calcCommandeTotal(c,site.services),0);
      return { iso, ca, label: d.toLocaleDateString('fr-FR',{weekday:'short'}) };
    });
    const maxCa = Math.max(...last7.map(d=>d.ca), 1);

    const depenses = (site.depenses||[]);
    const depensesJour = depenses.filter(d=>d.date===today).reduce((s,d)=>s+Number(d.montant),0);
    const depensesMois = depenses.filter(d=>d.date.slice(0,7)===today.slice(0,7)).reduce((s,d)=>s+Number(d.montant),0);
    const beneficeMois = caMois - depensesMois;

    return { caJour, caMois, montantImpaye, impayesCount: impayes.length, enCours, pretsNonRecuperes, topServices, last7, maxCa, totalClients: site.clients.length, depensesJour, depensesMois, beneficeMois };
  }, [site, today]);

  const lowStock = site.stock.filter(s => s.quantite <= s.seuil);

  return (
    <div>
      <PageHeader title={site.nom} subtitle={`Aujourd'hui, ${fmtDate(today)}`} />

      <div style={{display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:14, marginBottom:14}}>
        <StatCard label="CA aujourd'hui" value={fmtGNF(stats.caJour)} icon="euro" />
        <StatCard label="CA ce mois" value={fmtGNF(stats.caMois)} icon="chart" />
        <StatCard label="Impayés" value={fmtGNF(stats.montantImpaye)} sub={`${stats.impayesCount} commande(s)`} icon="alert" tone={stats.impayesCount>0 ? 'danger':'default'} />
        <StatCard label="Clients" value={stats.totalClients} icon="users" />
      </div>
      <div style={{display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:14, marginBottom:24}}>
        <StatCard label="Dépenses aujourd'hui" value={fmtGNF(stats.depensesJour)} icon="trash" tone="danger" />
        <StatCard label="Dépenses ce mois" value={fmtGNF(stats.depensesMois)} icon="trash" tone="danger" />
        <StatCard label="Bénéfice net ce mois" value={fmtGNF(stats.beneficeMois)} icon="chart" tone={stats.beneficeMois>=0?'default':'danger'} sub="CA − Dépenses" />
      </div>

      <div style={{display:'grid', gridTemplateColumns:'1.4fr 1fr', gap:16, marginBottom:24}}>
        <div className="card" style={{padding:'1.5rem'}}>
          <h3 style={{margin:'0 0 16px', fontSize:15}}>Chiffre d'affaires — 7 derniers jours</h3>
          <div style={{display:'flex', alignItems:'flex-end', gap:10, height:140}}>
            {stats.last7.map(d => (
              <div key={d.iso} style={{flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:6}}>
                <div style={{fontSize:10.5, color:'var(--steam)'}} className="mono">{d.ca>0 ? Math.round(d.ca/1000)+'k' : ''}</div>
                <div style={{
                  width:'100%', background:'var(--rust)', borderRadius:'4px 4px 0 0',
                  height: Math.max(4, (d.ca/stats.maxCa)*90), opacity: d.iso===today?1:0.55
                }}/>
                <div style={{fontSize:11.5, color:'var(--pine)', textTransform:'capitalize'}}>{d.label}</div>
              </div>
            ))}
          </div>
        </div>

        <div className="card" style={{padding:'1.5rem'}}>
          <h3 style={{margin:'0 0 16px', fontSize:15}}>Services les plus demandés</h3>
          {stats.topServices.length === 0 && <p style={{fontSize:13, color:'var(--steam)'}}>Pas encore de données.</p>}
          {stats.topServices.map((t,i) => (
            <div key={t.svc.id} style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'7px 0', borderBottom: i<stats.topServices.length-1 ? '1px solid var(--line)' : 'none'}}>
              <span style={{fontSize:13.5}}>{t.svc.nom}</span>
              <span className="mono" style={{fontSize:13, color:'var(--steam)'}}>{t.qte}x</span>
            </div>
          ))}
        </div>
      </div>

      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:16}}>
        <div className="card" style={{padding:'1.5rem'}}>
          <h3 style={{margin:'0 0 12px', fontSize:15}}>À traiter</h3>
          <div style={{display:'flex', gap:16}}>
            <div>
              <div style={{fontSize:22, fontWeight:700, color:'var(--rust)'}}>{stats.enCours}</div>
              <div style={{fontSize:12.5, color:'var(--steam)'}}>en cours / reçues</div>
            </div>
            <div>
              <div style={{fontSize:22, fontWeight:700, color:'var(--ok)'}}>{stats.pretsNonRecuperes}</div>
              <div style={{fontSize:12.5, color:'var(--steam)'}}>prêtes, à récupérer</div>
            </div>
          </div>
        </div>

        <div className="card" style={{padding:'1.5rem'}}>
          <h3 style={{margin:'0 0 12px', fontSize:15, display:'flex', alignItems:'center', gap:8}}>
            <Icon name="alert" size={15} style={{color: lowStock.length ? 'var(--danger)':'var(--steam)'}}/> Stock à surveiller
          </h3>
          {lowStock.length === 0 && <p style={{fontSize:13, color:'var(--steam)'}}>Tous les stocks sont au-dessus du seuil.</p>}
          {lowStock.map(s => (
            <div key={s.id} style={{display:'flex', justifyContent:'space-between', fontSize:13.5, padding:'5px 0'}}>
              <span>{s.nom}</span>
              <span className="mono" style={{color:'var(--danger)'}}>{s.quantite} {s.unite}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function StatCard({ label, value, sub, icon, tone='default' }){
  const toneColor = tone === 'danger' ? 'var(--danger)' : 'var(--pine)';
  return (
    <div className="card" style={{padding:'1.1rem 1.25rem'}}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}>
        <div>
          <div style={{fontSize:12, color:'var(--steam)', textTransform:'uppercase', letterSpacing:'0.04em', fontWeight:600}}>{label}</div>
          <div style={{fontSize:22, fontWeight:700, color:toneColor, marginTop:4}}>{value}</div>
          {sub && <div style={{fontSize:12, color:'var(--steam)', marginTop:2}}>{sub}</div>}

        <Icon name={icon} size={18} style={{color:'var(--steam)', marginTop:2}} />
