const DB_KEY = 'pressing-db-v2';
async function storageGet(key) {
  try {
    const snapshot = await firebaseDB.ref(key).get();
    if (snapshot.exists()) return snapshot.val();
    return null;
  } catch (e) {
    console.error('Firebase get failed', e);
    return null;
  }
}
async function storageSet(key, value) {
  try {
    await firebaseDB.ref(key).set(value);
    return true;
  } catch (e) {
    console.error('Firebase set failed', e);
    return false;
  }
}
function subscribeToDB(key, callback) {
  firebaseDB.ref(key).on('value', snapshot => {
    if (snapshot.exists()) callback(snapshot.val());
  });
  return () => firebaseDB.ref(key).off();
}

function migrateFromV1(oldRaw) {
  try {
    const old = JSON.parse(oldRaw);
    if (!old || !old.entreprise) return null;
    const site = {
      id: uid('site_'),
      nom: old.entreprise.nom || 'Mon pressing',
      adresse: old.entreprise.adresse || '',
      tel: old.entreprise.tel || '',
      code: siteCodeFromName(old.entreprise.nom || 'PSG'),
      seq: old.seq || 1,
      services: old.services || defaultServices(),
      stock: old.stock || defaultStock(),
      clients: old.clients || [],
      commandes: old.commandes || [],
      notifications: old.notifications || [],
      employes: old.employes || []
    };
    return {
      sites: [site]
    };
  } catch (e) {
    return null;

}

const uid = (p='') => p + Math.random().toString(36).slice(2,9);
const todayISO = () => new Date().toISOString().slice(0,10);

const fmtGNF = (n) => new Intl.NumberFormat('fr-FR',{style:'currency',currency:'GNF',maximumFractionDigits:0}).format(Math.round(n||0));

const fmtDate = (iso) => {
  if(!iso) return '—';
  const d = new Date(iso+'T00:00:00');
  return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'});
};
const fmtDateTime = (iso) => {
  if(!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short'}) + ' à ' + d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
};

function ticketNumber(siteCode, seq){
  const d = new Date();
  const yy = String(d.getFullYear()).slice(2);
  const mm = String(d.getMonth()+1).padStart(2,'0');
  return `${siteCode}-${yy}${mm}-${String(seq).padStart(4,'0')}`;
}

function siteCodeFromName(nom){
  const letters = nom.replace(/[^a-zA-Z]/g,'').toUpperCase();
  return (letters.slice(0,3) || 'PSG');
}

/* ===================== STORAGE LAYER (Firebase) ===================== */

const DB_KEY = 'pressing-db-v2';

async function storageGet(key){
  try{
    const snapshot = await firebaseDB.ref(key).get();
    if(snapshot.exists()) return snapshot.val();
    return null;
  }catch(e){ console.error('Firebase get failed', e); return null; }
}

async function storageSet(key, value){
  try{
    await firebaseDB.ref(key).set(value);
    return true;
  }catch(e){ console.error('Firebase set failed', e); return false; }
}

function subscribeToDB(key, callback){
  firebaseDB.ref(key).on('value', (snapshot) => {
    if(snapshot.exists()) callback(snapshot.val());
  });
  return () => firebaseDB.ref(key).off();
}

function makeSite(nom, adresse, tel){
  return {
    id: uid('site_'),
    nom, adresse, tel,
    code: siteCodeFromName(nom),
    seq: 1,
    services: defaultServices(),
    stock: defaultStock(),
    clients: [],
    commandes: [],
    notifications: [],
    employes: [],
  };
}

function emptyDB(){
  const site1 = makeSite('Maci Pressing — Kipé', 'Kipé, Conakry, République de Guinée', '625 63 33 83');
  return {
    sites: [site1],
  };
}

/* migration depuis l'ancien format mono-site (pressing-db-v1) si présent */
function migrateFromV1(oldRaw){
  try{
    const old = JSON.parse(oldRaw);
    if(!old || !old.entreprise) return null;
    const site = {
      id: uid('site_'),
      nom: old.entreprise.nom || 'Mon pressing',
      adresse: old.entreprise.adresse || '',
      tel: old.entreprise.tel || '',
      code: siteCodeFromName(old.entreprise.nom || 'PSG'),
      seq: old.seq || 1,
      services: old.services || defaultServices(),
      stock: old.stock || defaultStock(),
      clients: old.clients || [],
      commandes: old.commandes || [],
      notifications: old.notifications || [],
      employes: old.employes || [],
    };
    return { sites: [site] };
  }catch(e){ return null; }
}

/* ===================== STATUTS ===================== */

const STATUTS = ['Reçu', 'En cours', 'Prêt', 'Récupéré'];
const STATUT_TAG_CLASS = { 'Reçu':'tag-recu', 'En cours':'tag-encours', 'Prêt':'tag-pret', 'Récupéré':'tag-recupere' };
function nextStatut(s){
  const i = STATUTS.indexOf(s);
  return STATUTS[Math.min(i+1, STATUTS.length-1)];
}

/* ===================== APP ROOT ===================== */

function App(){
  const [db, setDb] = useState(null);
  const [loading, setLoading] = useState(true);
  const [role, setRole] = useState(null); // 'gerant' | 'employe' | 'client'
  const [currentSiteId, setCurrentSiteId] = useState(null);
  const [currentClientId, setCurrentClientId] = useState(null);
  const saveTimer = useRef(null);

  useEffect(() => {
    setLoading(true);
    // Écoute en temps réel Firebase — toutes les tablettes se synchronisent automatiquement
    const unsubscribe = subscribeToDB(DB_KEY, (data) => {
      try{
        const parsed = typeof data === 'string' ? JSON.parse(data) : data;
        setDb(parsed);
      }catch(e){ console.error('parse error', e); }
      setLoading(false);
    });

    // Premier chargement : si pas de données, crée la base vide
    (async () => {
      const raw = await storageGet(DB_KEY);
      if(!raw){
        const fresh = emptyDB();
        await storageSet(DB_KEY, JSON.stringify(fresh));
      }
    })();

    return unsubscribe;
  }, []);

  const persist = useCallback((next) => {
    setDb(next);
    if(saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      storageSet(DB_KEY, JSON.stringify(next));
    }, 400);
  }, []);

  if(loading || !db){
    return (
      <div style={{minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', color:'var(--pine)'}}>
        <div className="mono" style={{fontSize:13}}>Chargement…</div>
      </div>
    );
  }

  if(!role){
    return <RoleSelect db={db} setDb={persist} onSelect={(r, siteId, clientId) => { setRole(r); setCurrentSiteId(siteId||null); setCurrentClientId(clientId||null); }} />;
  }

  if(role === 'gerant') return <GerantApp db={db} setDb={persist} onLogout={()=>{setRole(null); setCurrentSiteId(null);}} />;
  if(role === 'employe') return <EmployeApp db={db} setDb={persist} siteId={currentSiteId} onLogout={()=>{setRole(null); setCurrentSiteId(null);}} />;
  if(role === 'client') return <ClientApp db={db} setDb={persist} siteId={currentSiteId} clientId={currentClientId} onLogout={()=>{setRole(null); setCurrentSiteId(null); setCurrentClientId(null);}} />;

  return null;
}

/* ===================== ECRAN CHOIX DE ROLE ===================== */

function RoleSelect({ db, setDb, onSelect }){
  const [mode, setMode] = useState(null); // null | 'employe' | 'client'
  const [search, setSearch] = useState('');

  return (
    <div style={{minHeight:'100vh', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'2rem'}}>
      <div style={{textAlign:'center', marginBottom:'2.5rem'}}>
        <div style={{display:'inline-flex', alignItems:'center', gap:10, color:'var(--pine)', marginBottom:14}}>
          <Icon name="shirt" size={30} />
        </div>
        <h1 style={{fontSize:34, margin:0, color:'var(--pine)'}}>Maci Pressing</h1>
        <p className="mono" style={{color:'var(--steam)', fontSize:13, marginTop:6}}>
          {db.sites.length > 1 ? `${db.sites.length} sites — choisissez votre espace` : 'Gestion de pressing — choisissez votre espace'}
        </p>
      </div>

      {!mode && (
        <div style={{display:'flex', gap:18, flexWrap:'wrap', justifyContent:'center', maxWidth:760}}>
          <RoleCard icon="home" title="Gérant" desc="Supervision de tous les sites, finances, stock" onClick={() => onSelect('gerant')} />
          <RoleCard icon="ticket" title="Employé" desc="Caisse, création et suivi des commandes" onClick={() => setMode('employe')} />
          <RoleCard icon="users" title="Client" desc="Suivre mes commandes et factures" onClick={() => setMode('client')} />
        </div>
      )}

      {mode === 'employe' && (
        <SitePicker db={db} title="Quel pressing ?" onPick={(siteId) => onSelect('employe', siteId)} onBack={()=>setMode(null)} />
      )}

      {mode === 'client' && (
        <ClientLoginFlow db={db} onPick={(siteId, clientId) => onSelect('client', siteId, clientId)} onBack={()=>setMode(null)} />
      )}
    </div>
  );
}

function SitePicker({ db, title, onPick, onBack }){
  return (
    <div className="card" style={{marginTop:24, padding:'1.25rem', width:380, maxWidth:'90vw'}}>
      <label>{title}</label>
      <div style={{display:'grid', gap:8, marginTop:6}}>
        {db.sites.map(s => (
          <button key={s.id} className="btn" style={{width:'100%', textAlign:'left', display:'flex', justifyContent:'space-between', alignItems:'center'}} onClick={()=>onPick(s.id)}>
            <span>{s.nom}</span>
            <span className="mono" style={{fontSize:11.5, color:'var(--steam)'}}>{s.code}</span>
          </button>
        ))}
      </div>
      <button className="btn btn-ghost btn-sm" style={{marginTop:10}} onClick={onBack}>← Retour</button>
    </div>
  );
}

function ClientLoginFlow({ db, onPick, onBack }){
  const [siteId, setSiteId] = useState(db.sites.length === 1 ? db.sites[0].id : null);
  const [search, setSearch] = useState('');

  const site = db.sites.find(s => s.id === siteId);
  const matches = useMemo(() => {
    if(!site || !search.trim()) return [];
    const q = search.toLowerCase();
    return site.clients.filter(c => c.nom.toLowerCase().includes(q) || (c.tel||'').includes(q)).slice(0,6);
  }, [search, site]);

  if(!siteId){
    return <SitePicker db={db} title="Vous êtes client de quel pressing ?" onPick={setSiteId} onBack={onBack} />;
  }

  return (
    <div className="card" style={{marginTop:24, padding:'1.25rem', width:380, maxWidth:'90vw'}}>
      <label>Trouvez votre fiche client — {site.nom}</label>
      <input type="text" placeholder="Nom ou téléphone…" value={search} onChange={e=>setSearch(e.target.value)} autoFocus />
      <div style={{marginTop:10, maxHeight:220, overflowY:'auto'}}>
        {search && matches.length === 0 && (
          <p style={{fontSize:13, color:'var(--steam)', margin:'8px 0'}}>Aucun client trouvé. Demandez à l'accueil de créer votre fiche.</p>
        )}
        {matches.map(c => (
          <button key={c.id} className="btn" style={{width:'100%', textAlign:'left', marginBottom:6, display:'flex', justifyContent:'space-between'}} onClick={() => onPick(siteId, c.id)}>
            <span>{c.nom}</span>
            <span className="mono" style={{color:'var(--steam)', fontSize:12}}>{c.tel}</span>
          </button>
        ))}
      </div>
      <div style={{display:'flex', gap:8, marginTop:8}}>
        {db.sites.length > 1 && <button className="btn btn-ghost btn-sm" onClick={()=>setSiteId(null)}>← Changer de site</button>}
        <button className="btn btn-ghost btn-sm" onClick={onBack}>Annuler</button>
      </div>
    </div>
  );
}

function RoleCard({ icon, title, desc, onClick }){
  return (
    <button onClick={onClick} className="card" style={{
      width:220, padding:'1.75rem 1.5rem', textAlign:'left', border:'1px solid var(--line)',

/* ===================== LOGIQUE METIER ===================== */

function calcCommandeTotal(commande, services){
  return commande.lignes.reduce((sum, l) => {
    const svc = services.find(s => s.id === l.serviceId);
    const prix = svc ? svc.prix : 0;
    return sum + prix * l.qte;
  }, 0);
}

function pushNotification(site, updateSite, { clientId, message, canal }){
  const notif = { id: uid('notif_'), clientId, message, canal, date: new Date().toISOString() };
  updateSite({ ...site, notifications: [notif, ...site.notifications].slice(0, 300) });
}

/* ===================== ESPACE GERANT (multi-sites) ===================== */

function GerantApp({ db, setDb, onLogout }){
  const [page, setPage] = useState('global');
  const [activeSiteId, setActiveSiteId] = useState(null);

  function updateSite(updatedSite){
    setDb({ ...db, sites: db.sites.map(s => s.id === updatedSite.id ? updatedSite : s) });
  }
  function addSite(nom, adresse, tel){
    const newSite = makeSite(nom, adresse, tel);
    setDb({ ...db, sites: [...db.sites, newSite] });
    return newSite.id;
  }
  function removeSite(id){
    if(db.sites.length <= 1) return;
    setDb({ ...db, sites: db.sites.filter(s=>s.id!==id) });
    if(activeSiteId === id) setActiveSiteId(null);
  }

  const navItems = [
    { key:'global', label:'Vue globale', icon:'layers' },
    { key:'sites', label:'Mes pressings', icon:'building' },
  ];

  const activeSite = db.sites.find(s => s.id === activeSiteId);

  return (
    <Shell title="Maci Pressing" role={`Gérant — ${db.sites.length} site(s)`} navItems={navItems}
      active={activeSiteId ? null : page} onNav={(p)=>{setActiveSiteId(null); setPage(p);}} onLogout={onLogout}>
      {activeSite ? (
        <SiteDetailForGerant site={activeSite} db={db} updateSite={updateSite} onBack={()=>setActiveSiteId(null)} />
      ) : (
        <>
          {page === 'global' && <GlobalDashboard db={db} onOpenSite={setActiveSiteId} />}
          {page === 'sites' && <SitesManager db={db} addSite={addSite} removeSite={removeSite} onOpenSite={setActiveSiteId} />}
        </>
      )}
    </Shell>
  );
}

function Dashboard({ site, updateSite }){
  const today = todayISO();
  const stats = useMemo(() => {
    const cmds = site.commandes;
    const cmdsToday = cmds.filter(c => c.dateCreation.slice(0,10) === today);
    const cmdsMonth = cmds.filter(c => c.dateCreation.slice(0,7) === today.slice(0,7));
    const caJour = cmdsToday.reduce((s,c)=>s+calcCommandeTotal(c, site.services),0);
    const caMois = cmdsMonth.reduce((s,c)=>s+calcCommandeTotal(c, site.services),0);
    const impayes = cmds.filter(c => c.paiement === 'impaye');
    const montantImpaye = impayes.reduce((s,c)=>s+calcCommandeTotal(c, site.services),0);
    const enCours = cmds.filter(c => c.statut === 'En cours' || c.statut === 'Reçu').length;
    const pretsNonRecuperes = cmds.filter(c => c.statut === 'Prêt').length;

    const serviceCount = {};
    cmds.forEach(c => c.lignes.forEach(l => { serviceCount[l.serviceId] = (serviceCount[l.serviceId]||0) + l.qte; }));
    const topServices = Object.entries(serviceCount)
      .map(([id, qte]) => ({ svc: site.services.find(s=>s.id===id), qte }))
      .filter(x=>x.svc).sort((a,b)=>b.qte-a.qte).slice(0,5);

    const last7 = Array.from({length:7}, (_,i)=>{
      const d = new Date(); d.setDate(d.getDate()-(6-i));
      const iso = d.toISOString().slice(0,10);
      const ca = cmds.filter(c=>c.dateCreation.slice(0,10)===iso).reduce((s,c)=>s+calcCommandeTotal(c,site.services),0);
      return { iso, ca, label: d.toLocaleDateString('fr-FR',{weekday:'short'}) };
    });
    const maxCa = Math.max(...last7.map(d=>d.ca), 1);

    return { caJour, caMois, montantImpaye, impayesCount: impayes.length, enCours, pretsNonRecuperes, topServices, last7, maxCa, totalClients: site.clients.length };
  }, [site, today]);

  const lowStock = site.stock.filter(s => s.quantite <= s.seuil);

  return (
    <div>
      <PageHeader title={site.nom} subtitle={`Aujourd'hui, ${fmtDate(today)}`} />

      <div style={{display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:14, marginBottom:24}}>

        <StatCard label="Impayés" value={fmtGNF(stats.montantImpaye)} sub={`${stats.impayesCount} commande(s)`} icon="alert" tone={stats.impayesCount>0 ? 'danger':'default'} />
        <StatCard label="Clients" value={stats.totalClients} icon="users" />
      </div>

      <div style={{display:'grid', gridTemplateColumns:'1.4fr 1fr', gap:16, marginBottom:24}}>
        <div className="card" style={{padding:'1.5rem'}}>
          <h3 style={{margin:'0 0 16px', fontSize:15}}>Chiffre d'affaires — 7 derniers jours</h3>
          <div style={{display:'flex', alignItems:'flex-end', gap:10, height:140}}>
            {stats.last7.map(d => (
              <div key={d.iso} style={{flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:6}}>
                <div style={{fontSize:10.5, color:'var(--steam)'}} className="mono">{d.ca>0 ? Math.round(d.ca/1000)+'k' : ''}</div>
                <div style={{
                  width:'100%', background:'var(--rust)', borderRadius:'4px 4px 0 0',
                  height: Math.max(4, (d.ca/stats.maxCa)*90), opacity: d.iso===today?1:0.55
                }}/>
                <div style={{fontSize:11.5, color:'var(--pine)', textTransform:'capitalize'}}>{d.label}</div>
              </div>
            ))}
          </div>
        </div>

        <div className="card" style={{padding:'1.5rem'}}>
          <h3 style={{margin:'0 0 16px', fontSize:15}}>Services les plus demandés</h3>
          {stats.topServices.length === 0 && <p style={{fontSize:13, color:'var(--steam)'}}>Pas encore de données.</p>}
          {stats.topServices.map((t,i) => (
            <div key={t.svc.id} style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'7px 0', borderBottom: i<stats.topServices.length-1 ? '1px solid var(--line)' : 'none'}}>
              <span style={{fontSize:13.5}}>{t.svc.nom}</span>
              <span className="mono" style={{fontSize:13, color:'var(--steam)'}}>{t.qte}x</span>
            </div>
          ))}
        </div>
      </div>

      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:16}}>
        <div className="card" style={{padding:'1.5rem'}}>
          <h3 style={{margin:'0 0 12px', fontSize:15}}>À traiter</h3>
          <div style={{display:'flex', gap:16}}>
            <div>
              <div style={{fontSize:22, fontWeight:700, color:'var(--rust)'}}>{stats.enCours}</div>
              <div style={{fontSize:12.5, color:'var(--steam)'}}>en cours / reçues</div>
            </div>
            <div>
              <div style={{fontSize:22, fontWeight:700, color:'var(--ok)'}}>{stats.pretsNonRecuperes}</div>
              <div style={{fontSize:12.5, color:'var(--steam)'}}>prêtes, à récupérer</div>
            </div>
          </div>
        </div>

        <div className="card" style={{padding:'1.5rem'}}>
          <h3 style={{margin:'0 0 12px', fontSize:15, display:'flex', alignItems:'center', gap:8}}>
            <Icon name="alert" size={15} style={{color: lowStock.length ? 'var(--danger)':'var(--steam)'}}/> Stock à surveiller

            </div>
          ))}
        </div>

  );

function CommandesView({ site, updateSite, editable }){
  const [filter, setFilter] = useState('Toutes');
  const [search, setSearch] = useState('');
  const [showNew, setShowNew] = useState(false);
  const [openTicket, setOpenTicket] = useState(null);

  const filtered = useMemo(() => {
    let list = [...site.commandes].sort((a,b)=> new Date(b.dateCreation) - new Date(a.dateCreation));
    if(filter !== 'Toutes') list = list.filter(c => c.statut === filter);
    if(search.trim()){
      const q = search.toLowerCase();
      list = list.filter(c => {
        const client = site.clients.find(cl => cl.id === c.clientId);
        return c.numero.toLowerCase().includes(q) || (client && client.nom.toLowerCase().includes(q));
      });
    }
    return list;
  }, [site.commandes, site.clients, filter, search]);

  function updateCommande(updated){
    updateSite({ ...site, commandes: site.commandes.map(c => c.id === updated.id ? updated : c) });
  }

  function advanceStatut(cmd){
    const updated = { ...cmd, statut: nextStatut(cmd.statut) };
    const client = site.clients.find(c => c.id === cmd.clientId);
    const nextSite = { ...site, commandes: site.commandes.map(c => c.id === updated.id ? updated : c) };
    if(client && (updated.statut === 'Prêt' || updated.statut === 'Récupéré')){
      const msg = updated.statut === 'Prêt'
        ? `Bonjour ${client.nom}, votre commande ${cmd.numero} est prête à récupérer.`
        : `Merci ${client.nom}, votre commande ${cmd.numero} a été récupérée.`;
      const notif = { id: uid('notif_'), clientId: client.id, message: msg, canal: client.canalPref || 'SMS', date: new Date().toISOString() };
      nextSite.notifications = [notif, ...nextSite.notifications].slice(0,300);
    }
    updateSite(nextSite);
  }

  function togglePaiement(cmd){
    updateCommande({ ...cmd, paiement: cmd.paiement === 'paye' ? 'impaye' : 'paye' });
  }

  return (
    <div>
      <PageHeader
        title="Commandes"
        subtitle={`${site.commandes.length} commande(s) au total`}
        right={editable ? <button className="btn btn-rust" onClick={()=>setShowNew(true)}><Icon name="plus" size={15}/> Nouvelle commande</button> : null}

        <div style={{position:'relative', flex:'1 1 240px', maxWidth:320}}>
          <input type="text" placeholder="Rechercher (n° ticket, client)…" value={search} onChange={e=>setSearch(e.target.value)} style={{paddingLeft:34}}/>
          <Icon name="search" size={15} style={{position:'absolute', left:11, top:11, color:'var(--steam)'}}/>
        </div>
        {['Toutes', ...STATUTS].map(s => (
          <button key={s} onClick={()=>setFilter(s)} className="btn btn-sm" style={{
            background: filter===s ? 'var(--pine)' : 'transparent',
            color: filter===s ? 'var(--white)' : 'var(--ink)',
            borderColor: filter===s ? 'var(--pine)' : 'var(--line-strong)'
          }}>{s}</button>
        ))}
      </div>

      <div className="card" style={{overflow:'hidden'}}>
        <table style={{width:'100%', borderCollapse:'collapse', fontSize:13.5}}>
          <thead>
            <tr style={{background:'var(--paper-2)', textAlign:'left'}}>
              <th style={th}>Ticket</th>
              <th style={th}>Client</th>
              <th style={th}>Articles</th>
              <th style={th}>Total</th>
              <th style={th}>Statut</th>
              <th style={th}>Paiement</th>
              <th style={th}>Dépôt</th>
              <th style={th}></th>

          <tbody>
            {filtered.length === 0 && (
              <tr><td colSpan={8} style={{...td, textAlign:'center', color:'var(--steam)', padding:'2rem'}}>Aucune commande ne correspond.</td></tr>
            )}
            {filtered.map(cmd => {
              const client = site.clients.find(c => c.id === cmd.clientId);
              const total = calcCommandeTotal(cmd, site.services);
              return (
                <tr key={cmd.id} style={{borderTop:'1px solid var(--line)'}}>
                  <td style={{...td}}><span className="mono" style={{fontWeight:600}}>{cmd.numero}</span></td>
                  <td style={td}>{client ? client.nom : '—'}</td>
                  <td style={td}>{cmd.lignes.reduce((s,l)=>s+l.qte,0)} article(s)</td>
                  <td style={td} className="mono">{fmtGNF(total)}</td>
                  <td style={td}><span className={`tag ${STATUT_TAG_CLASS[cmd.statut]}`}>{cmd.statut}</span></td>
                  <td style={td}><span className={`tag ${cmd.paiement==='paye'?'tag-paye':'tag-impaye'}`}>{cmd.paiement==='paye'?'Payé':'Impayé'}</span></td>
                  <td style={td}>{fmtDate(cmd.dateCreation.slice(0,10))}</td>
                  <td style={{...td, textAlign:'right'}}>
                    <div style={{display:'flex', gap:6, justifyContent:'flex-end'}}>
                      <button className="btn btn-ghost btn-sm" onClick={()=>setOpenTicket(cmd)}>Voir</button>
                      {editable && cmd.statut !== 'Récupéré' && (
                        <button className="btn btn-sm" onClick={()=>advanceStatut(cmd)}>→ {nextStatut(cmd.statut)}</button>
                      )}
                      {editable && (
                        <button className="btn btn-sm" onClick={()=>togglePaiement(cmd)}>{cmd.paiement==='paye' ? 'Marquer impayé' : 'Marquer payé'}</button>
                      )}
                    </div>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {showNew && <NewCommandeModal site={site} updateSite={updateSite} onClose={()=>setShowNew(false)} />}
      {openTicket && <TicketModal cmd={openTicket} site={site} onClose={()=>setOpenTicket(null)} />}
    </div>
  );
}

const th = { padding:'10px 14px', fontSize:12, fontWeight:700, color:'var(--pine)', textTransform:'uppercase', letterSpacing:'0.03em' };
const td = { padding:'10px 14px' };

function NewCommandeModal({ site, updateSite, onClose }){
  const [clientId, setClientId] = useState('');
  const [clientSearch, setClientSearch] = useState('');
  const [newClientMode, setNewClientMode] = useState(false);
  const [newClientNom, setNewClientNom] = useState('');
  const [newClientTel, setNewClientTel] = useState('');
  const [lignes, setLignes] = useState([]);
  const [dateRetrait, setDateRetrait] = useState('');
  const [notes, setNotes] = useState('');

  const clientMatches = useMemo(() => {
    if(!clientSearch.trim()) return site.clients.slice(0,5);
    const q = clientSearch.toLowerCase();
    return site.clients.filter(c => c.nom.toLowerCase().includes(q) || (c.tel||'').includes(q)).slice(0,5);
  }, [clientSearch, site.clients]);

  function addLigne(serviceId){
    setLignes(prev => {
      const exist = prev.find(l => l.serviceId === serviceId);
      if(exist) return prev.map(l => l.serviceId===serviceId ? {...l, qte:l.qte+1} : l);
      return [...prev, { serviceId, qte:1 }];
    });
  }
  function setQte(serviceId, qte){
    setLignes(prev => prev.map(l => l.serviceId===serviceId ? {...l, qte: Math.max(0,qte)} : l).filter(l=>l.qte>0));
  }

  const total = lignes.reduce((s,l)=>{
    const svc = site.services.find(x=>x.id===l.serviceId);
    return s + (svc ? svc.prix*l.qte : 0);
  }, 0);

  function handleSubmit(){
    let finalClientId = clientId;
    let workingClients = site.clients;
    if(newClientMode){
      if(!newClientNom.trim()) return;
      const newClient = { id: uid('cli_'), nom: newClientNom.trim(), tel: newClientTel.trim(), canalPref:'SMS', dateInscription: todayISO() };
      workingClients = [...site.clients, newClient];
      finalClientId = newClient.id;
    }
    if(!finalClientId || lignes.length === 0) return;

    const seq = site.seq;
    const cmd = {
      id: uid('cmd_'),
      numero: ticketNumber(site.code, seq),
      clientId: finalClientId,
      lignes,
      statut: 'Reçu',
      paiement: 'impaye',
      dateCreation: new Date().toISOString(),
      dateRetraitPrevue: dateRetrait || null,
      notes: notes.trim(),
    };
    const client = workingClients.find(c=>c.id===finalClientId);
    const notif = { id: uid('notif_'), clientId: finalClientId, message: `Bonjour ${client.nom}, votre commande ${cmd.numero} a été enregistrée (${fmtGNF(total)}).`, canal: client.canalPref || 'SMS', date: new Date().toISOString() };

    updateSite({
      ...site,
      seq: seq+1,
      clients: workingClients,
      commandes: [cmd, ...site.commandes],
      notifications: [notif, ...site.notifications].slice(0,300),
    });
    onClose();
  }

  return (
    <ModalShell title="Nouvelle commande" onClose={onClose} width={620}>
      <div style={{display:'grid', gap:18}}>
        <div>
          <label>Client</label>
          {!newClientMode ? (
            <>
              <input type="text" placeholder="Rechercher un client…" value={clientSearch} onChange={e=>{setClientSearch(e.target.value); setClientId('');}} />
              <div style={{marginTop:6, display:'flex', flexWrap:'wrap', gap:6}}>
                {clientMatches.map(c => (
                  <button key={c.id} className="btn btn-sm" onClick={()=>{setClientId(c.id); setClientSearch(c.nom);}}
                    style={{background: clientId===c.id?'var(--pine-light)':'transparent', borderColor: clientId===c.id?'var(--pine)':'var(--line-strong)'}}>
                    {c.nom}
                  </button>
                ))}
              </div>
              <button className="btn btn-ghost btn-sm" style={{marginTop:8}} onClick={()=>setNewClientMode(true)}>+ Créer un nouveau client</button>
            </>
          ) : (
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10}}>
              <input type="text" placeholder="Nom complet" value={newClientNom} onChange={e=>setNewClientNom(e.target.value)} />
              <input type="tel" placeholder="Téléphone" value={newClientTel} onChange={e=>setNewClientTel(e.target.value)} />
              <button className="btn btn-ghost btn-sm" style={{gridColumn:'1/-1', justifySelf:'start'}} onClick={()=>setNewClientMode(false)}>← Choisir un client existant</button>
            </div>
          )}
        </div>

        <div>
          <label>Articles</label>
          <div style={{display:'grid', gridTemplateColumns:'repeat(2, 1fr)', gap:8}}>
            {site.services.map(s => (
              <button key={s.id} className="btn btn-sm" style={{justifyContent:'space-between', display:'flex'}} onClick={()=>addLigne(s.id)}>
                <span>{s.nom}</span><span className="mono">{fmtGNF(s.prix)}</span>
              </button>
            ))}
          </div>
        </div>

        {lignes.length > 0 && (
          <div>
            <label>Panier</label>
            {lignes.map(l => {
              const svc = site.services.find(s=>s.id===l.serviceId);
              return (
                <div key={l.serviceId} style={{display:'flex', alignItems:'center', justifyContent:'space-between', padding:'6px 0', borderBottom:'1px solid var(--line)'}}>
                  <span style={{fontSize:13.5}}>{svc.nom}</span>
                  <div style={{display:'flex', alignItems:'center', gap:8}}>
                    <button className="btn btn-sm" style={{padding:'2px 9px'}} onClick={()=>setQte(l.serviceId, l.qte-1)}>−</button>
                    <span className="mono" style={{minWidth:18, textAlign:'center'}}>{l.qte}</span>
                    <button className="btn btn-sm" style={{padding:'2px 9px'}} onClick={()=>setQte(l.serviceId, l.qte+1)}>+</button>
                    <span className="mono" style={{minWidth:90, textAlign:'right'}}>{fmtGNF(svc.prix*l.qte)}</span>
                  </div>
                </div>
              );
            })}
            <div style={{display:'flex', justifyContent:'space-between', paddingTop:10, fontWeight:700}}>
              <span>Total</span><span className="mono">{fmtGNF(total)}</span>
            </div>
          </div>
        )}

        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10}}>
          <div>
            <label>Date de retrait prévue</label>
            <input type="date" value={dateRetrait} onChange={e=>setDateRetrait(e.target.value)} min={todayISO()} />
          </div>
          <div>
            <label>Notes (optionnel)</label>
            <input type="text" placeholder="Tache, bouton manquant…" value={notes} onChange={e=>setNotes(e.target.value)} />
          </div>
        </div>

        <div style={{display:'flex', justifyContent:'flex-end', gap:10}}>
          <button className="btn" onClick={onClose}>Annuler</button>
          <button className="btn btn-rust" disabled={(!clientId && !newClientMode) || lignes.length===0} onClick={handleSubmit}>Créer le ticket</button>
        </div>
      </div>
    </ModalShell>
  );
}

    <div style={{
      position:'fixed', inset:0, background:'rgba(27,31,28,0.45)', display:'flex',
      alignItems:'center', justifyContent:'center', zIndex:50, padding:20
    }} onClick={(e)=>{ if(e.target === e.currentTarget) onClose(); }}>
      <div className="card" style={{width, maxWidth:'92vw', maxHeight:'88vh', overflowY:'auto', padding:'1.5rem'}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:18}}>
          <h2 style={{margin:0, fontSize:19, color:'var(--pine)'}}>{title}</h2>

        {children}

  );
}

        <button className="btn btn-rust btn-sm" onClick={onClose}>Fermer</button>
      </div>
    </ModalShell>
  );
}

function ClientsView({ site, updateSite }){
  const [search, setSearch] = useState('');
  const [selected, setSelected] = useState(null);
  const [showNew, setShowNew] = useState(false);

  const filtered = useMemo(() => {
    if(!search.trim()) return site.clients;
    const q = search.toLowerCase();
    return site.clients.filter(c => c.nom.toLowerCase().includes(q) || (c.tel||'').includes(q));
  }, [site.clients, search]);

  function clientStats(clientId){
    const cmds = site.commandes.filter(c => c.clientId === clientId);
    const total = cmds.reduce((s,c)=>s+calcCommandeTotal(c, site.services), 0);
    const impaye = cmds.filter(c=>c.paiement==='impaye').reduce((s,c)=>s+calcCommandeTotal(c, site.services), 0);
    return { count: cmds.length, total, impaye };
  }

  return (
    <div>
      <PageHeader title="Clients" subtitle={`${site.clients.length} fiche(s) client`}
        right={<button className="btn btn-rust" onClick={()=>setShowNew(true)}><Icon name="plus" size={15}/> Nouveau client</button>} />

      <div style={{position:'relative', maxWidth:320, marginBottom:18}}>
        <input type="text" placeholder="Rechercher…" value={search} onChange={e=>setSearch(e.target.value)} style={{paddingLeft:34}}/>
        <Icon name="search" size={15} style={{position:'absolute', left:11, top:11, color:'var(--steam)'}}/>
      </div>

      <div style={{display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:14}}>
        {filtered.map(c => {
          const st = clientStats(c.id);
          return (
            <div key={c.id} className="card" style={{padding:'1.1rem 1.25rem', cursor:'pointer'}} onClick={()=>setSelected(c)}>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}>
                <div>
                  <div style={{fontWeight:600, fontSize:15}}>{c.nom}</div>
                  <div style={{fontSize:12.5, color:'var(--steam)'}}>{c.tel || 'Pas de téléphone'}</div>
                </div>
                {st.impaye > 0 && <span className="tag tag-impaye">{fmtGNF(st.impaye)}</span>}
              </div>
              <div style={{display:'flex', gap:14, marginTop:12, fontSize:12.5, color:'var(--steam)'}}>
                <span>{st.count} commande(s)</span>
                <span className="mono">{fmtGNF(st.total)} cumulé</span>
              </div>
            </div>
          );
        })}
        {filtered.length === 0 && <p style={{color:'var(--steam)'}}>Aucun client trouvé.</p>}
      </div>

      {showNew && <NewClientModal site={site} updateSite={updateSite} onClose={()=>setShowNew(false)} />}
      {selected && <ClientDetailModal client={selected} site={site} onClose={()=>setSelected(null)} />}
    </div>
  );
}

function StockView({ site, updateSite }){
  const [showNew, setShowNew] = useState(false);

  function adjust(id, delta){
    updateSite({ ...site, stock: site.stock.map(s => s.id===id ? {...s, quantite: Math.max(0, s.quantite+delta)} : s) });
  }
  function removeItem(id){
    updateSite({ ...site, stock: site.stock.filter(s => s.id !== id) });
  }

  return (
    <div>
      <PageHeader title="Stock" subtitle="Consommables et fournitures"
        right={<button className="btn btn-rust" onClick={()=>setShowNew(true)}><Icon name="plus" size={15}/> Ajouter un article</button>} />

      <div className="card" style={{overflow:'hidden'}}>
        <table style={{width:'100%', borderCollapse:'collapse', fontSize:13.5}}>
          <thead>
            <tr style={{background:'var(--paper-2)', textAlign:'left'}}>
              <th style={th}>Article</th>
              <th style={th}>Quantité</th>
              <th style={th}>Seuil d'alerte</th>
              <th style={th}>Statut</th>
              <th style={th}></th>
            </tr>
          </thead>
          <tbody>
            {site.stock.map(s => {
              const low = s.quantite <= s.seuil;
              return (
                <tr key={s.id} style={{borderTop:'1px solid var(--line)'}}>
                  <td style={td}>{s.nom}</td>
                  <td style={td}>
                    <div style={{display:'flex', alignItems:'center', gap:8}}>
                      <button className="btn btn-sm" style={{padding:'2px 9px'}} onClick={()=>adjust(s.id,-1)}>−</button>
                      <span className="mono">{s.quantite} {s.unite}</span>
                      <button className="btn btn-sm" style={{padding:'2px 9px'}} onClick={()=>adjust(s.id,1)}>+</button>
                    </div>
                  </td>
                  <td style={td} className="mono">{s.seuil} {s.unite}</td>
                  <td style={td}>{low ? <span className="tag tag-impaye">Stock bas</span> : <span className="tag tag-paye">OK</span>}</td>
                  <td style={{...td, textAlign:'right'}}><button className="btn btn-ghost btn-sm" onClick={()=>removeItem(s.id)}><Icon name="trash" size={14}/></button></td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {showNew && <NewStockModal site={site} updateSite={updateSite} onClose={()=>setShowNew(false)} />}
    </div>
  );
}

function EquipeView({ site, updateSite }){
  const [showNew, setShowNew] = useState(false);
  function removeEmp(id){ updateSite({ ...site, employes: site.employes.filter(e=>e.id!==id) }); }

  return (
    <div>
      <PageHeader title="Équipe" subtitle={`${site.employes.length} employé(s)`}
        right={<button className="btn btn-rust" onClick={()=>setShowNew(true)}><Icon name="plus" size={15}/> Ajouter un employé</button>} />
      <div style={{display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:14}}>
        {site.employes.map(e => (
          <div key={e.id} className="card" style={{padding:'1.1rem 1.25rem', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
            <div>
              <div style={{fontWeight:600, fontSize:14.5}}>{e.nom}</div>
              <div style={{fontSize:12.5, color:'var(--steam)'}}>{e.role}</div>
            </div>
            <button className="btn btn-ghost btn-sm" onClick={()=>removeEmp(e.id)}><Icon name="trash" size={14}/></button>
          </div>
        ))}
        {site.employes.length === 0 && <p style={{color:'var(--steam)'}}>Aucun employé enregistré pour ce site.</p>}
      </div>
      {showNew && <NewEmployeModal site={site} updateSite={updateSite} onClose={()=>setShowNew(false)} />}
    </div>
  );
}

function NewEmployeModal({ site, updateSite, onClose }){
  const [nom, setNom] = useState('');
  const [role, setRole] = useState('Caissier');
  function submit(){
    if(!nom.trim()) return;
    updateSite({ ...site, employes: [...site.employes, { id: uid('emp_'), nom: nom.trim(), role }] });
    onClose();
  }
  return (
    <ModalShell title="Ajouter un employé" onClose={onClose} width={380}>
      <div style={{display:'grid', gap:14}}>
        <div><label>Nom complet</label><input type="text" value={nom} onChange={e=>setNom(e.target.value)} autoFocus/></div>
        <div>
          <label>Rôle</label>
          <select value={role} onChange={e=>setRole(e.target.value)}>
            <option>Caissier</option>
            <option>Pressing</option>
            <option>Livreur</option>
            <option>Gérant adjoint</option>
          </select>
        </div>
        <div style={{display:'flex', justifyContent:'flex-end', gap:10}}>
          <button className="btn" onClick={onClose}>Annuler</button>
          <button className="btn btn-rust" disabled={!nom.trim()} onClick={submit}>Ajouter</button>
        </div>
      </div>
    </ModalShell>
  );
}

/* ===================== NOTIFICATIONS ===================== */

function NotificationsView({ site }){
  const sorted = [...site.notifications].sort((a,b)=>new Date(b.date)-new Date(a.date));
  return (
    <div>
      <PageHeader title="Notifications" subtitle="Journal des messages envoyés aux clients" />
      <div className="card" style={{padding:'1.25rem'}}>
        <p style={{fontSize:13, color:'var(--steam)', marginTop:0, marginBottom:16, lineHeight:1.6}}>
          Ce journal simule l'envoi de SMS et d'emails. Pour un envoi réel, il faudrait connecter un service comme Twilio (SMS) ou un fournisseur email — c'est une intégration à ajouter séparément.
        </p>
        {sorted.length === 0 && <p style={{fontSize:13, color:'var(--steam)'}}>Aucune notification envoyée pour le moment.</p>}
        {sorted.map(n => (
          <div key={n.id} style={{display:'flex', gap:12, padding:'10px 0', borderTop:'1px solid var(--line)'}}>
            <Icon name={n.canal==='SMS'?'phone':'mail'} size={16} style={{color:'var(--rust)', marginTop:2, flexShrink:0}} />
            <div style={{flex:1}}>
              <div style={{fontSize:13.5}}>{n.message}</div>
              <div style={{fontSize:11.5, color:'var(--steam)', marginTop:2}}>{n.canal} · {fmtDateTime(n.date)}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ===================== PARAMETRES (avec édition des prix) ===================== */

function ParametresView({ site, updateSite }){
  const [nom, setNom] = useState(site.nom);
  const [adresse, setAdresse] = useState(site.adresse);
  const [tel, setTel] = useState(site.tel);
  const [savedFlash, setSavedFlash] = useState(false);

  function save(){
    updateSite({ ...site, nom, adresse, tel });
    setSavedFlash(true);
    setTimeout(()=>setSavedFlash(false), 1800);
  }

  return (
    <div>
      <PageHeader title="Paramètres" subtitle="Informations de l'établissement et services" />

      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:18}}>
        <div className="card" style={{padding:'1.5rem'}}>
          <h3 style={{margin:'0 0 16px', fontSize:15}}>Établissement</h3>
          <div style={{display:'grid', gap:12}}>
            <div><label>Nom</label><input type="text" value={nom} onChange={e=>setNom(e.target.value)} /></div>
            <div><label>Adresse</label><input type="text" value={adresse} onChange={e=>setAdresse(e.target.value)} /></div>
            <div><label>Téléphone</label><input type="text" value={tel} onChange={e=>setTel(e.target.value)} /></div>
            <button className="btn btn-rust" onClick={save} style={{justifySelf:'start'}}>
              {savedFlash ? <><Icon name="check" size={14}/> Enregistré</> : 'Enregistrer'}
            </button>
          </div>
        </div>

        <ServicesEditor site={site} updateSite={updateSite} />
      </div>
    </div>
  );
}

function ServicesEditor({ site, updateSite }){
  const [nom, setNom] = useState('');
  const [prix, setPrix] = useState('');
  const [categorie, setCategorie] = useState('Nettoyage');
  const [editingId, setEditingId] = useState(null);
  const [editNom, setEditNom] = useState('');
  const [editPrix, setEditPrix] = useState('');
  const [editCategorie, setEditCategorie] = useState('Nettoyage');

  function addService(){
    if(!nom.trim() || !prix) return;
    updateSite({ ...site, services: [...site.services, { id: uid('svc_'), nom: nom.trim(), prix: Number(prix), categorie }] });
    setNom(''); setPrix('');
  }
  function removeService(id){
    updateSite({ ...site, services: site.services.filter(s=>s.id!==id) });
  }
  function startEdit(s){
    setEditingId(s.id);
    setEditNom(s.nom);
    setEditPrix(String(s.prix));
    setEditCategorie(s.categorie);
  }
  function cancelEdit(){
    setEditingId(null);
  }
  function saveEdit(){
    if(!editNom.trim() || editPrix === '') return;
    updateSite({
      ...site,
      services: site.services.map(s => s.id === editingId ? { ...s, nom: editNom.trim(), prix: Number(editPrix), categorie: editCategorie } : s)
    });
    setEditingId(null);
  }

  return (
    <div className="card" style={{padding:'1.5rem'}}>
      <h3 style={{margin:'0 0 16px', fontSize:15}}>Services & tarifs</h3>
      <div style={{maxHeight:320, overflowY:'auto', marginBottom:14}}>
        {site.services.map(s => (
          editingId === s.id ? (
            <div key={s.id} style={{display:'grid', gridTemplateColumns:'1.3fr 0.9fr 1fr auto auto', gap:6, alignItems:'center', padding:'8px 0', borderBottom:'1px solid var(--line)'}}>
              <input type="text" value={editNom} onChange={e=>setEditNom(e.target.value)} style={{padding:'6px 8px', fontSize:13}} />
              <input type="number" value={editPrix} onChange={e=>setEditPrix(e.target.value)} style={{padding:'6px 8px', fontSize:13}} />
              <select value={editCategorie} onChange={e=>setEditCategorie(e.target.value)} style={{padding:'6px 8px', fontSize:13}}>
                <option>Nettoyage</option>
                <option>Repassage</option>
                <option>Retouche</option>
                <option>Maison</option>
              </select>
              <button className="btn btn-sm" style={{padding:'5px 9px'}} onClick={saveEdit}><Icon name="check" size={13}/></button>
              <button className="btn btn-ghost btn-sm" style={{padding:'5px 9px'}} onClick={cancelEdit}><Icon name="x" size={13}/></button>
            </div>
          ) : (
            <div key={s.id} style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'6px 0', borderBottom:'1px solid var(--line)', fontSize:13.5}}>
              <span>{s.nom} <span style={{color:'var(--steam)', fontSize:12}}>· {s.categorie}</span></span>
              <div style={{display:'flex', alignItems:'center', gap:6}}>
                <span className="mono">{fmtGNF(s.prix)}</span>
                <button className="btn btn-ghost btn-sm" style={{padding:'4px 7px'}} onClick={()=>startEdit(s)} aria-label="Modifier"><Icon name="edit" size={13}/></button>
                <button className="btn btn-ghost btn-sm" style={{padding:'4px 7px'}} onClick={()=>removeService(s.id)} aria-label="Supprimer"><Icon name="trash" size={13}/></button>
              </div>
            </div>
          )
        ))}
      </div>
      <div style={{display:'grid', gridTemplateColumns:'1.4fr 0.8fr 1fr', gap:8}}>
        <input type="text" placeholder="Nom du service" value={nom} onChange={e=>setNom(e.target.value)} />
        <input type="number" placeholder="Prix (GNF)" value={prix} onChange={e=>setPrix(e.target.value)} />
        <select value={categorie} onChange={e=>setCategorie(e.target.value)}>
          <option>Nettoyage</option>
          <option>Repassage</option>
          <option>Retouche</option>
          <option>Maison</option>
        </select>
      </div>
      <button className="btn btn-rust btn-sm" style={{marginTop:10}} onClick={addService} disabled={!nom.trim()||!prix}>
        <Icon name="plus" size={13}/> Ajouter
      </button>
    </div>
  );
}

/* ===================== ESPACE EMPLOYE (lié à un site) ===================== */

function EmployeApp({ db, setDb, siteId, onLogout }){
  const [page, setPage] = useState('caisse');
  const site = db.sites.find(s => s.id === siteId);

  function updateSite(updatedSite){
    setDb({ ...db, sites: db.sites.map(s => s.id === updatedSite.id ? updatedSite : s) });
  }

  if(!site){
    return (
      <div style={{minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center'}}>
        <div style={{textAlign:'center'}}>
          <p>Ce pressing n'existe plus.</p>
          <button className="btn" onClick={onLogout}>Retour</button>
        </div>
      </div>
    );
  }

  const navItems = [
    { key:'caisse', label:'Caisse', icon:'ticket' },
    { key:'clients', label:'Clients', icon:'users' },
    { key:'stock', label:'Stock', icon:'box' },
  ];
  return (
    <Shell title={site.nom} role="Espace employé" navItems={navItems} active={page} onNav={setPage} onLogout={onLogout}>
      {page === 'caisse' && <CommandesView site={site} updateSite={updateSite} editable={true} />}
      {page === 'clients' && <ClientsView site={site} updateSite={updateSite} />}
      {page === 'stock' && <StockView site={site} updateSite={updateSite} />}
    </Shell>
  );
}

/* ===================== ESPACE CLIENT (lié à un site) ===================== */

function ClientApp({ db, setDb, siteId, clientId, onLogout }){
  const site = db.sites.find(s => s.id === siteId);
  const client = site ? site.clients.find(c => c.id === clientId) : null;

  if(!site || !client){
    return (
      <div style={{minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center'}}>
        <div style={{textAlign:'center'}}>
          <p>Fiche client introuvable.</p>
          <button className="btn" onClick={onLogout}>Retour</button>
        </div>
      </div>
    );
  }

  const cmds = site.commandes.filter(c => c.clientId === clientId).sort((a,b)=>new Date(b.dateCreation)-new Date(a.dateCreation));
  const impayes = cmds.filter(c => c.paiement === 'impaye');
  const totalImpaye = impayes.reduce((s,c)=>s+calcCommandeTotal(c, site.services), 0);
  const enCours = cmds.filter(c => c.statut !== 'Récupéré');

  return (
    <div style={{minHeight:'100vh', padding:'2.5rem 2rem', maxWidth:840, margin:'0 auto'}}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:30}}>
        <div>
          <p className="mono" style={{color:'var(--steam)', fontSize:12, margin:0}}>{site.nom}</p>
          <h1 style={{margin:'2px 0 0', fontSize:26, color:'var(--pine)'}}>Bonjour {client.nom.split(' ')[0]}</h1>
        </div>
        <button className="btn" onClick={onLogout}><Icon name="logout" size={14}/> Changer d'espace</button>
      </div>

      <div style={{display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:14, marginBottom:26}}>
        <StatCard label="Commandes en cours" value={enCours.length} icon="clock" />
        <StatCard label="Total commandes" value={cmds.length} icon="ticket" />
        <StatCard label="Solde impayé" value={fmtGNF(totalImpaye)} icon="euro" tone={totalImpaye>0?'danger':'default'} />
      </div>

      <h2 style={{fontSize:17, color:'var(--pine)', marginBottom:14}}>Mes commandes</h2>
      <div style={{display:'grid', gap:12}}>
        {cmds.length === 0 && (
          <div className="card" style={{padding:'2rem', textAlign:'center', color:'var(--steam)'}}>
            Vous n'avez pas encore de commande chez nous.
          </div>
        )}
        {cmds.map(c => {
          const total = calcCommandeTotal(c, site.services);
          return (
            <div key={c.id} className="card" style={{padding:'1.1rem 1.3rem', display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:10}}>
              <div>
                <div style={{display:'flex', alignItems:'center', gap:10}}>
                  <span className="mono" style={{fontWeight:700}}>{c.numero}</span>
                  <span className={`tag ${STATUT_TAG_CLASS[c.statut]}`}>{c.statut}</span>
                  <span className={`tag ${c.paiement==='paye'?'tag-paye':'tag-impaye'}`}>{c.paiement==='paye'?'Payé':'Impayé'}</span>
                </div>
                <div style={{fontSize:12.5, color:'var(--steam)', marginTop:6}}>
                  {c.lignes.reduce((s,l)=>s+l.qte,0)} article(s) · déposé le {fmtDate(c.dateCreation.slice(0,10))}
                  {c.dateRetraitPrevue && ` · retrait prévu le ${fmtDate(c.dateRetraitPrevue)}`}
                </div>
              </div>
              <div className="mono" style={{fontSize:17, fontWeight:700, color:'var(--pine)'}}>{fmtGNF(total)}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ===================== MONTAGE ===================== */

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
