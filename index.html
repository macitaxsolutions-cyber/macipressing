/* ===================== PARAMETRES (avec édition des prix) ===================== */

function RemunerationGerantView({ site }){
  const [filterMois, setFilterMois] = useState(todayISO().slice(0,7));
  const [onglet, setOnglet] = useState('repasseurs'); // 'repasseurs' | 'caissiers' | 'tout'
  const remunerations = site.remunerations || [];
  const commandes = site.commandes || [];
  const employes = site.employes || [];
  const today = todayISO();

  const moisDisponibles = useMemo(() => {
    const mois = new Set(remunerations.map(r=>r.date.slice(0,7)));
    mois.add(today.slice(0,7));
    return [...mois].sort().reverse();
  }, [remunerations]);

  // Bilan repasseurs — par employé
  const bilanRepasseurs = useMemo(() => {
    const filtered = remunerations.filter(r => r.date.slice(0,7) === filterMois && r.type === 'repassage');
    const parEmploye = {};
    filtered.forEach(r => {
      const empId = r.employeId || 'inconnu';
      if(!parEmploye[empId]) parEmploye[empId] = { montant: 0, articles: {}, entrees: [] };
      parEmploye[empId].montant += Number(r.montant);
      parEmploye[empId].entrees.push(r);
      if(r.detail) r.detail.split(', ').forEach(part => {
        const match = part.match(/(\d+)x (.+?) \(/);
        if(match){ const nom=match[2]; const qte=Number(match[1]); parEmploye[empId].articles[nom]=(parEmploye[empId].articles[nom]||0)+qte; }
      });
    });
    return parEmploye;
  }, [remunerations, filterMois]);

  // Bilan caissiers — par employé
  const bilanCaissiers = useMemo(() => {
    const filtered = commandes.filter(c => c.dateCreation.slice(0,7) === filterMois);
    const parEmploye = {};
    filtered.forEach(c => {
      const empId = c.caissierEmpId || 'inconnu';
      if(!parEmploye[empId]) parEmploye[empId] = { commandes: [], ca: 0, acomptes: 0 };
      const total = c.lignes.reduce((s,l) => {
        const svc = site.services.find(x=>x.id===l.serviceId);
        return s + (svc ? svc.prix*l.qte : 0);
      }, 0) - (Number(c.rabais)||0);
      parEmploye[empId].commandes.push(c);
      parEmploye[empId].ca += total;
      parEmploye[empId].acomptes += Number(c.acompte)||0;
    });
    return parEmploye;
  }, [commandes, filterMois, site.services]);

  function getEmpNom(empId){
    if(empId === 'inconnu') return 'Non identifié';
    const emp = employes.find(e=>e.id===empId);
    return emp ? emp.nom : `Employé inconnu`;
  }

  const totalRem = Object.values(bilanRepasseurs).reduce((s,b)=>s+b.montant,0);

  return (
    <div>
      <PageHeader title="Rémunérations & Traçabilité" subtitle={`${filterMois}`} />

      {/* Filtres */}
      <div style={{display:'flex', gap:10, marginBottom:18, flexWrap:'wrap', alignItems:'center'}}>
        <select value={filterMois} onChange={e=>setFilterMois(e.target.value)} style={{width:'auto', minWidth:160}}>
          {moisDisponibles.map(m => (
            <option key={m} value={m}>{new Date(m+'-01').toLocaleDateString('fr-FR',{month:'long',year:'numeric'})}</option>
          ))}
        </select>
        {['repasseurs','caissiers','tout'].map(o => (
          <button key={o} className="btn btn-sm" onClick={()=>setOnglet(o)}
            style={{background:onglet===o?'var(--pine)':'transparent', color:onglet===o?'var(--white)':'var(--ink)', borderColor:onglet===o?'var(--pine)':'var(--line-strong)'}}>
            {o === 'repasseurs' ? '👔 Repasseurs' : o === 'caissiers' ? '🧾 Caissiers' : '📋 Tout'}
          </button>
        ))}
      </div>

      {/* BILAN REPASSEURS */}
      {(onglet === 'repasseurs' || onglet === 'tout') && (
        <div style={{marginBottom:24}}>
          <h2 style={{fontSize:16, color:'var(--pine)', marginBottom:12}}>👔 Bilan par repasseur</h2>
          {Object.keys(bilanRepasseurs).length === 0 ? (
            <div className="card" style={{padding:'1.25rem', color:'var(--steam)', fontSize:13}}>Aucun repassage enregistré ce mois.</div>
          ) : (
            <div style={{display:'grid', gap:14}}>
              {Object.entries(bilanRepasseurs).map(([empId, bilan]) => (
                <div key={empId} className="card" style={{padding:'1.25rem 1.5rem'}}>
                  <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:12}}>
                    <div>
                      <div style={{fontWeight:700, fontSize:15}}>{getEmpNom(empId)}</div>
                      <div style={{fontSize:12.5, color:'var(--steam)'}}>{bilan.entrees.length} prestation(s)</div>
                    </div>
                    <div style={{textAlign:'right'}}>
                      <div className="mono" style={{fontSize:18, fontWeight:700, color:'var(--ok)'}}>{fmtGNF(bilan.montant)}</div>
                      <div style={{fontSize:11.5, color:'var(--steam)'}}>à payer ce mois</div>
                    </div>
                  </div>
                  {/* Articles repassés */}
                  <div style={{display:'flex', flexWrap:'wrap', gap:8, marginBottom:10}}>
                    {Object.entries(bilan.articles).map(([nom, qte]) => (
                      <span key={nom} style={{background:'var(--pine-light)', color:'var(--pine)', fontSize:12, padding:'3px 10px', borderRadius:100, fontWeight:600}}>
                        {qte}x {nom}
                      </span>
                    ))}
                  </div>
                  {/* Bilan journalier */}
                  <div style={{marginTop:8}}>
                    <div style={{fontSize:11.5, color:'var(--steam)', fontWeight:600, textTransform:'uppercase', marginBottom:6}}>Détail journalier</div>
                    {(() => {
                      const parJour = {};
                      bilan.entrees.forEach(r => {
                        if(!parJour[r.date]) parJour[r.date] = { montant:0, articles:{} };
                        parJour[r.date].montant += Number(r.montant);
                        if(r.detail) r.detail.split(', ').forEach(part => {
                          const match = part.match(/(\d+)x (.+?) \(/);
                          if(match){ parJour[r.date].articles[match[2]]=(parJour[r.date].articles[match[2]]||0)+Number(match[1]); }
                        });
                      });
                      return Object.entries(parJour).sort((a,b)=>b[0].localeCompare(a[0])).map(([date, data]) => (
                        <div key={date} style={{display:'flex', justifyContent:'space-between', padding:'5px 0', borderBottom:'1px solid var(--line)', fontSize:13}}>
                          <div>
                            <span style={{fontWeight:600}}>{fmtDate(date)}</span>
                            <span style={{color:'var(--steam)', marginLeft:8, fontSize:12}}>
                              {Object.entries(data.articles).map(([n,q])=>`${q}x ${n}`).join(' · ')}
                            </span>
                          </div>
                          <span className="mono" style={{color:'var(--ok)'}}>{fmtGNF(data.montant)}</span>
                        </div>
                      ));
                    })()}
                  </div>
                </div>
              ))}
              <div className="card" style={{padding:'1rem 1.5rem', background:'var(--pine-light)', borderColor:'var(--pine)'}}>
                <div style={{display:'flex', justifyContent:'space-between', fontWeight:700}}>
                  <span>Total rémunérations repassage ce mois</span>
                  <span className="mono" style={{color:'var(--pine)', fontSize:16}}>{fmtGNF(totalRem)}</span>
                </div>
              </div>
            </div>
          )}
        </div>
      )}

      {/* BILAN CAISSIERS */}
      {(onglet === 'caissiers' || onglet === 'tout') && (
        <div>
          <h2 style={{fontSize:16, color:'var(--pine)', marginBottom:12}}>🧾 Bilan par caissier</h2>
          {Object.keys(bilanCaissiers).length === 0 ? (
            <div className="card" style={{padding:'1.25rem', color:'var(--steam)', fontSize:13}}>Aucune commande ce mois.</div>
          ) : (
            <div style={{display:'grid', gap:14}}>
              {Object.entries(bilanCaissiers).map(([empId, bilan]) => (
                <div key={empId} className="card" style={{padding:'1.25rem 1.5rem'}}>
                  <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:12}}>
                    <div>
                      <div style={{fontWeight:700, fontSize:15}}>{getEmpNom(empId)}</div>
                      <div style={{fontSize:12.5, color:'var(--steam)'}}>{bilan.commandes.length} commande(s) créée(s)</div>
                    </div>
                    <div style={{textAlign:'right', display:'flex', gap:16}}>
                      <div>
                        <div className="mono" style={{fontSize:16, fontWeight:700, color:'var(--pine)'}}>{fmtGNF(bilan.ca)}</div>
                        <div style={{fontSize:11.5, color:'var(--steam)'}}>CA total</div>
                      </div>
                      <div>
                        <div className="mono" style={{fontSize:16, fontWeight:700, color:'var(--ok)'}}>{fmtGNF(bilan.acomptes)}</div>
                        <div style={{fontSize:11.5, color:'var(--steam)'}}>Acomptes reçus</div>
                      </div>
                    </div>
                  </div>
                  {/* 5 dernières commandes */}
                  <div style={{fontSize:11.5, color:'var(--steam)', fontWeight:600, textTransform:'uppercase', marginBottom:6}}>Dernières commandes</div>
                  {bilan.commandes.slice(0,5).map(c => (
                    <div key={c.id} style={{display:'flex', justifyContent:'space-between', padding:'4px 0', borderBottom:'1px solid var(--line)', fontSize:13}}>
                      <div>
                        <span className="mono" style={{fontWeight:600}}>{c.numero}</span>
                        <span style={{color:'var(--steam)', marginLeft:8}}>{fmtDate(c.dateCreation.slice(0,10))}</span>
                      </div>
                      <span className={`tag ${STATUT_TAG_CLASS[c.statut]}`}>{c.statut}</span>
                    </div>
                  ))}
                  {bilan.commandes.length > 5 && <div style={{fontSize:12, color:'var(--steam)', marginTop:6}}>+ {bilan.commandes.length - 5} autre(s)</div>}
                </div>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function ConfigRemunerationEditor({ site, updateSite }){
  const config = site.configRemuneration || { tarifsRepassage: [], zones: [] };
  const [tarifsRepassage, setTarifsRepassage] = useState(config.tarifsRepassage || []);
  const [zones, setZones] = useState(config.zones || []);
  const [newRepNom, setNewRepNom] = useState('');
  const [newRepPrix, setNewRepPrix] = useState('');
  const [editingRepId, setEditingRepId] = useState(null);
  const [newZoneNom, setNewZoneNom] = useState('');
  const [newZoneMontant, setNewZoneMontant] = useState('');
  const [editingZoneId, setEditingZoneId] = useState(null);
  const [flash, setFlash] = useState(false);

  function save(){
    updateSite({ ...site, configRemuneration: { tarifsRepassage, zones } });
    setFlash(true);
    setTimeout(()=>setFlash(false), 1800);
  }
  function addTarifRepassage(){
    if(!newRepNom.trim()||!newRepPrix) return;
    setTarifsRepassage([...tarifsRepassage, { id: uid('rep_'), nom: newRepNom.trim(), prix: Number(newRepPrix) }]);
    setNewRepNom(''); setNewRepPrix('');
  }
  function removeTarifRepassage(id){ setTarifsRepassage(tarifsRepassage.filter(t=>t.id!==id)); }
  function startEditTarif(t){ setNewRepNom(t.nom); setNewRepPrix(String(t.prix)); setEditingRepId(t.id); }
  function saveEditTarif(){
    if(!newRepNom.trim()||!newRepPrix) return;
    setTarifsRepassage(tarifsRepassage.map(t => t.id===editingRepId ? {...t, nom:newRepNom.trim(), prix:Number(newRepPrix)} : t));
    setNewRepNom(''); setNewRepPrix(''); setEditingRepId(null);
  }
  function addZone(){
    if(!newZoneNom.trim()||!newZoneMontant) return;
    setZones([...zones, { id: uid('zone_'), nom: newZoneNom.trim(), montant: Number(newZoneMontant) }]);
    setNewZoneNom(''); setNewZoneMontant('');
  }
  function removeZone(id){ setZones(zones.filter(z=>z.id!==id)); }
  function startEditZone(z){ setNewZoneNom(z.nom); setNewZoneMontant(String(z.montant)); setEditingZoneId(z.id); }
  function saveEditZone(){
    if(!newZoneNom.trim()||!newZoneMontant) return;
    setZones(zones.map(z => z.id===editingZoneId ? {...z, nom:newZoneNom.trim(), montant:Number(newZoneMontant)} : z));
    setNewZoneNom(''); setNewZoneMontant(''); setEditingZoneId(null);
  }

  return (
    <div className="card" style={{padding:'1.5rem', marginTop:18}}>
      <h3 style={{margin:'0 0 14px', fontSize:15, display:'flex', alignItems:'center', gap:8}}>
        💰 Configuration des rémunérations employés
      </h3>

      {/* Tarifs de repassage par article */}
      <div style={{marginBottom:20}}>
        <label>Tarifs de repassage (par article)</label>
        <p style={{fontSize:12.5, color:'var(--steam)', margin:'0 0 10px', lineHeight:1.5}}>
          Ajoutez chaque type d'article avec son prix de repassage. Le repasseur choisira dans cette liste.
        </p>
        <div style={{marginBottom:10, maxHeight:200, overflowY:'auto'}}>
          {tarifsRepassage.map(t => (
            <div key={t.id} style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'7px 0', borderBottom:'1px solid var(--line)', fontSize:13.5}}>
              <span>👔 {t.nom}</span>
              <div style={{display:'flex', gap:6, alignItems:'center'}}>
                <span className="mono">{fmtGNF(t.prix)}</span>
                <button className="btn btn-ghost btn-sm" style={{padding:'3px 7px'}} onClick={()=>startEditTarif(t)}><Icon name="edit" size={13}/></button>
                <button className="btn btn-ghost btn-sm" style={{color:'var(--danger)', padding:'3px 7px'}} onClick={()=>removeTarifRepassage(t.id)}><Icon name="trash" size={13}/></button>
              </div>
            </div>
          ))}
          {tarifsRepassage.length === 0 && <p style={{fontSize:13, color:'var(--steam)'}}>Aucun tarif configuré.</p>}
        </div>
        <div style={{display:'grid', gridTemplateColumns:'2fr 1fr auto auto', gap:8}}>
          <input type="text" placeholder="Article (ex: Chemise, Pantalon, Robe…)" value={newRepNom} onChange={e=>setNewRepNom(e.target.value)} />
          <input type="number" placeholder="Prix GNF" value={newRepPrix} onChange={e=>setNewRepPrix(e.target.value)} />
          {editingRepId ? (
            <>
              <button className="btn btn-sm" style={{background:'var(--pine)', color:'var(--white)', borderColor:'var(--pine)'}} disabled={!newRepNom.trim()||!newRepPrix} onClick={saveEditTarif}><Icon name="check" size={13}/></button>
              <button className="btn btn-ghost btn-sm" onClick={()=>{ setEditingRepId(null); setNewRepNom(''); setNewRepPrix(''); }}><Icon name="x" size={13}/></button>
            </>
          ) : (
            <button className="btn btn-sm" disabled={!newRepNom.trim()||!newRepPrix} onClick={addTarifRepassage} style={{gridColumn:'3/5'}}><Icon name="plus" size={13}/> Ajouter</button>
          )}
        </div>
      </div>

      {/* Zones de livraison */}
      <div>
        <label>Zones de livraison et tarifs</label>
        <div style={{marginBottom:10}}>
          {zones.map(z => (
            <div key={z.id} style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'7px 0', borderBottom:'1px solid var(--line)', fontSize:13.5}}>
              <span>{z.nom}</span>
              <div style={{display:'flex', gap:6, alignItems:'center'}}>
                <span className="mono">{fmtGNF(z.montant)}</span>
                <button className="btn btn-ghost btn-sm" style={{padding:'3px 7px'}} onClick={()=>startEditZone(z)}><Icon name="edit" size={13}/></button>
                <button className="btn btn-ghost btn-sm" style={{color:'var(--danger)', padding:'3px 7px'}} onClick={()=>removeZone(z.id)}><Icon name="trash" size={13}/></button>
              </div>
            </div>
          ))}
          {zones.length === 0 && <p style={{fontSize:13, color:'var(--steam)'}}>Aucune zone configurée.</p>}
        </div>
        <div style={{display:'grid', gridTemplateColumns:'2fr 1fr auto auto', gap:8}}>
          <input type="text" placeholder="Nom de la zone (ex: Zone 1 — Kipé)" value={newZoneNom} onChange={e=>setNewZoneNom(e.target.value)} />
          <input type="number" placeholder="Montant GNF" value={newZoneMontant} onChange={e=>setNewZoneMontant(e.target.value)} />
          {editingZoneId ? (
            <>
              <button className="btn btn-sm" style={{background:'var(--pine)', color:'var(--white)', borderColor:'var(--pine)'}} disabled={!newZoneNom.trim()||!newZoneMontant} onClick={saveEditZone}><Icon name="check" size={13}/></button>
              <button className="btn btn-ghost btn-sm" onClick={()=>{ setEditingZoneId(null); setNewZoneNom(''); setNewZoneMontant(''); }}><Icon name="x" size={13}/></button>
            </>
          ) : (
            <button className="btn btn-sm" disabled={!newZoneNom.trim()||!newZoneMontant} onClick={addZone} style={{gridColumn:'3/5'}}><Icon name="plus" size={13}/> Ajouter</button>
          )}
        </div>
      </div>

      <button className="btn btn-rust" style={{marginTop:16}} onClick={save}>
        {flash ? <><Icon name="check" size={14}/> Enregistré !</> : 'Enregistrer la configuration'}
      </button>
    </div>
  );
}

function ParametresView({ site, updateSite, db, setDb }){
  const [nom, setNom] = useState(site.nom);
  const [adresse, setAdresse] = useState(site.adresse);
  const [tel, setTel] = useState(site.tel);
  const [savedFlash, setSavedFlash] = useState(false);

  // Changement mot de passe gérant
  const [ancienPass, setAncienPass] = useState('');
  const [nouveauPass, setNouveauPass] = useState('');
  const [confirmPass, setConfirmPass] = useState('');
  const [showPassFields, setShowPassFields] = useState(false);
  const [passError, setPassError] = useState('');
  const [passFlash, setPassFlash] = useState(false);

  function changePassGerant(){
    if(ancienPass !== getPassGerant(db)){ setPassError('Ancien mot de passe incorrect.'); return; }
    if(nouveauPass.length < 6){ setPassError('Le nouveau mot de passe doit contenir au moins 6 caractères.'); return; }
    if(nouveauPass !== confirmPass){ setPassError('Les deux mots de passe ne correspondent pas.'); return; }
    setDb({ ...db, passGerant: nouveauPass });
    setPassError('');
    setAncienPass(''); setNouveauPass(''); setConfirmPass('');
    setPassFlash(true);
    setTimeout(()=>{ setPassFlash(false); setShowPassFields(false); }, 2000);
  }

  // Config SMS — stockée dans le site
  const smsConfig = site.smsConfig || { provider: 'none', apiKey: '', apiSecret: '', senderId: '' };
  const [smsProvider, setSmsProvider] = useState(smsConfig.provider || 'none');
  const [smsApiKey, setSmsApiKey] = useState(smsConfig.apiKey || '');
  const [smsApiSecret, setSmsApiSecret] = useState(smsConfig.apiSecret || '');
  const [smsSenderId, setSmsSenderId] = useState(smsConfig.senderId || '');
  const [smsFlash, setSmsFlash] = useState(false);
  const [smsTest, setSmsTest] = useState('');
  const [smsTestResult, setSmsTestResult] = useState('');

  function save(){
    updateSite({ ...site, nom, adresse, tel });
    setSavedFlash(true);
    setTimeout(()=>setSavedFlash(false), 1800);
  }

  function saveSMS(){
    updateSite({ ...site, smsConfig: { provider: smsProvider, apiKey: smsApiKey, apiSecret: smsApiSecret, senderId: smsSenderId } });
    setSmsFlash(true);
    setTimeout(()=>setSmsFlash(false), 1800);
  }

  async function testSMS(){
    if(!smsTest.trim()) return;
    setSmsTestResult('Envoi en cours…');
    try {
      if(smsProvider === 'africas_talking'){
        const resp = await fetch('https://api.africastalking.com/version1/messaging', {
          method: 'POST',
          headers: { 'apiKey': smsApiKey, 'Content-Type': 'application/x-www-form-urlencoded', 'Accept': 'application/json' },
          body: new URLSearchParams({ username: smsApiSecret, to: smsTest, message: `Test SMS Maci Pressing - ${site.nom}`, from: smsSenderId || undefined })
        });
        const data = await resp.json();
        setSmsTestResult(data.SMSMessageData?.Message || 'Envoyé !');
      } else if(smsProvider === 'twilio'){
        const creds = btoa(`${smsApiKey}:${smsApiSecret}`);
        const resp = await fetch(`https://api.twilio.com/2010-04-01/Accounts/${smsApiKey}/Messages.json`, {
          method: 'POST',
          headers: { 'Authorization': `Basic ${creds}`, 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({ To: smsTest, From: smsSenderId, Body: `Test SMS Maci Pressing - ${site.nom}` })
        });
        const data = await resp.json();
        setSmsTestResult(data.status || data.message || 'Envoyé !');
      } else {
        setSmsTestResult('Aucun fournisseur SMS configuré.');
      }
    } catch(e) {
      setSmsTestResult('Erreur : ' + e.message);
    }
  }

  const providers = [
    { val: 'none', label: 'Désactivé', desc: 'Pas de SMS automatique' },
    { val: 'whatsapp', label: 'WhatsApp', desc: 'Gratuit — déjà actif via les boutons 📱', active: true },
    { val: 'africas_talking', label: "Africa's Talking", desc: 'Spécialisé Afrique — plan test gratuit disponible sur africastalking.com' },
    { val: 'twilio', label: 'Twilio', desc: 'International — ~0.01$/SMS, essai gratuit sur twilio.com' },
    { val: 'orange', label: 'Orange SMS API', desc: 'Orange Guinée — nécessite un contrat professionnel avec Orange Business' },
  ];

  return (
    <div>
      <PageHeader title="Paramètres" subtitle="Informations de l'établissement, services et SMS" />

      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:18, marginBottom:18}}>
        <div className="card" style={{padding:'1.5rem'}}>
          <h3 style={{margin:'0 0 16px', fontSize:15}}>Établissement</h3>
          <div style={{display:'grid', gap:12}}>
            <div><label>Nom</label><input type="text" value={nom} onChange={e=>setNom(e.target.value)} /></div>
            <div><label>Adresse</label><input type="text" value={adresse} onChange={e=>setAdresse(e.target.value)} /></div>
            <div><label>Téléphone</label><input type="text" value={tel} onChange={e=>setTel(e.target.value)} /></div>
            <button className="btn btn-rust" onClick={save} style={{justifySelf:'start'}}>
              {savedFlash ? <><Icon name="check" size={14}/> Enregistré</> : 'Enregistrer'}
            </button>
          </div>
        </div>

        <ServicesEditor site={site} updateSite={updateSite} />
      </div>

      {/* Changement mot de passe gérant */}
      <div className="card" style={{padding:'1.5rem', marginTop:18}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom: showPassFields ? 14 : 0}}>
          <h3 style={{margin:0, fontSize:15, display:'flex', alignItems:'center', gap:8}}>
            🔐 Mot de passe gérant
          </h3>
          <button className="btn btn-sm" onClick={()=>{ setShowPassFields(!showPassFields); setPassError(''); }}>
            {showPassFields ? 'Annuler' : 'Changer le mot de passe'}
          </button>
        </div>
        {passFlash && <p style={{color:'var(--ok)', fontWeight:600, margin:0}}><Icon name="check" size={14}/> Mot de passe modifié avec succès !</p>}
        {showPassFields && (
          <div style={{display:'grid', gap:12}}>
            <div>
              <label>Ancien mot de passe</label>
              <input type="password" value={ancienPass} onChange={e=>setAncienPass(e.target.value)} placeholder="Votre mot de passe actuel" />
            </div>
            <div>
              <label>Nouveau mot de passe</label>
              <input type="password" value={nouveauPass} onChange={e=>setNouveauPass(e.target.value)} placeholder="Au moins 6 caractères" />
            </div>
            <div>
              <label>Confirmer le nouveau mot de passe</label>
              <input type="password" value={confirmPass} onChange={e=>setConfirmPass(e.target.value)} placeholder="Répétez le nouveau mot de passe" />
            </div>
            {passError && <p style={{color:'var(--danger)', fontSize:13, margin:0}}>{passError}</p>}
            <button className="btn btn-rust" style={{justifySelf:'start'}} onClick={changePassGerant} disabled={!ancienPass||!nouveauPass||!confirmPass}>
              Enregistrer le nouveau mot de passe
            </button>
          </div>
        )}
      </div>

      {/* Section Rémunération */}
      <ConfigRemunerationEditor site={site} updateSite={updateSite} />

      {/* Section SMS */}
      <div className="card" style={{padding:'1.5rem'}}>
        <h3 style={{margin:'0 0 6px', fontSize:15, display:'flex', alignItems:'center', gap:8}}>
          <Icon name="phone" size={16}/> Configuration SMS
        </h3>
        <p style={{fontSize:13, color:'var(--steam)', margin:'0 0 16px', lineHeight:1.5}}>
          WhatsApp est déjà actif (bouton 📱 sur chaque commande). Pour envoyer de vrais SMS automatiques, choisissez un fournisseur et entrez vos clés API.
        </p>

        {/* Choix du fournisseur */}
        <label>Fournisseur SMS</label>
        <div style={{display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:10, marginBottom:16}}>
          {providers.map(p => (
            <button key={p.val} onClick={()=>setSmsProvider(p.val)}
              className="card"
              style={{padding:'0.9rem', textAlign:'left', border: smsProvider===p.val ? '2px solid var(--pine)' : '1px solid var(--line)', background: smsProvider===p.val ? 'var(--pine-light)' : 'var(--white)', cursor:'pointer'}}>
              <div style={{fontWeight:600, fontSize:13.5, color: smsProvider===p.val ? 'var(--pine)' : 'var(--ink)'}}>{p.label}</div>
              <div style={{fontSize:11.5, color:'var(--steam)', marginTop:4, lineHeight:1.4}}>{p.desc}</div>
              {p.active && <span className="tag tag-paye" style={{marginTop:6, fontSize:10}}>Actif</span>}
            </button>
          ))}
        </div>

        {/* Champs de configuration selon le fournisseur */}
        {smsProvider === 'africas_talking' && (
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginBottom:14}}>
            <div><label>API Key</label><input type="password" value={smsApiKey} onChange={e=>setSmsApiKey(e.target.value)} placeholder="Votre clé API Africa's Talking"/></div>
            <div><label>Username</label><input type="text" value={smsApiSecret} onChange={e=>setSmsApiSecret(e.target.value)} placeholder="Votre username"/></div>
            <div><label>Sender ID (optionnel)</label><input type="text" value={smsSenderId} onChange={e=>setSmsSenderId(e.target.value)} placeholder="Ex: MaciPress"/></div>

            <div><label>Account SID</label><input type="password" value={smsApiKey} onChange={e=>setSmsApiKey(e.target.value)} placeholder="AC..."/></div>
            <div><label>Auth Token</label><input type="password" value={smsApiSecret} onChange={e=>setSmsApiSecret(e.target.value)} placeholder="Votre Auth Token"/></div>
            <div><label>Numéro Twilio expéditeur</label><input type="text" value={smsSenderId} onChange={e=>setSmsSenderId(e.target.value)} placeholder="+1..."/></div>

            </div>

            <strong>Orange SMS API</strong> — Pour activer ce service, vous devez contacter Orange Guinée Business et signer un contrat d'utilisation de l'API SMS. Une fois le contrat signé, Orange vous fournira des clés API à entrer ici.
            <br/>Contact : <strong>Orange Business Guinée</strong>
          </div>
        )}

        {/* Test SMS */}
        {(smsProvider === 'africas_talking' || smsProvider === 'twilio') && (
          <div style={{marginBottom:14}}>
            <label>Tester l'envoi SMS</label>
            <div style={{display:'flex', gap:8}}>
              <input type="tel" placeholder="Numéro de test (ex: +224625633383)" value={smsTest} onChange={e=>setSmsTest(e.target.value)} />
              <button className="btn btn-sm" onClick={testSMS} disabled={!smsApiKey}>Tester</button>
            </div>
            {smsTestResult && <p style={{fontSize:12.5, color:'var(--pine)', marginTop:6}}>{smsTestResult}</p>}
          </div>
        )}

        {smsProvider !== 'none' && smsProvider !== 'whatsapp' && (
          <button className="btn btn-rust" onClick={saveSMS} style={{justifySelf:'start'}}>
            {smsFlash ? <><Icon name="check" size={14}/> Configuration sauvegardée !</> : 'Sauvegarder la configuration SMS'}
          </button>
        )}
      </div>
    </div>
  );
}

function ServicesEditor({ site, updateSite }){
  const [nom, setNom] = useState('');
  const [prix, setPrix] = useState('');
  const [categorie, setCategorie] = useState('Nettoyage');
  const [editingId, setEditingId] = useState(null);
  const [editNom, setEditNom] = useState('');
  const [editPrix, setEditPrix] = useState('');
  const [editCategorie, setEditCategorie] = useState('Nettoyage');
  const [confirmSvc, setConfirmSvc] = useState(null);

  function addService(){
    if(!nom.trim() || !prix) return;
    updateSite({ ...site, services: [...site.services, { id: uid('svc_'), nom: nom.trim(), prix: Number(prix), categorie }] });
    setNom(''); setPrix('');
  }
  function removeService(id){
    updateSite({ ...site, services: site.services.filter(s=>s.id!==id) });
  }
  function startEdit(s){
    setEditingId(s.id);
    setEditNom(s.nom);
    setEditPrix(String(s.prix));
    setEditCategorie(s.categorie);
  }
  function cancelEdit(){
    setEditingId(null);
  }
  function saveEdit(){
    if(!editNom.trim() || editPrix === '') return;
    updateSite({
      ...site,
      services: site.services.map(s => s.id === editingId ? { ...s, nom: editNom.trim(), prix: Number(editPrix), categorie: editCategorie } : s)
    });
    setEditingId(null);
  }

  return (
    <div className="card" style={{padding:'1.5rem'}}>
      <h3 style={{margin:'0 0 16px', fontSize:15}}>Services & tarifs</h3>
      <div style={{maxHeight:320, overflowY:'auto', marginBottom:14}}>
        {site.services.map(s => (
          editingId === s.id ? (
            <div key={s.id} style={{display:'grid', gridTemplateColumns:'1.3fr 0.9fr 1fr auto auto', gap:6, alignItems:'center', padding:'8px 0', borderBottom:'1px solid var(--line)'}}>
              <input type="text" value={editNom} onChange={e=>setEditNom(e.target.value)} style={{padding:'6px 8px', fontSize:13}} />
              <input type="number" value={editPrix} onChange={e=>setEditPrix(e.target.value)} style={{padding:'6px 8px', fontSize:13}} />
              <select value={editCategorie} onChange={e=>setEditCategorie(e.target.value)} style={{padding:'6px 8px', fontSize:13}}>
                <option>Nettoyage complet</option>
                <option>Repassage</option>
                <option>Nettoyage + Repassage</option>
                <option>Retouche</option>
                <option>Maison</option>
                <option>Autres</option>
              </select>
              <button className="btn btn-sm" style={{padding:'5px 9px'}} onClick={saveEdit}><Icon name="check" size={13}/></button>
              <button className="btn btn-ghost btn-sm" style={{padding:'5px 9px'}} onClick={cancelEdit}><Icon name="x" size={13}/></button>
            </div>
          ) : (
            <div key={s.id} style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'6px 0', borderBottom:'1px solid var(--line)', fontSize:13.5}}>
              <span>{s.nom} <span style={{color:'var(--steam)', fontSize:12}}>· {s.categorie}</span></span>
              <div style={{display:'flex', alignItems:'center', gap:6}}>
                <span className="mono">{fmtGNF(s.prix)}</span>
                <button className="btn btn-ghost btn-sm" style={{padding:'4px 7px'}} onClick={()=>startEdit(s)} aria-label="Modifier"><Icon name="edit" size={13}/></button>
                <button className="btn btn-ghost btn-sm" style={{padding:'4px 7px', color:'var(--danger)'}} onClick={()=>setConfirmSvc(s)} aria-label="Supprimer"><Icon name="trash" size={13}/></button>
              </div>
            </div>
          )
        ))}
      </div>
      <div style={{display:'grid', gridTemplateColumns:'1.4fr 0.8fr 1fr', gap:8}}>
        <input type="text" placeholder="Nom du service" value={nom} onChange={e=>setNom(e.target.value)} />
        <input type="number" placeholder="Prix (GNF)" value={prix} onChange={e=>setPrix(e.target.value)} />
        <select value={categorie} onChange={e=>setCategorie(e.target.value)}>
          <option>Nettoyage complet</option>
          <option>Repassage</option>
          <option>Nettoyage + Repassage</option>
          <option>Retouche</option>
          <option>Maison</option>
          <option>Autres</option>
        </select>
      </div>
      <button className="btn btn-rust btn-sm" style={{marginTop:10}} onClick={addService} disabled={!nom.trim()||!prix}>
        <Icon name="plus" size={13}/> Ajouter
      </button>
      {confirmSvc && <ConfirmDelete db={db}
        message={`Supprimer le service « ${confirmSvc.nom} » (${fmtGNF(confirmSvc.prix)}) ?`}
        onConfirm={()=>{ removeService(confirmSvc.id); setConfirmSvc(null); }}
        onCancel={()=>setConfirmSvc(null)}
      />}
    </div>
  );
}

/* ===================== REMUNERATION EMPLOYES ===================== */

function RemunerationView({ site, updateSite, db, siteId, employeId }){
  const [type, setType] = useState('repassage');
  const [date, setDate] = useState(todayISO());
  const [selectedArticles, setSelectedArticles] = useState([]);
  const [zoneId, setZoneId] = useState('');
  const [filterMois, setFilterMois] = useState(todayISO().slice(0,7));
  const [bilanView, setBilanView] = useState('jour');

  const config = site.configRemuneration || { tarifsRepassage: [], zones: [] };
  const tarifsRepassage = config.tarifsRepassage || [];
  const remunerations = site.remunerations || [];

  // Nom de l'employé connecté
  const monProfil = employeId ? site.employes.find(e=>e.id===employeId) : null;

  const today = todayISO();

  const getWeekDates = () => {
    const d = new Date(today + 'T00:00:00');
    const day = d.getDay() || 7;
    const monday = new Date(d); monday.setDate(d.getDate() - day + 1);
    const sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);
    const toISO = (dt) => dt.toISOString().slice(0,10);
    return { start: toISO(monday), end: toISO(sunday) };
  };
  const week = getWeekDates();

  // Filtrer uniquement les repassages DE CET EMPLOYÉ
  const repassageOnly = remunerations.filter(r => r.type === 'repassage' && r.employeId === employeId);

  // Bilan journalier
  const bilanJour = useMemo(() => {
    const rems = repassageOnly.filter(r => r.date === today);
    const totalMontant = rems.reduce((s,r)=>s+Number(r.montant),0);
    // Agréger les articles
    const articlesCount = {};
    rems.forEach(r => {
      if(r.detail){
        // Parser le détail : "2x Chemise (15 000 GNF), 1x Pantalon (20 000 GNF)"
        r.detail.split(', ').forEach(part => {
          const match = part.match(/(\d+)x (.+?) \(/);
          if(match) {
            const nom = match[2];
            const qte = Number(match[1]);
            articlesCount[nom] = (articlesCount[nom]||0) + qte;
          }
        });
      }
    });
    return { rems, totalMontant, articlesCount };
  }, [repassageOnly, today]);

  // Bilan hebdomadaire
  const bilanSemaine = useMemo(() => {
    const rems = repassageOnly.filter(r => r.date >= week.start && r.date <= week.end);
    const totalMontant = rems.reduce((s,r)=>s+Number(r.montant),0);
    // Par jour de la semaine
    const parJour = {};
    rems.forEach(r => {
      if(!parJour[r.date]) parJour[r.date] = { montant:0, articles:{} };
      parJour[r.date].montant += Number(r.montant);
      if(r.detail){
        r.detail.split(', ').forEach(part => {
          const match = part.match(/(\d+)x (.+?) \(/);
          if(match){
            const nom = match[2]; const qte = Number(match[1]);
            parJour[r.date].articles[nom] = (parJour[r.date].articles[nom]||0) + qte;
          }
        });
      }
    });
    const totalArticles = {};
    rems.forEach(r => {
      if(r.detail) r.detail.split(', ').forEach(part => {
        const match = part.match(/(\d+)x (.+?) \(/);
        if(match){ const nom=match[2]; const qte=Number(match[1]); totalArticles[nom]=(totalArticles[nom]||0)+qte; }
      });
    });
    return { rems, totalMontant, parJour, totalArticles };
  }, [repassageOnly, week]);

  // Bilan mensuel
  const bilanMois = useMemo(() => {
    const rems = repassageOnly.filter(r => r.date.slice(0,7) === filterMois);
    const totalMontant = rems.reduce((s,r)=>s+Number(r.montant),0);
    const totalArticles = {};
    rems.forEach(r => {
      if(r.detail) r.detail.split(', ').forEach(part => {
        const match = part.match(/(\d+)x (.+?) \(/);
        if(match){ const nom=match[2]; const qte=Number(match[1]); totalArticles[nom]=(totalArticles[nom]||0)+qte; }
      });
    });
    return { rems, totalMontant, totalArticles };
  }, [repassageOnly, filterMois]);

  const filtered = useMemo(() => {
    return [...remunerations]
      .filter(r => r.date.slice(0,7) === filterMois && r.employeId === employeId)
      .sort((a,b) => new Date(b.date) - new Date(a.date));
  }, [remunerations, filterMois, employeId]);

  const totalMois = filtered.reduce((s,r) => s + Number(r.montant), 0);
  const totalRepassage = filtered.filter(r=>r.type==='repassage').reduce((s,r)=>s+Number(r.montant),0);
  const totalLivraison = filtered.filter(r=>r.type==='livraison').reduce((s,r)=>s+Number(r.montant),0);

  const moisDisponibles = useMemo(() => {
    const mois = new Set(remunerations.filter(r=>r.employeId===employeId).map(r=>r.date.slice(0,7)));
    mois.add(todayISO().slice(0,7));
    return [...mois].sort().reverse();
  }, [remunerations, employeId]);

  function addArticle(tarifId){
    setSelectedArticles(prev => {
      const exist = prev.find(a=>a.tarifId===tarifId);
      if(exist) return prev.map(a=>a.tarifId===tarifId ? {...a, qte:a.qte+1} : a);
      return [...prev, {tarifId, qte:1}];
    });
  }
  function setArticleQte(tarifId, qte){
    setSelectedArticles(prev => prev.map(a=>a.tarifId===tarifId ? {...a, qte:Math.max(0,qte)} : a).filter(a=>a.qte>0));
  }

  const montantRepassage = selectedArticles.reduce((s,a) => {
    const tarif = tarifsRepassage.find(t=>t.id===a.tarifId);
    return s + (tarif ? tarif.prix * a.qte : 0);
  }, 0);

  function calculerMontant(){
    if(type === 'repassage') return montantRepassage;
    const zone = config.zones?.find(z=>z.id===zoneId);
    return zone ? Number(zone.montant) : 0;
  }

  function enregistrer(){
    const montant = calculerMontant();
    if(montant <= 0 || !date) return;
    const zone = type === 'livraison' ? config.zones?.find(z=>z.id===zoneId) : null;
    const detailRepassage = selectedArticles.map(a => {
      const t = tarifsRepassage.find(t=>t.id===a.tarifId);
      return t ? `${a.qte}x ${t.nom} (${fmtGNF(t.prix)})` : '';
    }).filter(Boolean).join(', ');

    const rem = {
      id: uid('rem_'),
      date,
      type,
      montant,
      detail: type === 'repassage' ? detailRepassage : `Livraison — ${zone?.nom || ''}`,
      employeId: employeId || null,
    };
    updateSite({ ...site, remunerations: [rem, ...remunerations] });
    setSelectedArticles([]);
    setZoneId('');
  }

  const montantPreview = calculerMontant();

  return (
    <div>
      <PageHeader title={`Ma rémunération${monProfil ? ` — ${monProfil.nom}` : ''}`} subtitle={`Total ${filterMois} : ${fmtGNF(totalMois)}`} />

      <div style={{display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:14, marginBottom:20}}>
        <StatCard label="Total ce mois" value={fmtGNF(totalMois)} icon="euro" />
        <StatCard label="Repassage" value={fmtGNF(totalRepassage)} icon="shirt" />
        <StatCard label="Livraisons" value={fmtGNF(totalLivraison)} icon="arrowRight" />
      </div>

      <div className="card" style={{padding:'1.5rem', marginBottom:20}}>
        <h3 style={{margin:'0 0 14px', fontSize:15}}>Enregistrer une prestation</h3>

        <div style={{display:'flex', gap:10, marginBottom:14}}>
          <button className="btn btn-sm" onClick={()=>{ setType('repassage'); setSelectedArticles([]); }}
            style={{background: type==='repassage'?'var(--pine)':'transparent', color: type==='repassage'?'var(--white)':'var(--ink)', borderColor: type==='repassage'?'var(--pine)':'var(--line-strong)'}}>
            👔 Repassage (par article)
          </button>
          <button className="btn btn-sm" onClick={()=>setType('livraison')}
            style={{background: type==='livraison'?'var(--pine)':'transparent', color: type==='livraison'?'var(--white)':'var(--ink)', borderColor: type==='livraison'?'var(--pine)':'var(--line-strong)'}}>
            🚗 Livraison (par zone)
          </button>
        </div>

        <div style={{display:'grid', gridTemplateColumns:'1fr 2fr 1fr', gap:12, alignItems:'start'}}>
          <div>
            <label>Date</label>
            <input type="date" value={date} onChange={e=>setDate(e.target.value)} max={todayISO()} />
          </div>

          {type === 'repassage' ? (
            <div>
              <label>Articles repassés</label>
              {tarifsRepassage.length > 0 ? (
                <>
                  <div style={{display:'grid', gridTemplateColumns:'repeat(2,1fr)', gap:6, marginBottom:8}}>
                    {tarifsRepassage.map(t => (
                      <button key={t.id} className="btn btn-sm"
                        style={{justifyContent:'space-between', display:'flex', background: selectedArticles.find(a=>a.tarifId===t.id) ? 'var(--pine-light)' : 'transparent', borderColor: selectedArticles.find(a=>a.tarifId===t.id) ? 'var(--pine)' : 'var(--line-strong)'}}
                        onClick={()=>addArticle(t.id)}>
                        <span>{t.nom}</span><span className="mono" style={{color:'var(--steam)'}}>{fmtGNF(t.prix)}</span>
                      </button>
                    ))}
                  </div>
                  {selectedArticles.length > 0 && (
                    <div style={{background:'var(--paper-2)', borderRadius:8, padding:'10px 12px'}}>
                      {selectedArticles.map(a => {
                        const t = tarifsRepassage.find(x=>x.id===a.tarifId);
                        if(!t) return null;
                        return (
                          <div key={a.tarifId} style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'4px 0'}}>
                            <span style={{fontSize:13}}>{t.nom}</span>
                            <div style={{display:'flex', alignItems:'center', gap:6}}>
                              <button className="btn btn-sm" style={{padding:'1px 7px'}} onClick={()=>setArticleQte(a.tarifId, a.qte-1)}>−</button>
                              <span className="mono" style={{fontSize:13}}>{a.qte}</span>
                              <button className="btn btn-sm" style={{padding:'1px 7px'}} onClick={()=>setArticleQte(a.tarifId, a.qte+1)}>+</button>
                              <span className="mono" style={{fontSize:12, color:'var(--pine)', minWidth:70, textAlign:'right'}}>{fmtGNF(t.prix*a.qte)}</span>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </>
              ) : (
                <div style={{padding:'9px 12px', background:'var(--warn-light)', borderRadius:8, fontSize:13, color:'var(--warn)'}}>
                  ⚠️ Le gérant doit configurer les tarifs de repassage dans Paramètres.
                </div>
              )}
            </div>
          ) : (
            <div>
              <label>Zone de livraison</label>
              {config.zones?.length > 0 ? (
                <select value={zoneId} onChange={e=>setZoneId(e.target.value)}>
                  <option value="">Choisir une zone…</option>
                  {config.zones.map(z => (
                    <option key={z.id} value={z.id}>{z.nom} — {fmtGNF(z.montant)}</option>
                  ))}
                </select>
              ) : (
                <div style={{padding:'9px 12px', background:'var(--warn-light)', borderRadius:8, fontSize:13, color:'var(--warn)'}}>
                  ⚠️ Le gérant doit configurer les zones dans Paramètres.
                </div>
              )}
            </div>
          )}

          <div>
            {montantPreview > 0 && (
              <div style={{marginBottom:8, fontSize:13, color:'var(--pine)', fontWeight:600}}>
                💰 Total : {fmtGNF(montantPreview)}
              </div>
            )}
            <button className="btn btn-rust" style={{width:'100%'}}
              disabled={montantPreview <= 0}
              onClick={enregistrer}>
              Enregistrer
            </button>
          </div>
        </div>
      </div>

      {/* BILAN REPASSAGE */}
      <div className="card" style={{padding:'1.5rem', marginBottom:20}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14}}>
          <h3 style={{margin:0, fontSize:15}}>📊 Bilan repassage</h3>
          <div style={{display:'flex', gap:8}}>
            {['jour','semaine','mois'].map(v => (
              <button key={v} className="btn btn-sm" onClick={()=>setBilanView(v)}
                style={{background:bilanView===v?'var(--pine)':'transparent', color:bilanView===v?'var(--white)':'var(--ink)', borderColor:bilanView===v?'var(--pine)':'var(--line-strong)', textTransform:'capitalize'}}>
                {v === 'jour' ? "Aujourd'hui" : v === 'semaine' ? 'Cette semaine' : 'Ce mois'}
              </button>
            ))}
          </div>
        </div>

        {bilanView === 'jour' && (
          <div>
            <div style={{display:'flex', gap:14, marginBottom:12}}>
              <div style={{background:'var(--paper-2)', borderRadius:8, padding:'10px 16px', flex:1}}>
                <div style={{fontSize:11.5, color:'var(--steam)', textTransform:'uppercase', fontWeight:600}}>Articles repassés</div>
                <div style={{fontSize:22, fontWeight:700, color:'var(--pine)'}}>
                  {Object.values(bilanJour.articlesCount).reduce((s,v)=>s+v,0)}
                </div>
              </div>
              <div style={{background:'var(--paper-2)', borderRadius:8, padding:'10px 16px', flex:1}}>
                <div style={{fontSize:11.5, color:'var(--steam)', textTransform:'uppercase', fontWeight:600}}>Montant gagné</div>
                <div style={{fontSize:22, fontWeight:700, color:'var(--ok)'}}>{fmtGNF(bilanJour.totalMontant)}</div>
              </div>
            </div>
            {Object.keys(bilanJour.articlesCount).length > 0 ? (
              <div>
                <div style={{fontSize:12, color:'var(--steam)', fontWeight:600, textTransform:'uppercase', marginBottom:6}}>Détail par article</div>
                {Object.entries(bilanJour.articlesCount).map(([nom, qte]) => (
                  <div key={nom} style={{display:'flex', justifyContent:'space-between', padding:'5px 0', borderBottom:'1px solid var(--line)', fontSize:13.5}}>
                    <span>👔 {nom}</span><span className="mono" style={{fontWeight:600}}>{qte} pièce(s)</span>
                  </div>
                ))}
              </div>
            ) : (
              <p style={{fontSize:13, color:'var(--steam)', margin:0}}>Aucun repassage enregistré aujourd'hui.</p>
            )}
          </div>
        )}

        {bilanView === 'semaine' && (
          <div>
            <div style={{display:'flex', gap:14, marginBottom:12}}>
              <div style={{background:'var(--paper-2)', borderRadius:8, padding:'10px 16px', flex:1}}>
                <div style={{fontSize:11.5, color:'var(--steam)', textTransform:'uppercase', fontWeight:600}}>Total articles</div>
                <div style={{fontSize:22, fontWeight:700, color:'var(--pine)'}}>
                  {Object.values(bilanSemaine.totalArticles).reduce((s,v)=>s+v,0)}
                </div>
              </div>
              <div style={{background:'var(--paper-2)', borderRadius:8, padding:'10px 16px', flex:1}}>
                <div style={{fontSize:11.5, color:'var(--steam)', textTransform:'uppercase', fontWeight:600}}>Montant semaine</div>
                <div style={{fontSize:22, fontWeight:700, color:'var(--ok)'}}>{fmtGNF(bilanSemaine.totalMontant)}</div>
              </div>
            </div>
            {/* Par jour */}
            {Object.keys(bilanSemaine.parJour).length > 0 ? (
              <div>
                <div style={{fontSize:12, color:'var(--steam)', fontWeight:600, textTransform:'uppercase', marginBottom:6}}>Par jour</div>
                {Object.entries(bilanSemaine.parJour).sort((a,b)=>b[0].localeCompare(a[0])).map(([dateKey, data]) => (
                  <div key={dateKey} style={{padding:'8px 0', borderBottom:'1px solid var(--line)'}}>
                    <div style={{display:'flex', justifyContent:'space-between', fontSize:13.5, fontWeight:600}}>
                      <span>{fmtDate(dateKey)}</span>
                      <span className="mono" style={{color:'var(--ok)'}}>{fmtGNF(data.montant)}</span>
                    </div>
                    <div style={{fontSize:12, color:'var(--steam)', marginTop:3}}>
                      {Object.entries(data.articles).map(([nom,qte])=>`${qte}x ${nom}`).join(' · ')}
                    </div>
                  </div>
                ))}
                <div style={{fontSize:12, color:'var(--steam)', fontWeight:600, textTransform:'uppercase', marginTop:10, marginBottom:6}}>Total par article</div>
                {Object.entries(bilanSemaine.totalArticles).map(([nom, qte]) => (
                  <div key={nom} style={{display:'flex', justifyContent:'space-between', padding:'4px 0', fontSize:13}}>
                    <span>👔 {nom}</span><span className="mono">{qte} pièce(s)</span>
                  </div>
                ))}
              </div>
            ) : (
              <p style={{fontSize:13, color:'var(--steam)', margin:0}}>Aucun repassage cette semaine.</p>
            )}
          </div>
        )}

        {bilanView === 'mois' && (
          <div>
            <div style={{display:'flex', gap:10, marginBottom:14, alignItems:'center'}}>
              <select value={filterMois} onChange={e=>setFilterMois(e.target.value)} style={{width:'auto', minWidth:160}}>
                {moisDisponibles.map(m => (
                  <option key={m} value={m}>{new Date(m+'-01').toLocaleDateString('fr-FR',{month:'long',year:'numeric'})}</option>
                ))}
              </select>
            </div>
            <div style={{display:'flex', gap:14, marginBottom:12}}>
              <div style={{background:'var(--paper-2)', borderRadius:8, padding:'10px 16px', flex:1}}>
                <div style={{fontSize:11.5, color:'var(--steam)', textTransform:'uppercase', fontWeight:600}}>Total articles</div>
                <div style={{fontSize:22, fontWeight:700, color:'var(--pine)'}}>
                  {Object.values(bilanMois.totalArticles).reduce((s,v)=>s+v,0)}
                </div>
              </div>
              <div style={{background:'var(--paper-2)', borderRadius:8, padding:'10px 16px', flex:1}}>
                <div style={{fontSize:11.5, color:'var(--steam)', textTransform:'uppercase', fontWeight:600}}>Montant du mois</div>
                <div style={{fontSize:22, fontWeight:700, color:'var(--ok)'}}>{fmtGNF(bilanMois.totalMontant)}</div>
              </div>
            </div>
            {Object.keys(bilanMois.totalArticles).length > 0 ? (
              <div>
                <div style={{fontSize:12, color:'var(--steam)', fontWeight:600, textTransform:'uppercase', marginBottom:6}}>Total par article ce mois</div>
                {Object.entries(bilanMois.totalArticles).sort((a,b)=>b[1]-a[1]).map(([nom, qte]) => (
                  <div key={nom} style={{display:'flex', justifyContent:'space-between', padding:'6px 0', borderBottom:'1px solid var(--line)', fontSize:13.5}}>
                    <span>👔 {nom}</span>
                    <div style={{display:'flex', gap:16}}>
                      <span className="mono">{qte} pièce(s)</span>
                      <span className="mono" style={{color:'var(--ok)'}}>
                        {fmtGNF((tarifsRepassage.find(t=>t.nom===nom)?.prix||0)*qte)}
                      </span>
                    </div>
                  </div>
                ))}
              </div>
            ) : (
              <p style={{fontSize:13, color:'var(--steam)', margin:0}}>Aucun repassage ce mois.</p>
            )}
          </div>
        )}
      </div>

      <div style={{display:'flex', gap:10, marginBottom:14, alignItems:'center'}}>
        <label style={{margin:0}}>Mois :</label>
        <select value={filterMois} onChange={e=>setFilterMois(e.target.value)} style={{width:'auto', minWidth:160}}>
          {moisDisponibles.map(m => (
            <option key={m} value={m}>{new Date(m+'-01').toLocaleDateString('fr-FR',{month:'long',year:'numeric'})}</option>
          ))}
        </select>
      </div>

      <div className="card" style={{overflow:'hidden'}}>
        <table style={{width:'100%', borderCollapse:'collapse', fontSize:13.5}}>
          <thead>
            <tr style={{background:'var(--paper-2)', textAlign:'left'}}>
              <th style={th}>Date</th>
              <th style={th}>Type</th>
              <th style={th}>Détail</th>
              <th style={th}>Montant</th>
            </tr>
          </thead>
          <tbody>
            {filtered.length === 0 && (
              <tr><td colSpan={4} style={{...td, textAlign:'center', color:'var(--steam)', padding:'2rem'}}>Aucune prestation enregistrée pour ce mois.</td></tr>
            )}
            {filtered.map(r => (
              <tr key={r.id} style={{borderTop:'1px solid var(--line)'}}>
                <td style={td}>{fmtDate(r.date)}</td>
                <td style={td}><span className="tag tag-recu">{r.type === 'repassage' ? '👔 Repassage' : '🚗 Livraison'}</span></td>
                <td style={td}>{r.detail}</td>
                <td style={{...td, fontWeight:700, color:'var(--ok)'}} className="mono">{fmtGNF(r.montant)}</td>
              </tr>
            ))}
            {filtered.length > 0 && (
              <tr style={{borderTop:'2px solid var(--line-strong)', background:'var(--paper-2)'}}>
                <td colSpan={3} style={{...td, fontWeight:700}}>Total {new Date(filterMois+'-01').toLocaleDateString('fr-FR',{month:'long',year:'numeric'})}</td>
                <td style={{...td, fontWeight:700}} className="mono">{fmtGNF(totalMois)}</td>
              </tr>
            )}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ===================== ESPACE EMPLOYE (lié à un site) ===================== */

function EmployeApp({ db, setDb, siteId, employeId, onLogout }){
  const [page, setPage] = useState('caisse');
  const site = db.sites.find(s => s.id === siteId);

  function updateSite(updatedSite){
    setDb({ ...db, sites: db.sites.map(s => s.id === updatedSite.id ? updatedSite : s) });
  }

  if(!site){
    return (
      <div style={{minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center'}}>
        <div style={{textAlign:'center'}}>
          <p>Ce pressing n'existe plus.</p>
          <button className="btn" onClick={onLogout}>Retour</button>
        </div>
      </div>
    );
  }

  const navItems = [
    { key:'caisse', label:'Caisse', icon:'ticket' },
    { key:'clients', label:'Clients', icon:'users' },
    { key:'stock', label:'Stock', icon:'box' },
    { key:'depenses', label:'Dépenses', icon:'euro' },
    { key:'remuneration', label:'Ma rémunération', icon:'chart' },
  ];
  return (
    <Shell title={site.nom} role="Espace employé" navItems={navItems} active={page} onNav={setPage} onLogout={onLogout}>
      {page === 'caisse' && <CommandesView site={site} updateSite={updateSite} editable={true} employeId={employeId} />}
      {page === 'clients' && <ClientsView site={site} updateSite={updateSite} />}
      {page === 'stock' && <StockView site={site} updateSite={updateSite} />}
      {page === 'depenses' && <DepensesView site={site} updateSite={updateSite} />}
      {page === 'remuneration' && <RemunerationView site={site} updateSite={updateSite} db={db} siteId={siteId} employeId={employeId} />}
    </Shell>
  );
}

/* ===================== ESPACE CLIENT (lié à un site) ===================== */

function ClientApp({ db, setDb, siteId, clientId, onLogout }){
  const site = db.sites.find(s => s.id === siteId);
  const client = site ? site.clients.find(c => c.id === clientId) : null;

  if(!site || !client){
    return (
      <div style={{minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center'}}>
        <div style={{textAlign:'center'}}>
          <p>Fiche client introuvable.</p>
          <button className="btn" onClick={onLogout}>Retour</button>
        </div>
      </div>
    );
  }

  const cmds = site.commandes.filter(c => c.clientId === clientId).sort((a,b)=>new Date(b.dateCreation)-new Date(a.dateCreation));
  const impayes = cmds.filter(c => c.paiement === 'impaye');
  const totalImpaye = impayes.reduce((s,c)=>s+calcCommandeTotal(c, site.services), 0);
  const enCours = cmds.filter(c => c.statut !== 'Récupéré');

  return (
    <div style={{minHeight:'100vh', padding:'2.5rem 2rem', maxWidth:840, margin:'0 auto'}}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:30}}>
        <div>
          <p className="mono" style={{color:'var(--steam)', fontSize:12, margin:0}}>{site.nom}</p>
          <h1 style={{margin:'2px 0 0', fontSize:26, color:'var(--pine)'}}>Bonjour {client.nom.split(' ')[0]}</h1>
        </div>
        <button className="btn" onClick={onLogout}><Icon name="logout" size={14}/> Changer d'espace</button>
      </div>

      <div style={{display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:14, marginBottom:26}}>
        <StatCard label="Commandes en cours" value={enCours.length} icon="clock" />
        <StatCard label="Total commandes" value={cmds.length} icon="ticket" />
        <StatCard label="Solde impayé" value={fmtGNF(totalImpaye)} icon="euro" tone={totalImpaye>0?'danger':'default'} />
      </div>

      <h2 style={{fontSize:17, color:'var(--pine)', marginBottom:14}}>Mes commandes</h2>
      <div style={{display:'grid', gap:12}}>
        {cmds.length === 0 && (
          <div className="card" style={{padding:'2rem', textAlign:'center', color:'var(--steam)'}}>
            Vous n'avez pas encore de commande chez nous.
          </div>
        )}
        {cmds.map(c => {
          const total = calcCommandeTotal(c, site.services);
          return (
            <div key={c.id} className="card" style={{padding:'1.1rem 1.3rem', display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:10}}>
              <div>
                <div style={{display:'flex', alignItems:'center', gap:10}}>
                  <span className="mono" style={{fontWeight:700}}>{c.numero}</span>
                  <span className={`tag ${STATUT_TAG_CLASS[c.statut]}`}>{c.statut}</span>
                  <span className={`tag ${c.paiement==='paye'?'tag-paye':'tag-impaye'}`}>{c.paiement==='paye'?'Payé':'Impayé'}</span>
                </div>
                <div style={{fontSize:12.5, color:'var(--steam)', marginTop:6}}>
                  {c.lignes.reduce((s,l)=>s+l.qte,0)} article(s) · déposé le {fmtDate(c.dateCreation.slice(0,10))}
                  {c.dateRetraitPrevue && ` · retrait prévu le ${fmtDate(c.dateRetraitPrevue)}`}
                </div>
              </div>
              <div className="mono" style={{fontSize:17, fontWeight:700, color:'var(--pine)'}}>{fmtGNF(total)}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ===================== MONTAGE ===================== */

const root = ReactDOM.createRoot(document.getElementById('root'));
try {
  root.render(<App />);
} catch(e) {
  document.getElementById('root').innerHTML = '<div style="padding:2rem;font-family:monospace;color:red;"><h2>Erreur de démarrage</h2><pre>' + e.message + '\n' + e.stack + '</pre></div>';
}
</script>


</body></html>
